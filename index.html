                  <div style={{ display: 'flex', alignItems: 'flex-end', gap: 3, height: '100%', position: 'relative', zIndex: 1 }}>
                    {monthlyData.map((m, i) => {
                      const invH = m.invoiced > 0 ? Math.max(4, Math.round((m.invoiced / yMax) * CHART_H)) : 0;
                      const recH = m.received > 0 ? Math.max(4, Math.round((m.received / yMax) * CHART_H)) : 0;
                      const isHov = hovBar === i;
                      const isFut = m.isFuture;
                      return (
                        <div key={m.ym}
                          onMouseEnter={() => setHovBar(i)}
                          onMouseLeave={() => setHovBar(null)}
                          style={{ flex: 1, height: '100%', display: 'flex', alignItems: 'flex-end', gap: 2, cursor: 'pointer',
                            background: isHov ? 'var(--a08)' : 'transparent', borderRadius: 4, padding: '0 1px', transition: 'background 0.15s' }}>
                          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end', height: '100%' }}>
                            {invH > 0
                              ? <div style={{ height: invH, background: isHov ? '#F5C518' : '#F5C518cc', borderRadius: '3px 3px 0 0', transition: 'background 0.15s' }} />
                              : <div style={{ height: 2, background: 'var(--border-soft)', borderRadius: 1 }} />}
                          </div>
                          {recH > 0 && (
                            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end', height: '100%' }}>
                              <div style={{ height: recH, background: isHov ? '#4ade80' : '#4ade80bb', borderRadius: '3px 3px 0 0', transition: 'background 0.15s' }} />
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>

              {/* Month labels */}
              <div style={{ display: 'flex', gap: 3, marginTop: 6, paddingLeft: 46 }}>
                {monthlyData.map((m, i) => (
                  <div key={m.ym} style={{ flex: 1, textAlign: 'center', fontSize: 9, color: hovBar === i ? 'var(--accent)' : 'var(--t-muted)', fontWeight: hovBar === i ? 700 : 400, overflow: 'hidden', whiteSpace: 'nowrap', transition: 'color 0.1s' }}>{m.label}</div>
                ))}
              </div>
            </div>
          );
        })()}

        {/* Brand breakdown */}
        <div className="card" style={{ padding: 18 }}>
          <div style={{ fontSize: 11, color: 'var(--t-soft)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 16 }}>Revenue by Brand</div>
          {brandTotals.length === 0 && <div style={{ color: 'var(--t-soft)', fontSize: 12 }}>No data yet</div>}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 9, maxHeight: 180, overflowY: 'auto' }}>
            {brandTotals.map(b => (
              <div key={b.brand}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 3, fontSize: 11 }}>
                  <span style={{ color: b.color, fontWeight: 600, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', flex: 1 }}>{b.brand}</span>
                  <span style={{ color: 'var(--t-strong)', fontWeight: 600, marginLeft: 8, whiteSpace: 'nowrap' }}>{fmt(b.total)}</span>
                </div>
                <div style={{ height: 4, background: 'var(--border-soft)', borderRadius: 2, overflow: 'hidden' }}>
                  <div style={{ height: '100%', width: `${(b.total / maxBrand) * 100}%`, background: b.color, borderRadius: 2, transition: 'width 0.4s ease' }} />
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* ── Filters ── */}
      <div style={{ display: 'flex', gap: 8, marginBottom: 14, flexWrap: 'wrap', alignItems: 'center' }}>
        <span style={{ fontSize: 11, color: 'var(--t-soft)', textTransform: 'uppercase', letterSpacing: 0.8 }}>Filter:</span>
        <select className="select" value={filterBrand} onChange={e => setFilterBrand(e.target.value)} style={{ fontSize: 12, padding: '5px 10px' }}>
          <option value="All">All Brands</option>
          {brands.map(b => <option key={b}>{b}</option>)}
        </select>
        <select className="select" value={filterStatus} onChange={e => setFilterStatus(e.target.value)} style={{ fontSize: 12, padding: '5px 10px' }}>
          <option value="All">All Status</option>
          {INV_STATUSES.map(s => <option key={s}>{s}</option>)}
        </select>
        <select className="select" value={sortBy} onChange={e => setSortBy(e.target.value)} style={{ fontSize: 12, padding: '5px 10px' }}>
          <option value="newest">Newest first</option>
          <option value="amount">Amount ↓</option>
          <option value="duedate">Due date ↑</option>
          <option value="status">By status</option>
        </select>
        <span style={{ marginLeft: 'auto', fontSize: 12, color: 'var(--t-faint)' }}>{filtered.length} record{filtered.length !== 1 ? 's' : ''}</span>
      </div>

      {/* ── Collab records ── */}
      {collabs.length === 0 && !adding && <Empty icon="🧾" text="No invoices yet. Generate one from a Deal or add manually." />}
      {collabs.length > 0 && filtered.length === 0 && <div style={{ color: 'var(--t-soft)', fontSize: 13, padding: '20px 0' }}>No records match the current filters.</div>}

      <div style={{ display: 'grid', gap: 10 }}>
        {filtered.map(c => {
          const sc = INV_ST_COLORS[c.status] || '#888';
          const isEditing = editId === c.id;
          if (isEditing) return (
            <CollabForm key={c.id} f={editForm} onChange={setEditForm} onSave={saveEdit} onCancel={() => setEditId(null)} btnLabel="Save Changes" loading={updating} accentColor="#38bdf8" vendors={vendors} />
          );
          const today = todayStr();
          const dueDays = c.dueDate && c.status !== 'Paid' ? Math.ceil((new Date(c.dueDate + 'T00:00:00') - new Date(today + 'T00:00:00')) / 86400000) : null;
          const dueCol = dueDays === null ? 'var(--t-muted)' : dueDays < 0 ? '#ff6b6b' : dueDays <= 7 ? '#f97316' : 'var(--t-soft)';
          return (
            <div key={c.id} className="card" style={{ padding: '14px 16px', borderLeft: dueDays !== null && dueDays <= 7 && c.status !== 'Paid' ? `3px solid ${dueCol}` : undefined }}>
              <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12 }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6, flexWrap: 'wrap' }}>
                    <span style={{ fontSize: 15, fontWeight: 700, color: 'var(--t-heading)' }}>{c.brand}</span>
                    <span style={{ fontSize: 11, color: 'var(--t-faint)', fontFamily: 'monospace' }}>{c.invoiceNo}</span>
                    {c.amount && <span style={{ fontSize: 13, color: '#4ade80', fontWeight: 700 }}>₹{parseFloat(c.amount).toLocaleString('en-IN')}</span>}
                    <span className="tag" style={{ background: `${sc}18`, color: sc, fontSize: 10, fontWeight: 700 }}>{c.status}</span>
                    {c.linkedDealId && <span className="tag" style={{ background: '#38bdf818', color: '#38bdf8', fontSize: 10 }}>🔗 Deal</span>}
                  </div>
                  <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap', fontSize: 12, color: 'var(--t-muted)' }}>
                    {c.channel     && <span>📺 {c.channel}</span>}
                    {c.deliverable && <span>📋 {c.deliverable}</span>}
                    {c.poc         && <span>👤 {c.poc}</span>}
                    {c.invoiceDate && <span>📄 {fmtDate(c.invoiceDate)}</span>}
                    {c.dueDate && c.status !== 'Paid' && <span style={{ color: dueCol, fontWeight: dueDays !== null && dueDays <= 7 ? 700 : 400 }}>💳 due {fmtDate(c.dueDate)}{dueDays !== null && dueDays <= 7 ? ` (${dueDays < 0 ? `${Math.abs(dueDays)}d overdue` : dueDays === 0 ? 'today!' : `${dueDays}d`})` : ''}</span>}
                    {c.paidDate    && <span style={{ color: '#4ade80' }}>✅ paid {fmtDate(c.paidDate)}</span>}
                  </div>
                  {c.description && <div style={{ fontSize: 12, color: 'var(--t-soft)', marginTop: 5 }}>{c.description}</div>}
                  {c.notes       && <div style={{ fontSize: 12, color: 'var(--t-faint)', marginTop: 3 }}>{c.notes}</div>}
                </div>
                <div style={{ display: 'flex', gap: 5, alignItems: 'center', flexShrink: 0, flexWrap: 'wrap', justifyContent: 'flex-end' }}>
                  {c.status !== 'Paid' && (
                    <button onClick={() => markPaid(c)} style={{ background: '#4ade8012', border: '1px solid #4ade8044', borderRadius: 6, color: '#4ade80', cursor: 'pointer', fontSize: 11, padding: '4px 10px', fontWeight: 700 }}>✓ Mark Paid</button>
                  )}
                  {c.status === 'Pending' && c.dueDate && c.dueDate < today && (
                    <button onClick={() => markOverdue(c)} style={{ background: '#ff6b6b12', border: '1px solid #ff6b6b44', borderRadius: 6, color: '#ff6b6b', cursor: 'pointer', fontSize: 11, padding: '4px 10px' }}>! Overdue</button>
                  )}
                  <button onClick={() => printInvoice(c)} title="Print Invoice" style={{ background: 'var(--a12)', border: '1px solid var(--a28)', borderRadius: 6, color: GOLD, cursor: 'pointer', fontSize: 12, padding: '3px 8px', fontWeight: 600 }}>🖨️</button>
                  <button onClick={() => startEdit(c)} title="Edit" style={{ background: 'none', border: '1px solid var(--border-input)', borderRadius: 6, color: 'var(--t-muted)', cursor: 'pointer', fontSize: 13, padding: '3px 8px' }}>✎</button>
                  <button onClick={() => del(c.id)} style={{ background: 'none', border: 'none', color: 'var(--t-faint)', cursor: 'pointer', fontSize: 18, lineHeight: 1 }}>×</button>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function VendorsTab() {
  const [vendors, setVendors]   = useState([]);
  const [allDeals, setAllDeals] = useState([]);
  const [form, setForm]         = useState({ ...V_EMPTY });
  const [addType, setAddType]   = useState('Agency');
  const [adding, setAdding]     = useState(false);
  const [saving, setSaving]     = useState(false);
  const [editId, setEditId]     = useState(null);
  const [editForm, setEditForm] = useState({ ...V_EMPTY });
  const [updating, setUpdating] = useState(false);

  useEffect(() => {
    const u1 = db.collection('vendors').orderBy('name').onSnapshot(snap => setVendors(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
    const u2 = db.collection('deals').onSnapshot(snap => setAllDeals(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
    return () => { u1(); u2(); };
  }, []);

  const stats = v => {
    const matched = allDeals.filter(d =>
      d.brandId === v.id || d.agencyId === v.id ||
      (v.type === 'Brand' ? d.brand === v.name : d.platform === v.name)
    );
    const total  = matched.reduce((s, d) => s + (parseFloat(d.agreedRate) || 0), 0);
    const paid   = matched.filter(d => d.stage === 'Paid').reduce((s, d) => s + (parseFloat(d.agreedRate) || 0), 0);
    const active = matched.filter(d => d.stage !== 'Paid').length;
    return { count: matched.length, total, paid, active };
  };

  const add = async () => {
    if (!form.name.trim()) return;
    setSaving(true);
    await db.collection('vendors').add({ ...form, type: addType, createdAt: new Date().toISOString() });
    setForm({ ...V_EMPTY });
    setAdding(false);
    setSaving(false);
  };

  const startEdit = v => {
    setEditId(v.id);
    setEditForm({ name: v.name || '', type: v.type || 'Agency', legalName: v.legalName || '', contactPerson: v.contactPerson || '', email: v.email || '', phone: v.phone || '', commission: v.commission || '', gstin: v.gstin || '', paymentTerms: v.paymentTerms || '', address: v.address || '', notes: v.notes || '' });
    setAdding(false);
  };

  const saveEdit = async () => {
    setUpdating(true);
    await db.collection('vendors').doc(editId).update({ ...editForm });
    setEditId(null);
    setUpdating(false);
  };

  const del = id => db.collection('vendors').doc(id).delete();

  const VendorCard = ({ v }) => {
    const s   = stats(v);
    const col = v.type === 'Agency' ? GOLD : '#38bdf8';
    if (editId === v.id) return (
      <VendorForm key={v.id} f={editForm} onChange={setEditForm} onSave={saveEdit} onCancel={() => setEditId(null)} btnLabel="Save" loading={updating} accentColor={col} />
    );
    return (
      <div className="card" style={{ padding: '14px 16px', borderLeft: `3px solid ${col}40` }}>
        <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6, flexWrap: 'wrap' }}>
              <span style={{ fontSize: 15, fontWeight: 700, color: 'var(--t-heading)' }}>{v.name}</span>
              <span className="tag" style={{ background: `${col}18`, color: col, fontSize: 10, fontWeight: 700 }}>{v.type}</span>
              {v.type === 'Agency' && v.commission && <span style={{ fontSize: 11, color: '#f97316', fontWeight: 600 }}>{v.commission}% commission</span>}
              {s.active > 0 && <span className="tag" style={{ background: '#38bdf818', color: '#38bdf8', fontSize: 10 }}>{s.active} active deal{s.active > 1 ? 's' : ''}</span>}
            </div>
            <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap', fontSize: 12, color: 'var(--t-muted)', marginBottom: s.count > 0 ? 8 : 0 }}>
              {v.contactPerson && <span>👤 {v.contactPerson}</span>}
              {v.email         && <span>✉️ {v.email}</span>}
              {v.phone         && <span>📱 {v.phone}</span>}
              {v.gstin         && <span>🏛️ {v.gstin}</span>}
              {v.paymentTerms  && <span>📋 {v.paymentTerms}</span>}
              {v.address       && <span title={v.address}>📍 {v.address.length > 40 ? v.address.slice(0, 40) + '…' : v.address}</span>}
            </div>
            {s.count > 0 && (
              <div style={{ display: 'flex', gap: 16, fontSize: 12 }}>
                <span style={{ color: 'var(--t-faint)' }}>{s.count} deal{s.count > 1 ? 's' : ''} total</span>
                <span style={{ color: '#4ade80', fontWeight: 600 }}>₹{s.total.toLocaleString('en-IN')} invoiced</span>
                {s.paid > 0 && <span style={{ color: 'var(--t-muted)' }}>₹{s.paid.toLocaleString('en-IN')} paid</span>}
                {s.total - s.paid > 0 && <span style={{ color: '#f97316' }}>₹{(s.total - s.paid).toLocaleString('en-IN')} pending</span>}
              </div>
            )}
            {v.notes && <div style={{ fontSize: 12, color: 'var(--t-faint)', marginTop: 5 }}>{v.notes}</div>}
          </div>
          <div style={{ display: 'flex', gap: 5, flexShrink: 0 }}>
            <button onClick={() => startEdit(v)} style={{ background: 'none', border: '1px solid var(--border-input)', borderRadius: 6, color: 'var(--t-muted)', cursor: 'pointer', fontSize: 13, padding: '3px 8px' }}>✎</button>
            <button onClick={() => del(v.id)} style={{ background: 'none', border: 'none', color: 'var(--t-faint)', cursor: 'pointer', fontSize: 18, lineHeight: 1 }}>×</button>
          </div>
        </div>
      </div>
    );
  };

  const agencies = vendors.filter(v => v.type === 'Agency');
  const brands   = vendors.filter(v => v.type === 'Brand');

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 20 }}>
        <div>
          <h1 style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>🏢 Vendors</h1>
          <div style={{ color: 'var(--t-muted)', fontSize: 13 }}>{agencies.length} agencies · {brands.length} direct brands</div>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button className="btn-ghost" onClick={() => { setAddType('Brand'); setAdding(v => !v); setEditId(null); }} style={{ fontSize: 13 }}>+ Brand</button>
          <button className="btn-gold"  onClick={() => { setAddType('Agency'); setAdding(v => !v); setEditId(null); }} style={{ fontSize: 13 }}>+ Agency</button>
        </div>
      </div>

      {adding && (
        <div style={{ marginBottom: 4 }}>
          <div style={{ fontSize: 12, color: addType === 'Agency' ? GOLD : '#38bdf8', fontWeight: 600, marginBottom: 8 }}>
            {addType === 'Agency' ? '🏢 New Agency' : '🏷️ New Direct Brand'}
          </div>
          <VendorForm f={{ ...form, type: addType }} onChange={f => setForm({ ...f, type: addType })} onSave={add} onCancel={() => setAdding(false)} btnLabel={`Add ${addType}`} loading={saving} accentColor={addType === 'Agency' ? GOLD : '#38bdf8'} />
        </div>
      )}

      {agencies.length > 0 && (
        <div style={{ marginBottom: 28 }}>
          <div style={{ fontSize: 11, color: GOLD, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 12 }}>🏢 Agencies ({agencies.length})</div>
          <div style={{ display: 'grid', gap: 10 }}>{agencies.map(v => <VendorCard key={v.id} v={v} />)}</div>
        </div>
      )}

      {brands.length > 0 && (
        <div>
          <div style={{ fontSize: 11, color: '#38bdf8', fontWeight: 700, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 12 }}>🏷️ Direct Brands ({brands.length})</div>
          <div style={{ display: 'grid', gap: 10 }}>{brands.map(v => <VendorCard key={v.id} v={v} />)}</div>
        </div>
      )}

      {vendors.length === 0 && !adding && (
        <Empty icon="🏢" text="No vendors yet. Add agencies who broker deals or direct brands you work with." />
      )}
    </div>
  );
}

const T_STATUS      = ['Upcoming', 'Live', 'Completed', 'Cancelled'];
const T_COLORS      = { Upcoming: '#38bdf8', Live: '#4ade80', Completed: 'var(--t-soft)', Cancelled: '#ff6b6b' };
const T_CAT_COLORS  = { 'Paid Program': '#F5C518', 'Live Session': '#4ade80', 'Recording': '#a78bfa' };
const T_CAT_ICONS   = { 'Paid Program': '💰', 'Live Session': '🔴', 'Recording': '🎙️' };

              background: f.category === cat ? `${T_CAT_COLORS[cat]}22` : 'transparent',

        </div>
        {f.category === 'Paid Program' && (<>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 11, color: 'var(--t-muted)', marginBottom: 4 }}>Capacity</div>
            <input className="input" type="number" placeholder="e.g. 50" value={f.capacity} onChange={e => onChange({ ...f, capacity: e.target.value })} />
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 11, color: 'var(--t-muted)', marginBottom: 4 }}>Enrolled</div>
            <input className="input" type="number" placeholder="0" value={f.enrolled} onChange={e => onChange({ ...f, enrolled: e.target.value })} />
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 11, color: 'var(--t-muted)', marginBottom: 4 }}>Revenue (₹)</div>
            <input className="input" placeholder="0" value={f.revenue} onChange={e => onChange({ ...f, revenue: e.target.value })} />
          </div>
        </>)}
        {f.category === 'Recording' && (
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 11, color: 'var(--t-muted)', marginBottom: 4 }}>Duration</div>
            <input className="input" placeholder="e.g. 1h 30m" value={f.duration} onChange={e => onChange({ ...f, duration: e.target.value })} />
          </div>
        )}
      </div>
      <textarea className="input" placeholder="Notes / agenda / description..." rows={2} value={f.notes} onChange={e => onChange({ ...f, notes: e.target.value })} style={{ marginBottom: 12, resize: 'vertical' }} />
      <div style={{ display: 'flex', gap: 8 }}>
        <button className="btn-gold" onClick={onSave} disabled={loading} style={{ fontSize: 13 }}>{loading ? 'Saving...' : btnLabel}</button>
        <button className="btn-ghost" onClick={onCancel} style={{ fontSize: 13 }}>Cancel</button>
      </div>
    </div>
  );
}

function TrainingsTab() {
  const [items, setItems]   = useState([]);
  const [adding, setAdding] = useState(false);
  const [form, setForm]     = useState({ ...T_EMPTY });
  const [saving, setSaving] = useState(false);
  const [editId, setEditId] = useState(null);
  const [editForm, setEditForm] = useState({ ...T_EMPTY });
  const [updating, setUpdating] = useState(false);

  useEffect(() => {
    return db.collection('trainings').orderBy('date', 'desc').onSnapshot(snap =>
      setItems(snap.docs.map(d => ({ id: d.id, ...d.data() })))
    );
  }, []);

  const add = async () => {
    if (!form.title.trim()) return;
    setSaving(true);
    const doc = { ...form, status: 'Upcoming', createdAt: new Date().toISOString() };
    await db.collection('trainings').add(doc);
    notify('training', `${T_CAT_ICONS[form.category] || '📚'}  **Training Planned**\n> **${form.title}**\n> Category: \`${form.category}\`${form.category === 'Paid Program' ? `  ·  Type: \`${form.type}\`` : ''}${form.batch ? `  ·  Batch: ${form.batch}` : ''}${form.date ? `  ·  Date: ${fmtDate(form.date)}` : ''}${form.capacity ? `\n> Capacity: ${form.capacity}${form.enrolled ? ` enrolled: ${form.enrolled}` : ''}` : ''}${form.revenue ? `  ·  Expected Revenue: ₹${form.revenue}` : ''}${form.duration ? `  ·  Duration: ${form.duration}` : ''}`);
    setForm({ ...T_EMPTY });
    setAdding(false);
    setSaving(false);
  };

  const updateStatus = (id, status) => {
    db.collection('trainings').doc(id).update({ status });
    const item = items.find(i => i.id === id);
    if (item) notify('training', `🔄  **Training Status Updated**\n> **${item.title}**\n> Status → \`${status}\``);
  };

  const saveEdit = async () => {
    if (!editForm.title.trim()) return;
    setUpdating(true);
    await db.collection('trainings').doc(editId).update({ ...editForm });
    notify('training', `✏️  **Training Updated**\n> **${editForm.title}**\n> Category: \`${editForm.category}\`${editForm.batch ? `  ·  Batch: ${editForm.batch}` : ''}${editForm.date ? `  ·  ${fmtDate(editForm.date)}` : ''}${editForm.duration ? `  ·  Duration: ${editForm.duration}` : ''}`);
    setEditId(null);
    setUpdating(false);
  };

  const del = id => db.collection('trainings').doc(id).delete();

  const upcoming  = items.filter(i => i.status === 'Upcoming' || i.status === 'Live');
  const completed = items.filter(i => i.status === 'Completed' || i.status === 'Cancelled');
  const totalRev  = items.filter(i => i.status === 'Completed').reduce((s, i) => s + (parseFloat(i.revenue) || 0), 0);

  const Card = ({ item }) => {
    const sc  = T_COLORS[item.status] || '#888';
    const cat = item.category || 'Paid Program';
    const catCol = T_CAT_COLORS[cat] || GOLD;
    const isEditing = editId === item.id;
    const isPaid   = cat === 'Paid Program';
    const isLive   = cat === 'Live Session';
    const isRec    = cat === 'Recording';
    const fillPct  = isPaid && item.capacity && item.enrolled
      ? Math.min(100, Math.round((item.enrolled / item.capacity) * 100))
      : null;
    if (isEditing) return (
      <FormBlock f={editForm} onChange={setEditForm} onSave={saveEdit} onCancel={() => setEditId(null)} btnLabel="Save Changes" loading={updating} />
    );
    return (
      <div className="card" style={{ padding: '14px 16px', marginBottom: 10, borderLeft: `3px solid ${catCol}40` }}>
        <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            {/* Title row */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6, flexWrap: 'wrap' }}>
              <span style={{ fontSize: 15, fontWeight: 700, color: 'var(--t-heading)' }}>{item.title}</span>
              <span className="tag" style={{ background: `${sc}18`, color: sc, fontSize: 11, fontWeight: 600 }}>{item.status}</span>
              <span className="tag" style={{ background: `${catCol}18`, color: catCol, fontSize: 11, fontWeight: 600 }}>{T_CAT_ICONS[cat]} {cat}</span>
              {isPaid && item.type && <span className="tag" style={{ background: 'var(--bg-sub)', color: 'var(--t-soft)', fontSize: 11 }}>{item.type}</span>}
            </div>
            {/* Meta row */}
            <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap', fontSize: 12, color: 'var(--t-muted)', marginBottom: 6 }}>
              {item.date && <span>📅 {fmtDate(item.date)}{item.time ? ` · ${item.time}` : ''}</span>}
              {(isLive || isRec) && item.batch && <span>🏷️ {item.batch}</span>}
              {isRec && item.duration && <span>⏱️ {item.duration}</span>}
              {isPaid && item.capacity && <span>👥 {item.enrolled || 0}/{item.capacity} enrolled</span>}
              {isPaid && item.revenue && <span style={{ color: '#4ade80' }}>₹{parseFloat(item.revenue).toLocaleString('en-IN')}</span>}
            </div>
            {/* Enrollment bar — Paid Program only */}
            {fillPct !== null && (
              <div style={{ marginBottom: 6 }}>
                <div style={{ background: 'var(--border-soft)', borderRadius: 4, height: 4, overflow: 'hidden', maxWidth: 200 }}>
                  <div style={{ width: `${fillPct}%`, height: '100%', background: fillPct >= 90 ? '#4ade80' : fillPct >= 60 ? GOLD : '#38bdf8', borderRadius: 4, transition: 'width 0.3s' }} />
                </div>
                <div style={{ fontSize: 10, color: 'var(--t-soft)', marginTop: 2 }}>{fillPct}% full</div>
              </div>
            )}
            {item.notes && <div style={{ fontSize: 12, color: 'var(--t-soft)', marginTop: 4 }}>{item.notes}</div>}
          </div>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexShrink: 0 }}>
            <select className="select" value={item.status} onChange={e => updateStatus(item.id, e.target.value)} style={{ fontSize: 12, padding: '4px 8px' }}>
              {T_STATUS.map(s => <option key={s}>{s}</option>)}
            </select>
            <button onClick={() => { setEditId(item.id); setEditForm({ title: item.title || '', category: item.category || 'Paid Program', type: item.type || 'Workshop', date: item.date || '', time: item.time || '', capacity: item.capacity || '', enrolled: item.enrolled || '', revenue: item.revenue || '', batch: item.batch || '', duration: item.duration || '', notes: item.notes || '' }); }}
              style={{ background: 'none', border: 'none', color: 'var(--t-soft)', cursor: 'pointer', fontSize: 16, padding: '2px 4px' }} title="Edit">✎</button>
            <button onClick={() => del(item.id)} style={{ background: 'none', border: 'none', color: 'var(--t-faint)', cursor: 'pointer', fontSize: 18, lineHeight: 1 }}>×</button>
          </div>
        </div>
      </div>
    );
  };

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 20 }}>
        <div>
          <h1 style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>Trainings</h1>
          <div style={{ color: 'var(--t-muted)', fontSize: 13 }}>{upcoming.length} upcoming · {completed.filter(i => i.status === 'Completed').length} completed{totalRev > 0 ? ` · ₹${totalRev.toLocaleString('en-IN')} revenue` : ''}</div>
        </div>
        <button className="btn-gold" onClick={() => { setAdding(v => !v); setEditId(null); }} style={{ fontSize: 13 }}>+ Plan Training</button>
      </div>

      {/* Stat strip — status */}
      <div style={{ display: 'flex', gap: 10, marginBottom: 12 }}>
        {T_STATUS.map(s => {
          const cnt = items.filter(i => i.status === s).length;
          const col = T_COLORS[s];
          return (
            <div key={s} className="card" style={{ flex: 1, padding: '12px 14px' }}>
              <div style={{ fontSize: 10, color: 'var(--t-muted)', textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 4 }}>{s}</div>
              <div style={{ fontSize: 22, fontWeight: 800, color: col }}>{cnt}</div>
            </div>
          );
        })}
      </div>
      {/* Category breakdown */}
      <div style={{ display: 'flex', gap: 10, marginBottom: 24 }}>
        {T_CATEGORIES.map(cat => {
          const cnt = items.filter(i => (i.category || 'Paid Program') === cat).length;
          const col = T_CAT_COLORS[cat];
          const rev = cat === 'Paid Program' ? items.filter(i => (i.category || 'Paid Program') === cat && i.status === 'Completed').reduce((s, i) => s + (parseFloat(i.revenue) || 0), 0) : 0;
          return (
            <div key={cat} className="card" style={{ flex: 1, padding: '12px 14px', borderLeft: `3px solid ${col}50` }}>
              <div style={{ fontSize: 10, color: 'var(--t-muted)', letterSpacing: 0.8, marginBottom: 4 }}>{T_CAT_ICONS[cat]} {cat}</div>
              <div style={{ fontSize: 20, fontWeight: 800, color: col }}>{cnt}</div>
              {rev > 0 && <div style={{ fontSize: 11, color: '#4ade80', marginTop: 2 }}>₹{rev.toLocaleString('en-IN')}</div>}
            </div>
          );
        })}
      </div>

      {adding && (
        <FormBlock f={form} onChange={setForm} onSave={add} onCancel={() => setAdding(false)} btnLabel="Add Training" loading={saving} />
      )}

      {upcoming.length === 0 && completed.length === 0 && !adding && <Empty icon="📚" text="No trainings planned yet. Schedule your first one." />}

      {upcoming.length > 0 && (
        <div style={{ marginBottom: 24 }}>
          <div style={{ fontSize: 11, color: 'var(--t-soft)', textTransform: 'uppercase', letterSpacing: 1, fontWeight: 700, marginBottom: 12 }}>Upcoming & Live</div>
          {upcoming.map(item => <Card key={item.id} item={item} />)}
        </div>
      )}

      {completed.length > 0 && (
        <div>
          <div style={{ fontSize: 11, color: 'var(--t-soft)', textTransform: 'uppercase', letterSpacing: 1, fontWeight: 700, marginBottom: 12 }}>Completed & Cancelled</div>
          {completed.map(item => <Card key={item.id} item={item} />)}
        </div>
      )}
    </div>
  );
}

// --- SETTINGS -------------------------------------------------
function SettingsTab({ isAdmin, currentUid }) {
  const [users, setUsers] = useState([]);
  const [webhooks, setWebhooks] = useState({ pipeline: '', ideas: '', brand: '', training: '', alerts: '' });
  const [newUser, setNewUser] = useState({ name: '', email: '', password: '', role: 'member' });
  const [creating, setCreating] = useState(false);
  const [userErr, setUserErr] = useState('');
  const [whSaved, setWhSaved] = useState(false);
  const [testMsg, setTestMsg] = useState('');
  const [changingRole, setChangingRole] = useState({});
  const [summarySending, setSummarySending] = useState(false);
  const [summaryMsg, setSummaryMsg] = useState('');
  const [editingName, setEditingName] = useState({});
  const [savingName, setSavingName] = useState({});
  const [chList, setChList] = useState([]);
  const [newCh, setNewCh] = useState({ name: '', platform: 'YouTube' });
  const [addingCh, setAddingCh] = useState(false);
  const [billing, setBilling] = useState({ companyName: '', gstin: '', pan: '', address: '', bankName: '', accountHolder: '', accountType: 'Savings', accountNo: '', ifsc: '', upi: '' });
  const [billingSaved, setBillingSaved] = useState(false);

  useEffect(() => {
    db.collection('users').get().then(s => setUsers(s.docs.map(d => ({ id: d.id, ...d.data() }))));
    db.collection('settings').doc('webhooks').get().then(d => { if (d.exists) setWebhooks(d.data()); });
    db.collection('settings').doc('billing').get().then(d => { if (d.exists) setBilling(prev => ({ ...prev, ...d.data() })); });
    db.collection('channels').orderBy('createdAt', 'asc').get().then(s => setChList(s.docs.map(d => ({ id: d.id, ...d.data() }))));
  }, []);

  const saveBilling = async () => {
    await db.collection('settings').doc('billing').set(billing);
    setBillingSaved(true);
    setTimeout(() => setBillingSaved(false), 2500);
  };

  const addChannel = async () => {
    if (!newCh.name.trim()) return;
    setAddingCh(true);
    const ref = await db.collection('channels').add({ name: newCh.name.trim(), platform: newCh.platform, createdAt: new Date().toISOString() });
    setChList(prev => [...prev, { id: ref.id, name: newCh.name.trim(), platform: newCh.platform }]);
    setNewCh({ name: '', platform: 'YouTube' });
    setAddingCh(false);
  };

  const deleteChannel = async (id) => {
    await db.collection('channels').doc(id).delete();
    setChList(prev => prev.filter(c => c.id !== id));
  };

  const saveWebhooks = async () => {
    await db.collection('settings').doc('webhooks').set(webhooks);
    setWhSaved(true);
    setTimeout(() => setWhSaved(false), 2500);
  };

  const testWebhook = async (channel) => {
    setTestMsg('Sending...');
    await notify(channel, `✅ Test from GrowGuru Hub — ${channel} webhook is working!`);
    setTestMsg('Sent ✓');
    setTimeout(() => setTestMsg(''), 3000);
  };

  const sendDailySummary = async () => {
    setSummarySending(true);
    setSummaryMsg('');
    try {
      const today = todayStr();

      // Fetch all collections in parallel
      const [tasksSnap, pipeSnap, dealsSnap, ideasSnap, trainSnap] = await Promise.all([
        db.collection('tasks').get(),
        db.collection('pipeline').get(),
        db.collection('deals').get(),
        db.collection('ideas').get(),
        db.collection('trainings').get(),
      ]);

      const allTasks   = tasksSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      const todayTasks = allTasks.filter(t => t.date === today);
      const overdueTasks = allTasks.filter(t => t.date < today && !t.done);

      const pipeline      = pipeSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      const overduePipe   = pipeline.filter(p => p.publishDate && p.publishDate < today && p.stage !== 'Published');

      const deals         = dealsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      const activeDeals   = deals.filter(d => !['Paid'].includes(d.stage));
      const overdueDeals  = deals.filter(d => d.deadline && d.deadline < today && !['Paid'].includes(d.stage));

      const todayIdeas    = ideasSnap.docs.map(d => ({ id: d.id, ...d.data() }))
        .filter(i => i.createdAt && i.createdAt.startsWith(today));

      const allTrainings  = trainSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      const todayTrainings = allTrainings.filter(t => t.date === today);
      const upcomingTrainings = allTrainings.filter(t => t.date > today && t.status === 'Upcoming').slice(0, 3);

      const doneTasks    = todayTasks.filter(t => t.done);
      const pendingTasks = todayTasks.filter(t => !t.done);
      const activeVids   = pipeline.filter(p => p.stage !== 'Published');
      const pubToday     = pipeline.filter(p => p.publishDate === today);
      const hasOverdue   = overdueTasks.length || overduePipe.length || overdueDeals.length;

      // Build embed fields
      const fields = [];

      // Tasks field
      let taskVal = todayTasks.length === 0 ? '_No tasks logged today_' : '';
      if (todayTasks.length > 0) {
        const taskLines = [];
        doneTasks.slice(0, 4).forEach(t => taskLines.push(`✅ \`${t.priority}\` ${t.title}`));
        pendingTasks.slice(0, 4).forEach(t => taskLines.push(`⬜ \`${t.priority}\` ${t.title}`));
        if (todayTasks.length > 8) taskLines.push(`_...and ${todayTasks.length - 8} more_`);
        taskVal = taskLines.join('\n');
      }
      fields.push({ name: `✅ TODAY'S TASKS — ${doneTasks.length}/${todayTasks.length} done`, value: taskVal, inline: false });

      // Pipeline field
      const pipeLines = [];
      ['Idea','Script','Record','Edit','Review'].forEach(s => {
        const grp = pipeline.filter(p => p.stage === s);
        if (grp.length) pipeLines.push(`\`${s}\` — ${grp.length} video${grp.length > 1 ? 's' : ''}`);
      });
      if (pubToday.length) pipeLines.push(`🚀 **Due today:** ${pubToday.map(p => p.title).join(', ')}`);
      fields.push({ name: `🎬 CONTENT PIPELINE — ${activeVids.length} active`, value: pipeLines.length ? pipeLines.join('\n') : '_No active videos_', inline: false });

      // Deals field
      const dealLines = [];
      ['Lead','Negotiation','Confirmed','Script Approval','Live','Invoiced'].forEach(s => {
        const grp = deals.filter(d => d.stage === s);
        if (grp.length) dealLines.push(`\`${s}\` — ${grp.map(d => `${d.brand}${d.agreedRate ? ` ₹${d.agreedRate}` : ''}`).join(', ')}`);
      });
      fields.push({ name: `💼 BRAND DEALS — ${activeDeals.length} active`, value: dealLines.length ? dealLines.join('\n') : '_No active deals_', inline: false });

      // Overdue field
      if (hasOverdue) {
        const ovLines = [];
        if (overdueTasks.length) ovLines.push(`🔴 **${overdueTasks.length} task${overdueTasks.length > 1 ? 's' : ''}** incomplete from past days`);
        if (overduePipe.length) ovLines.push(`🎬 **${overduePipe.length} video${overduePipe.length > 1 ? 's' : ''}** past publish date: ${overduePipe.map(p => p.title).slice(0, 3).join(', ')}`);
        if (overdueDeals.length) ovLines.push(`💼 **${overdueDeals.length} deal${overdueDeals.length > 1 ? 's' : ''}** past deadline: ${overdueDeals.map(d => `${d.brand} (${fmtDate(d.deadline)})`).join(', ')}`);
        fields.push({ name: '⚠️ OVERDUE / NEEDS FOLLOW-UP', value: ovLines.join('\n'), inline: false });
      } else {
        fields.push({ name: '✨ ALL CLEAR', value: 'No overdue tasks, videos, or deals.', inline: false });
      }

      // Trainings field
      if (todayTrainings.length || upcomingTrainings.length) {
        const tLines = [];
        todayTrainings.forEach(t => tLines.push(`🔴 **TODAY:** ${t.title}${t.time ? ` @ ${t.time}` : ''} — \`${t.type}\`${t.enrolled ? ` · ${t.enrolled} enrolled` : ''}`));
        upcomingTrainings.forEach(t => tLines.push(`📅 ${fmtDate(t.date)} — ${t.title} (\`${t.type}\`)`));
        fields.push({ name: `📚 TRAININGS`, value: tLines.join('\n'), inline: false });
      }

      // Ideas field
      if (todayIdeas.length) {
        fields.push({ name: `💡 IDEAS CAPTURED TODAY (${todayIdeas.length})`, value: todayIdeas.slice(0, 5).map(i => `• ${i.text}`).join('\n'), inline: false });
      }

      const embed = {
        title: '📊  GrowGuru Hub — Daily Summary',
        description: `📅 ${fmtDateFull()}`,
        color: 16106776,
        fields,
        footer: { text: 'GrowGuru Hub CMS' },
        timestamp: new Date().toISOString(),
      };

      // Get alerts webhook URL
      const wDoc = await db.collection('settings').doc('webhooks').get();
      if (!wDoc.exists || !wDoc.data().alerts) {
        setSummaryMsg('⚠️ No Alerts webhook saved. Paste one above and hit Save Webhooks first.');
        setSummarySending(false);
        return;
      }
      const url = wDoc.data().alerts;
      const resp = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ embeds: [embed] })
      });
      if (resp.ok || resp.status === 204) {
        setSummaryMsg('✅ Summary posted to Discord!');
      } else {
        setSummaryMsg(`❌ Discord returned ${resp.status}. Check webhook URL.`);
      }
    } catch (e) {
      setSummaryMsg(`❌ Error: ${e.message}`);
    }
    setSummarySending(false);
    setTimeout(() => setSummaryMsg(''), 7000);
  };

  const changeRole = async (uid, newRole) => {
    setChangingRole(prev => ({ ...prev, [uid]: true }));
    await db.collection('users').doc(uid).update({ role: newRole });
    setUsers(prev => prev.map(u => u.id === uid ? { ...u, role: newRole } : u));
    setChangingRole(prev => ({ ...prev, [uid]: false }));
  };

  const startEditName = (uid, currentName) => {
    setEditingName(prev => ({ ...prev, [uid]: currentName }));
  };

  const cancelEditName = (uid) => {
    setEditingName(prev => { const n = { ...prev }; delete n[uid]; return n; });
  };

  const saveName = async (uid) => {
    const newName = (editingName[uid] || '').trim();
    if (!newName) return;
    setSavingName(prev => ({ ...prev, [uid]: true }));
    await db.collection('users').doc(uid).update({ name: newName });
    setUsers(prev => prev.map(u => u.id === uid ? { ...u, name: newName } : u));
    cancelEditName(uid);
    setSavingName(prev => { const n = { ...prev }; delete n[uid]; return n; });
  };

  const createUser = async () => {
    if (!newUser.name || !newUser.email || !newUser.password) { setUserErr('All fields required.'); return; }
    if (newUser.password.length < 6) { setUserErr('Password must be at least 6 characters.'); return; }
    setCreating(true);
    setUserErr('');
    try {
      const appName = 'temp_' + Date.now();
      const sec = firebase.initializeApp(firebase.app().options, appName);
      const cred = await sec.auth().createUserWithEmailAndPassword(newUser.email, newUser.password);
      await db.collection('users').doc(cred.user.uid).set({ name: newUser.name, email: newUser.email, role: newUser.role, createdAt: todayStr() });
      notify('alerts', `👤  **New Member Added**\n> Name: **${newUser.name}**\n> Email: ${newUser.email}\n> Role: \`${newUser.role.toUpperCase()}\``);
      await sec.auth().signOut();
      sec.delete();
      setUsers(prev => [...prev, { id: cred.user.uid, name: newUser.name, email: newUser.email, role: newUser.role }]);
      setNewUser({ name: '', email: '', password: '', role: 'member' });
    } catch (e) {
      setUserErr(e.message);
    }
    setCreating(false);
  };

  return (
    <div style={{ display: 'grid', gap: 20 }}>
      <h1 style={{ fontSize: 20, fontWeight: 700 }}>Settings</h1>

      {/* Billing Details */}
      <div className="card" style={{ padding: 20 }}>
        <h2 style={{ fontSize: 15, fontWeight: 700, marginBottom: 4, color: 'var(--t-bright)' }}>🧾 My Billing Details</h2>
        <p style={{ fontSize: 12, color: 'var(--t-muted)', marginBottom: 16 }}>Appears on every invoice you print. GSTIN optional — add when registered.</p>
        <div style={{ display: 'flex', gap: 8, marginBottom: 10, flexWrap: 'wrap' }}>
          <input className="input" placeholder="Company / Creator Name *" value={billing.companyName} onChange={e => setBilling({ ...billing, companyName: e.target.value })} style={{ flex: 2, minWidth: 160 }} />
          <input className="input" placeholder="GSTIN (optional)" value={billing.gstin} onChange={e => setBilling({ ...billing, gstin: e.target.value })} style={{ flex: 1, minWidth: 130 }} />
          <input className="input" placeholder="PAN Number" value={billing.pan} onChange={e => setBilling({ ...billing, pan: e.target.value.toUpperCase() })} style={{ flex: 1, minWidth: 120 }} />
        </div>
        <textarea className="input" placeholder="Your business address (appears on invoice)" value={billing.address} onChange={e => setBilling({ ...billing, address: e.target.value })} rows={2} style={{ marginBottom: 10, resize: 'vertical', fontFamily: 'inherit' }} />
        <div style={{ fontSize: 11, color: 'var(--t-muted)', marginBottom: 8, fontWeight: 600 }}>Bank Details (for payment collection)</div>
        <div style={{ display: 'flex', gap: 8, marginBottom: 10, flexWrap: 'wrap' }}>
          <input className="input" placeholder="Bank Name" value={billing.bankName} onChange={e => setBilling({ ...billing, bankName: e.target.value })} style={{ flex: 1, minWidth: 130 }} />
          <input className="input" placeholder="Account Number" value={billing.accountNo} onChange={e => setBilling({ ...billing, accountNo: e.target.value })} style={{ flex: 1, minWidth: 130 }} />
          <input className="input" placeholder="IFSC Code" value={billing.ifsc} onChange={e => setBilling({ ...billing, ifsc: e.target.value })} style={{ flex: 1, minWidth: 100 }} />
        </div>
        <div style={{ display: 'flex', gap: 8, marginBottom: 10, flexWrap: 'wrap' }}>
          <input className="input" placeholder="Account Holder Name" value={billing.accountHolder} onChange={e => setBilling({ ...billing, accountHolder: e.target.value })} style={{ flex: 2, minWidth: 160 }} />
          <select className="select" value={billing.accountType} onChange={e => setBilling({ ...billing, accountType: e.target.value })} style={{ flex: 1, minWidth: 120 }}>
            <option value="Savings">Savings Account</option>
            <option value="Current">Current Account</option>
          </select>
        </div>
        <input className="input" placeholder="UPI ID (optional)" value={billing.upi} onChange={e => setBilling({ ...billing, upi: e.target.value })} style={{ marginBottom: 12 }} />
        <button className="btn-gold" onClick={saveBilling} style={{ fontSize: 13 }}>{billingSaved ? '✓ Saved' : 'Save Billing Details'}</button>
      </div>

      {/* Discord */}
      <div className="card" style={{ padding: 20 }}>
        <h2 style={{ fontSize: 15, fontWeight: 700, marginBottom: 4, color: 'var(--t-bright)' }}>Discord Webhooks</h2>
        <p style={{ fontSize: 12, color: 'var(--t-muted)', marginBottom: 18 }}>Paste webhook URLs for each pillar channel. Notifications will route automatically.</p>
        {[
          ['pipeline', '🎬 Content Pipeline', 'New content added, pipeline edits, task updates'],
          ['ideas',    '💡 Ideas Channel',    'Every idea captured — separate from pipeline for cleaner tracking'],
          ['brand',    '💼 Brand Channel',    'New deals, stage changes, POC details'],
          ['training', '📚 Training Channel', 'Training program updates and announcements'],
          ['alerts',   '⚙️ Alerts & Summary', 'New members, daily summary digest'],
        ].map(([key, label, hint]) => (
          <div key={key} style={{ marginBottom: 14 }}>
            <label style={{ display: 'block', fontSize: 12, color: 'var(--t-muted)', marginBottom: 3 }}>{label}</label>
            <div style={{ fontSize: 11, color: 'var(--t-soft)', marginBottom: 5 }}>{hint}</div>
            <div style={{ display: 'flex', gap: 8 }}>
              <input className="input" type="url" placeholder="https://discord.com/api/webhooks/..." value={webhooks[key] || ''}
                onChange={e => setWebhooks({ ...webhooks, [key]: e.target.value })} style={{ flex: 1 }} />
              <button className="btn-ghost" onClick={() => testWebhook(key)} style={{ fontSize: 12, whiteSpace: 'nowrap' }}>Test</button>
            </div>
          </div>
        ))}
        {testMsg && <div style={{ fontSize: 12, color: '#4ade80', marginBottom: 10 }}>{testMsg}</div>}
        <button className="btn-gold" onClick={saveWebhooks} style={{ fontSize: 13 }}>{whSaved ? '✓ Saved' : 'Save Webhooks'}</button>
      </div>

      {/* Daily Summary */}
      <div className="card" style={{ padding: 20, borderColor: '#F5C51830' }}>
        <h2 style={{ fontSize: 15, fontWeight: 700, marginBottom: 4, color: 'var(--t-bright)' }}>📊 Daily Summary</h2>
        <p style={{ fontSize: 12, color: 'var(--t-muted)', marginBottom: 16 }}>Posts a full digest to your Discord Alerts channel — tasks done/pending, pipeline status, active deals, overdue items, and ideas captured today.</p>
        <div style={{ background: 'var(--bg-sub)', borderRadius: 8, padding: '12px 14px', marginBottom: 16, fontSize: 12, color: 'var(--t-soft)', lineHeight: 1.8 }}>
          <div>✅ Today's tasks — done vs pending, by priority</div>
          <div>🎬 Pipeline — active videos per stage, what's due today</div>
          <div>💼 Brand deals — active deals per stage with amounts</div>
          <div>⚠️ Overdue — incomplete tasks, missed publish dates, past-deadline deals</div>
          <div>💡 Ideas — everything captured today</div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <button className="btn-gold" onClick={sendDailySummary} disabled={summarySending} style={{ fontSize: 13 }}>
            {summarySending ? 'Posting...' : '📨 Post Summary to Discord'}
          </button>
          {summaryMsg && <span style={{ fontSize: 12, color: summaryMsg.startsWith('✅') ? '#4ade80' : summaryMsg.startsWith('⚠️') ? GOLD : '#ff6b6b' }}>{summaryMsg}</span>}
        </div>
        <div style={{ fontSize: 11, color: 'var(--t-soft)', marginTop: 10 }}>Requires Alerts webhook to be saved above. Click any time — morning check-in, end of day, whenever you need a snapshot.</div>
      </div>

      {/* Channels */}
      <div className="card" style={{ padding: 20 }}>
        <h2 style={{ fontSize: 15, fontWeight: 700, marginBottom: 4, color: 'var(--t-bright)' }}>📡 Channels</h2>
        <p style={{ fontSize: 12, color: 'var(--t-muted)', marginBottom: 16 }}>Manage your publishing channels. These appear in the Pipeline dropdown.</p>

        {/* Grouped by platform */}
        {PLATFORMS.map(plat => {
          const grp = chList.filter(c => c.platform === plat);
          if (!grp.length) return null;
          const col = PLATFORM_COLORS[plat];
          return (
            <div key={plat} style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: col, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 7 }}>{plat}</div>
              {grp.map(ch => (
                <div key={ch.id} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '7px 12px', background: 'var(--bg-sub)', borderRadius: 7, marginBottom: 5 }}>
                  <span style={{ fontSize: 13, color: 'var(--t-bright)' }}>{ch.name}</span>
                  <button onClick={() => deleteChannel(ch.id)} style={{ background: 'none', border: 'none', color: 'var(--t-faint)', cursor: 'pointer', fontSize: 16, lineHeight: 1, padding: '0 4px' }} title="Remove channel">✕</button>
                </div>
              ))}
            </div>
          );
        })}

        {chList.length === 0 && <div style={{ fontSize: 13, color: 'var(--t-soft)', marginBottom: 14 }}>No channels yet.</div>}

        {/* Add new channel */}
        <div style={{ display: 'flex', gap: 8, marginTop: 10, alignItems: 'center' }}>
          <input className="input" placeholder="Channel name" value={newCh.name}
            onChange={e => setNewCh({ ...newCh, name: e.target.value })}
            onKeyDown={e => e.key === 'Enter' && addChannel()}
            style={{ flex: 2, fontSize: 13 }} />
          <select className="select" value={newCh.platform} onChange={e => setNewCh({ ...newCh, platform: e.target.value })} style={{ flex: 1, fontSize: 13 }}>
            {PLATFORMS.map(p => <option key={p}>{p}</option>)}
          </select>
          <button className="btn-gold" onClick={addChannel} disabled={addingCh || !newCh.name.trim()} style={{ fontSize: 13, whiteSpace: 'nowrap' }}>
            {addingCh ? '...' : '+ Add'}
          </button>
        </div>
      </div>

      {/* Users */}
      <div className="card" style={{ padding: 20 }}>
        <h2 style={{ fontSize: 15, fontWeight: 700, marginBottom: 16, color: 'var(--t-bright)' }}>Team Members</h2>
        {users.map(u => {
          const roleColor = u.role === 'admin' ? GOLD : u.role === 'partner' ? '#38bdf8' : 'var(--t-soft)';
          const roleBg = u.role === 'admin' ? 'var(--a18)' : u.role === 'partner' ? '#38bdf818' : 'var(--bg-sub)';
          const canEditThisName = isAdmin || u.id === currentUid;
          const isEditingThis = editingName.hasOwnProperty(u.id);
          return (
            <div key={u.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 0', borderBottom: '1px solid #1c1c1c' }}>
              <div style={{ flex: 1, minWidth: 0, marginRight: 12 }}>
                {isEditingThis ? (
                  <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                    <input
                      className="input"
                      value={editingName[u.id]}
                      onChange={e => setEditingName(prev => ({ ...prev, [u.id]: e.target.value }))}
                      onKeyDown={e => { if (e.key === 'Enter') saveName(u.id); if (e.key === 'Escape') cancelEditName(u.id); }}
                      autoFocus
                      style={{ fontSize: 13, padding: '5px 10px', maxWidth: 200 }}
                    />
                    <button className="btn-gold" onClick={() => saveName(u.id)} disabled={savingName[u.id]} style={{ fontSize: 11, padding: '5px 12px' }}>
                      {savingName[u.id] ? '...' : 'Save'}
                    </button>
                    <button className="btn-ghost" onClick={() => cancelEditName(u.id)} style={{ fontSize: 11, padding: '5px 10px' }}>✕</button>
                  </div>
                ) : (
                  <div style={{ display: 'flex', alignItems: 'center', gap: 7 }}>
                    <span style={{ fontSize: 14, color: 'var(--t-bright)' }}>{u.name}</span>
                    {u.id === currentUid && <span style={{ fontSize: 10, color: 'var(--t-soft)' }}>(you)</span>}
                    {canEditThisName && (
                      <button onClick={() => startEditName(u.id, u.name)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--t-soft)', fontSize: 12, padding: '2px 4px', lineHeight: 1 }} title="Edit name">✎</button>
                    )}
                  </div>
                )}
                <div style={{ fontSize: 12, color: 'var(--t-muted)', marginTop: 2 }}>{u.email}</div>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0 }}>
                <span className="tag" style={{ background: roleBg, color: roleColor, fontSize: 10, fontWeight: 700, letterSpacing: 0.5, textTransform: 'uppercase' }}>{u.role}</span>
                {isAdmin && u.role !== 'admin' && (
                  <select className="select" value={u.role} disabled={changingRole[u.id]}
                    onChange={e => changeRole(u.id, e.target.value)}
                    style={{ fontSize: 11, padding: '3px 8px', color: 'var(--t-muted)' }}>
                    <option value="member">Member</option>
                    <option value="partner">Partner</option>
                  </select>
                )}
              </div>
            </div>
          );
        })}

        <h3 style={{ fontSize: 13, fontWeight: 600, color: 'var(--t-soft)', margin: '20px 0 12px' }}>Add New Member</h3>
        <div style={{ display: 'grid', gap: 10, gridTemplateColumns: '1fr 1fr 1fr 1fr', marginBottom: 10 }}>
          <input className="input" placeholder="Name" value={newUser.name} onChange={e => setNewUser({ ...newUser, name: e.target.value })} />
          <input className="input" placeholder="Email" type="email" value={newUser.email} onChange={e => setNewUser({ ...newUser, email: e.target.value })} />
          <input className="input" placeholder="Password (min 6 chars)" type="password" value={newUser.password} onChange={e => setNewUser({ ...newUser, password: e.target.value })} />
          <select className="select" value={newUser.role} onChange={e => setNewUser({ ...newUser, role: e.target.value })} style={{ fontSize: 13 }}>
            <option value="member">Member — Basic Access</option>
            <option value="partner">Partner — Limited Admin</option>
          </select>
        </div>
        {userErr && <div style={{ fontSize: 12, color: '#ff6b6b', marginBottom: 10 }}>{userErr}</div>}
        <button className="btn-gold" onClick={createUser} disabled={creating} style={{ fontSize: 13 }}>{creating ? 'Creating...' : 'Create Member'}</button>
      </div>
    </div>
  );
}

// --- SHARED COMPONENTS ----------------------------------------
function Empty({ icon, text }) {
  return (
    <div style={{ textAlign: 'center', padding: '64px 20px', color: 'var(--t-soft)' }}>
      <div style={{ fontSize: 36, marginBottom: 12 }}>{icon}</div>
      <div style={{ fontSize: 14 }}>{text}</div>
    </div>
  );
}

// --- RENDER ---------------------------------------------------
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
