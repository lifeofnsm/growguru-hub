                      {isDueSoon && !isOverdue && notPublished && <span className="tag" style={{ background: `${GOLD}18`, color: GOLD, fontSize: 10, fontWeight: 700 }}>⏰ {nearest === 0 ? 'DUE TODAY' : `${nearest}d`}</span>}
                    </div>
                    <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', alignItems: 'center' }}>
                      <span className="tag" style={{ background: '#1e1e1e', color: '#ccc' }}>{item.channel}</span>
                      {item.platform && <span className="tag" style={{ background: `${PLATFORM_COLORS[item.platform] || '#888'}18`, color: PLATFORM_COLORS[item.platform] || '#888', fontSize: 10 }}>{item.platform}</span>}
                      {item.recurring
                        ? <span className="tag" style={{ background: '#38bdf818', color: '#38bdf8' }}>🔁 {item.frequency || 'Recurring'}</span>
                        : <span className="tag" style={{ background: '#1e1e1e', color: '#888' }}>1️⃣ One-time</span>}
                      {item.brandDeal && <span className="tag" style={{ background: `${GOLD}18`, color: GOLD }}>💼 {item.brandName || 'Brand Deal'}</span>}
                      {item.brandDeal && item.agreedRate && <span style={{ fontSize: 11, color: '#4ade80', fontWeight: 600 }}>₹{item.agreedRate}</span>}
                    </div>
                    {/* Stage dates row */}
                    {(item.recordDate || item.editDate || item.publishDate) && (
                      <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap', marginTop: 7, fontSize: 11 }}>
                        {item.recordDate && <span style={{ color: dateCol(rd) }}>🎙️ {fmtDate(item.recordDate)}<span style={{ color: dateCol(rd), fontWeight: rd !== null && rd <= 3 ? 700 : 400 }}>{dateLabel(rd)}</span></span>}
                        {item.editDate   && <span style={{ color: dateCol(ed) }}>✂️ {fmtDate(item.editDate)}<span style={{ color: dateCol(ed), fontWeight: ed !== null && ed <= 3 ? 700 : 400 }}>{dateLabel(ed)}</span></span>}
                        {item.publishDate && <span style={{ color: dateCol(pd) }}>📅 {item.recurring ? 'Next: ' : ''}{fmtDate(item.publishDate)}<span style={{ fontWeight: pd !== null && pd <= 3 ? 700 : 400 }}>{dateLabel(pd)}</span></span>}
                      </div>
                    )}
                    {item.brandDeal && item.pocName && <div style={{ fontSize: 11, color: '#666', marginTop: 5 }}>POC: {item.pocName}{item.pocContact ? ` · ${item.pocContact}` : ''}</div>}
                    {item.notes && <div style={{ fontSize: 12, color: '#888', marginTop: 4 }}>{item.notes}</div>}
                  </div>
                  <div style={{ display: 'flex', gap: 6, alignItems: 'center', flexShrink: 0 }}>
                    <select className="select" value={item.stage} onChange={e => updateStage(item.id, e.target.value)} style={{ fontSize: 12, padding: '4px 8px' }}>
                      {P_STAGES.map(s => <option key={s}>{s}</option>)}
                    </select>
                    <button onClick={() => { startEdit(item); setAdding(false); }} title="Edit" style={{ background: 'none', border: '1px solid #2a2a2a', borderRadius: 6, color: '#888', cursor: 'pointer', fontSize: 13, padding: '3px 8px', lineHeight: 1 }}>✎</button>
                    <button onClick={() => del(item.id)} style={{ background: 'none', border: 'none', color: '#555', cursor: 'pointer', fontSize: 18, lineHeight: 1 }}>×</button>
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

// --- DEALS ----------------------------------------------------
const D_EMPTY = { brand: '', brandId: '', stage: 'Lead', contact: '', contactedVia: 'Direct', platform: '', agencyId: '', commission: '', agreedRate: '', deliverables: '', paymentStatus: 'Pending', deadline: '', paymentDue: '', notes: '' };

function DealsTab() {
  const [deals, setDeals]       = useState([]);
  const [vendors, setVendors]   = useState([]);
  const [form, setForm]         = useState({ ...D_EMPTY });
  const [adding, setAdding]     = useState(false);
  const [saving, setSaving]     = useState(false);
  const [editId, setEditId]     = useState(null);
  const [editForm, setEditForm] = useState({ ...D_EMPTY });
  const [updating, setUpdating] = useState(false);

  useEffect(() => {
    const u1 = db.collection('deals').orderBy('createdAt', 'desc').onSnapshot(snap => setDeals(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
    const u2 = db.collection('vendors').onSnapshot(snap => setVendors(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
    return () => { u1(); u2(); };
  }, []);

  const add = async () => {
    if (!form.brand.trim()) return;
    setSaving(true);
    await db.collection('deals').add({ ...form, createdAt: new Date().toISOString() });
    notify('brand', `💼  **New Deal Added**\n> Brand: **${form.brand}**\n> Stage: \`${form.stage}\`${form.agreedRate ? `  ·  ₹${form.agreedRate}` : ''}${form.contact ? `\n> POC: ${form.contact}` : ''}${form.deadline ? `\n> Deadline: ${fmtDate(form.deadline)}` : ''}`);
    setForm({ ...D_EMPTY });
    setAdding(false);
    setSaving(false);
  };

  const startEdit = (deal) => {
    setEditId(deal.id);
    setEditForm({ brand: deal.brand || '', brandId: deal.brandId || '', stage: deal.stage || 'Lead', contact: deal.contact || '', contactedVia: deal.contactedVia || 'Direct', platform: deal.platform || '', agencyId: deal.agencyId || '', commission: deal.commission || '', agreedRate: deal.agreedRate || '', deliverables: deal.deliverables || '', paymentStatus: deal.paymentStatus || 'Pending', deadline: deal.deadline || '', paymentDue: deal.paymentDue || '', notes: deal.notes || '' });
    setAdding(false);
  };

  const saveEdit = async () => {
    if (!editForm.brand.trim()) return;
    setUpdating(true);
    const prev = deals.find(d => d.id === editId);
    await db.collection('deals').doc(editId).update({ ...editForm });
    // ── Sync → invoice: push rate / payment / dueDate changes to linked collab ──
    const collabSync = {};
    if (editForm.agreedRate !== prev?.agreedRate) collabSync.amount = editForm.agreedRate;
    if (editForm.paymentDue !== prev?.paymentDue) collabSync.dueDate = editForm.paymentDue;
    if (editForm.paymentStatus === 'Paid' && prev?.paymentStatus !== 'Paid') {
      collabSync.status = 'Paid';
      collabSync.paidDate = todayStr();
    }
    if (Object.keys(collabSync).length) {
      const snap = await db.collection('collabs').where('linkedDealId', '==', editId).get();
      if (!snap.empty) {
        const batch = db.batch();
        snap.docs.forEach(doc => batch.update(doc.ref, collabSync));
        await batch.commit();
      }
    }
    notify('brand', `✏️  **Deal Updated**\n> **${editForm.brand}**\n> Stage: \`${editForm.stage}\`${editForm.agreedRate ? `  ·  ₹${editForm.agreedRate}` : ''}${editForm.deadline ? `\n> Deadline: ${fmtDate(editForm.deadline)}` : ''}`);
    setEditId(null);
    setUpdating(false);
  };

  const updateStage = async (id, stage) => {
    await db.collection('deals').doc(id).update({ stage });
    const d = deals.find(x => x.id === id);
    // ── Sync → invoice: deal Paid → mark linked invoice Paid ──
    if (stage === 'Paid') {
      const snap = await db.collection('collabs').where('linkedDealId', '==', id).get();
      if (!snap.empty) {
        const batch = db.batch();
        snap.docs.forEach(doc => batch.update(doc.ref, { status: 'Paid', paidDate: todayStr() }));
        await batch.commit();
      }
    }
    notify('brand', `🔄  **Deal Stage Updated**\n> **${d?.brand}**\n> Moved to: \`${stage}\`${d?.agreedRate ? `  ·  ₹${d.agreedRate}` : ''}`);
  };

  const del = id => db.collection('deals').doc(id).delete();

  const generateInvoice = async (deal) => {
    const invNo = await autoInvoiceNo();
    await db.collection('collabs').add({
      brand: deal.brand || '',
      invoiceNo: invNo,
      description: deal.deliverables || '',
      amount: deal.agreedRate || '',
      channel: deal.platform || '',
      poc: deal.contact || '',
      deliverable: 'Integration',
      invoiceDate: todayStr(),
      dueDate: deal.paymentDue || '',
      status: 'Pending',
      paidDate: '',
      notes: `Generated from Deal: ${deal.brand}`,
      linkedDealId: deal.id,
      createdAt: new Date().toISOString(),
    });
    await db.collection('deals').doc(deal.id).update({ stage: 'Invoiced', invoiceNo: invNo });
    notify('brand', `🧾  **Invoice Generated**\n> **${deal.brand}**  ·  ${invNo}\n> ₹${deal.agreedRate || '—'}  ·  Deal → Invoiced`);
  };

  // Shared form — vendor-aware (brand selector + contacted via + agency selector)
  const DealForm = ({ f, onChange, onSave, onCancel, btnLabel, loading, accentColor }) => {
    const brandVendors  = vendors.filter(v => v.type === 'Brand');
    const agencyVendors = vendors.filter(v => v.type === 'Agency');
    const gross = parseFloat(f.agreedRate) || 0;
    const comm  = parseFloat(f.commission) || 0;
    const net   = gross && f.contactedVia === 'Agency' && comm ? Math.round(gross * (1 - comm / 100)) : null;

    const pickBrand  = id => { const v = vendors.find(x => x.id === id); if (v) onChange({ ...f, brandId: v.id, brand: v.name, contact: v.contactPerson || f.contact }); };
    const pickAgency = id => { const v = vendors.find(x => x.id === id); if (v) onChange({ ...f, agencyId: v.id, platform: v.name, commission: v.commission || '' }); };

    return (
      <div className="card fade" style={{ padding: 18, marginBottom: 20, borderColor: `${accentColor}44` }}>

        {/* Brand row */}
        <div style={{ marginBottom: 10 }}>
          <div style={{ fontSize: 11, color: '#888', marginBottom: 5 }}>🏷️ Brand</div>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            {brandVendors.length > 0 && (
              <select className="select" value={f.brandId || ''} onChange={e => pickBrand(e.target.value)} style={{ minWidth: 150 }}>
                <option value="">↓ Saved brands</option>
                {brandVendors.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
              </select>
            )}
            <input className="input" placeholder="Brand name *" value={f.brand} onChange={e => onChange({ ...f, brand: e.target.value, brandId: '' })} style={{ flex: 1, minWidth: 140 }} autoFocus />
          </div>
        </div>

        {/* Contacted via */}
        <div style={{ marginBottom: 10 }}>
          <div style={{ fontSize: 11, color: '#888', marginBottom: 6 }}>📞 Contacted via</div>
          <div style={{ display: 'flex', gap: 6 }}>
            {['Direct', 'Agency'].map(opt => (
              <button key={opt} type="button"
                onClick={() => onChange({ ...f, contactedVia: opt, ...(opt === 'Direct' ? { agencyId: '', platform: '', commission: '' } : {}) })}
                style={{ padding: '6px 16px', borderRadius: 20, fontSize: 12, cursor: 'pointer', fontWeight: f.contactedVia === opt ? 700 : 400,
                  background: f.contactedVia === opt ? (opt === 'Direct' ? '#38bdf820' : `${GOLD}20`) : 'transparent',
                  color: f.contactedVia === opt ? (opt === 'Direct' ? '#38bdf8' : GOLD) : '#555',
                  border: `1px solid ${f.contactedVia === opt ? (opt === 'Direct' ? '#38bdf8' : GOLD) : '#222'}`, transition: 'all 0.15s' }}>
                {opt === 'Direct' ? '🤝 Direct' : '🏢 Via Agency'}
              </button>
            ))}
          </div>
        </div>

        {/* Agency box */}
        {f.contactedVia === 'Agency' && (
          <div style={{ marginBottom: 10, padding: '12px 14px', background: `${GOLD}08`, border: `1px solid ${GOLD}22`, borderRadius: 8 }}>
            <div style={{ fontSize: 11, color: '#888', marginBottom: 8 }}>🏢 Agency</div>
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 8 }}>
              {agencyVendors.length > 0 && (
                <select className="select" value={f.agencyId || ''} onChange={e => pickAgency(e.target.value)} style={{ minWidth: 150 }}>
                  <option value="">↓ Saved agencies</option>
                  {agencyVendors.map(v => <option key={v.id} value={v.id}>{v.name}{v.commission ? ` (${v.commission}%)` : ''}</option>)}
                </select>
              )}
              <input className="input" placeholder="Agency name" value={f.platform} onChange={e => onChange({ ...f, platform: e.target.value, agencyId: '' })} style={{ flex: 1, minWidth: 120 }} />
              <input className="input" placeholder="Commission %" type="number" value={f.commission} onChange={e => onChange({ ...f, commission: e.target.value })} style={{ width: 100 }} />
            </div>
            {net !== null && (
              <div style={{ fontSize: 12, color: '#888' }}>
                Gross <span style={{ color: '#ccc' }}>₹{gross.toLocaleString('en-IN')}</span>
                <span style={{ color: '#555' }}> − agency cut </span>
                <span style={{ color: '#f97316' }}>₹{Math.round(gross * comm / 100).toLocaleString('en-IN')}</span>
                <span style={{ color: '#555' }}> = </span>
                <span style={{ color: '#4ade80', fontWeight: 700 }}>Net ₹{net.toLocaleString('en-IN')}</span>
              </div>
            )}
          </div>
        )}

        {/* POC + Stage + Payment */}
        <div style={{ display: 'flex', gap: 10, marginBottom: 10, flexWrap: 'wrap' }}>
          <input className="input" placeholder="POC / Contact" value={f.contact} onChange={e => onChange({ ...f, contact: e.target.value })} style={{ flex: 2, minWidth: 140 }} />
          <select className="select" value={f.stage} onChange={e => onChange({ ...f, stage: e.target.value })} style={{ flex: 1, minWidth: 120 }}>
            {D_STAGES.map(s => <option key={s}>{s}</option>)}
          </select>
          <select className="select" value={f.paymentStatus} onChange={e => onChange({ ...f, paymentStatus: e.target.value })} style={{ flex: 1, minWidth: 100 }}>
            {['Pending', 'Partial', 'Paid'].map(s => <option key={s}>{s}</option>)}
          </select>
        </div>

        {/* Rate row */}
        <div style={{ display: 'flex', gap: 10, marginBottom: 10, flexWrap: 'wrap', alignItems: 'center' }}>
          <input className="input" placeholder="Agreed Rate ₹ (Gross)" value={f.agreedRate} onChange={e => onChange({ ...f, agreedRate: e.target.value })} style={{ flex: 1, minWidth: 130 }} />
          {net !== null && (
            <div style={{ flex: 1, minWidth: 130, padding: '9px 13px', background: '#0a0a0a', border: '1px solid #1a1a1a', borderRadius: 8, fontSize: 12, color: '#888' }}>
              Net to you: <strong style={{ color: '#4ade80' }}>₹{net.toLocaleString('en-IN')}</strong>
            </div>
          )}
        </div>

        {/* Dates */}
        <div style={{ display: 'flex', gap: 10, marginBottom: 10, flexWrap: 'wrap' }}>
          <div style={{ flex: 1, minWidth: 130 }}>
            <div style={{ fontSize: 11, color: '#888', marginBottom: 4 }}>📅 Deadline</div>
            <input className="input" type="date" value={f.deadline} onChange={e => onChange({ ...f, deadline: e.target.value })} />
          </div>
          <div style={{ flex: 1, minWidth: 130 }}>
            <div style={{ fontSize: 11, color: '#888', marginBottom: 4 }}>💳 Payment Due</div>
            <input className="input" type="date" value={f.paymentDue} onChange={e => onChange({ ...f, paymentDue: e.target.value })} />
          </div>
        </div>

        <input className="input" placeholder="Deliverables" value={f.deliverables} onChange={e => onChange({ ...f, deliverables: e.target.value })} style={{ marginBottom: 10 }} />
        <input className="input" placeholder="Notes" value={f.notes} onChange={e => onChange({ ...f, notes: e.target.value })} style={{ marginBottom: 12 }} />
        <div style={{ display: 'flex', gap: 8 }}>
          <button className="btn-gold" onClick={onSave} disabled={loading} style={{ fontSize: 13 }}>{loading ? 'Saving...' : btnLabel}</button>
          <button className="btn-ghost" onClick={onCancel} style={{ fontSize: 13 }}>Cancel</button>
        </div>
      </div>
    );
  };

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 20 }}>
        <div>
          <h1 style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>Brand Deals</h1>
          <div style={{ color: '#888', fontSize: 13 }}>{deals.length} deals tracked</div>
        </div>
        <button className="btn-gold" onClick={() => { setAdding(v => !v); setEditId(null); }} style={{ fontSize: 13 }}>+ Add Deal</button>
      </div>

      {adding && <DealForm f={form} onChange={setForm} onSave={add} onCancel={() => setAdding(false)} btnLabel="Add Deal" loading={saving} accentColor={GOLD} />}

      {deals.length === 0 && !adding && <Empty icon="" text="No brand deals yet. Add your first one." />}

      <div style={{ display: 'grid', gap: 10 }}>
        {deals.map(deal => {
          const sc = D_COLORS[deal.stage] || '#888';
          const isEditing = editId === deal.id;
          if (isEditing) return (
            <DealForm key={deal.id} f={editForm} onChange={setEditForm} onSave={saveEdit} onCancel={() => setEditId(null)} btnLabel="Save Changes" loading={updating} accentColor="#38bdf8" />
          );
          const today = todayStr();
          const daysLeft = deal.deadline ? Math.ceil((new Date(deal.deadline + 'T00:00:00') - new Date(today + 'T00:00:00')) / 86400000) : null;
          const deadlineCol = daysLeft === null ? '#666' : daysLeft < 0 ? '#ff6b6b' : daysLeft <= 3 ? GOLD : '#666';
          const payDaysLeft = deal.paymentDue && deal.paymentStatus !== 'Paid' ? Math.ceil((new Date(deal.paymentDue + 'T00:00:00') - new Date(today + 'T00:00:00')) / 86400000) : null;
          const payDueCol = payDaysLeft === null ? '#666' : payDaysLeft < 0 ? '#ff6b6b' : payDaysLeft <= 7 ? '#f97316' : '#666';
          const borderOverride = payDaysLeft !== null && payDaysLeft <= 7 ? `3px solid ${payDueCol}` : (daysLeft !== null && daysLeft <= 3 && deal.stage !== 'Paid' ? `3px solid ${deadlineCol}` : undefined);
          return (
            <div key={deal.id} className="card" style={{ padding: '14px 16px', borderLeft: borderOverride }}>
              <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12 }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 7, flexWrap: 'wrap' }}>
                    <span style={{ fontSize: 15, fontWeight: 700, color: '#eee' }}>{deal.brand}</span>
                    <span className="tag" style={{ background: `${sc}18`, color: sc, fontSize: 11, fontWeight: 600 }}>{deal.stage}</span>
                    {deal.agreedRate && <span style={{ fontSize: 13, color: '#4ade80', fontWeight: 600 }}>₹{deal.agreedRate}</span>}
                    {deal.paymentStatus === 'Paid'    && <span className="tag" style={{ background: '#4ade8018', color: '#4ade80', fontSize: 10, fontWeight: 700 }}>✓ PAID</span>}
                    {deal.paymentStatus === 'Partial' && <span className="tag" style={{ background: `${GOLD}18`, color: GOLD, fontSize: 10 }}>PARTIAL</span>}
                    {deal.invoiceNo && <span className="tag" style={{ background: '#38bdf818', color: '#38bdf8', fontSize: 10 }}>🧾 {deal.invoiceNo}</span>}
                  </div>
                  <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap', fontSize: 12, color: '#888' }}>
                    {deal.contact     && <span>👤 {deal.contact}</span>}
                    {deal.contactedVia === 'Agency' && deal.platform && <span>🏢 via {deal.platform}{deal.commission ? ` (${deal.commission}% cut)` : ''}</span>}
                    {deal.contactedVia !== 'Agency' && deal.platform && <span>🏢 {deal.platform}</span>}
                    {deal.agreedRate && deal.commission && deal.contactedVia === 'Agency' && (
                      <span style={{ color: '#4ade80', fontWeight: 600 }}>Net ₹{Math.round(parseFloat(deal.agreedRate) * (1 - parseFloat(deal.commission) / 100)).toLocaleString('en-IN')}</span>
                    )}
                    {deal.deliverables && <span>📋 {deal.deliverables}</span>}
                    {deal.deadline    && <span style={{ color: deadlineCol, fontWeight: daysLeft !== null && daysLeft <= 3 ? 700 : 400 }}>📅 {fmtDate(deal.deadline)}{daysLeft !== null && daysLeft <= 3 && deal.stage !== 'Paid' ? ` (${daysLeft < 0 ? `${Math.abs(daysLeft)}d overdue` : daysLeft === 0 ? 'today!' : `${daysLeft}d`})` : ''}</span>}
                    {deal.paymentDue && deal.paymentStatus !== 'Paid' && <span style={{ color: payDueCol, fontWeight: payDaysLeft !== null && payDaysLeft <= 7 ? 700 : 400 }}>💳 due {fmtDate(deal.paymentDue)}{payDaysLeft !== null && payDaysLeft <= 7 ? ` (${payDaysLeft < 0 ? `${Math.abs(payDaysLeft)}d overdue` : payDaysLeft === 0 ? 'today!' : `${payDaysLeft}d`})` : ''}</span>}
                  </div>
                  {deal.notes && <div style={{ fontSize: 12, color: '#888', marginTop: 5 }}>{deal.notes}</div>}
                </div>
                <div style={{ display: 'flex', gap: 6, alignItems: 'center', flexShrink: 0, flexWrap: 'wrap', justifyContent: 'flex-end' }}>
                  <select className="select" value={deal.stage} onChange={e => updateStage(deal.id, e.target.value)} style={{ fontSize: 12, padding: '4px 8px' }}>
                    {D_STAGES.map(s => <option key={s}>{s}</option>)}
                  </select>
                  {!deal.invoiceNo && deal.brand && (
                    <button onClick={() => generateInvoice(deal)} title="Generate Invoice" style={{ background: `${GOLD}12`, border: `1px solid ${GOLD}44`, borderRadius: 6, color: GOLD, cursor: 'pointer', fontSize: 11, padding: '4px 8px', fontWeight: 700, whiteSpace: 'nowrap' }}>🧾 Invoice</button>
                  )}
                  <button onClick={() => startEdit(deal)} title="Edit" style={{ background: 'none', border: '1px solid #2a2a2a', borderRadius: 6, color: '#888', cursor: 'pointer', fontSize: 13, padding: '3px 8px', lineHeight: 1 }}>✎</button>
                  <button onClick={() => del(deal.id)} style={{ background: 'none', border: 'none', color: '#555', cursor: 'pointer', fontSize: 18, lineHeight: 1 }}>×</button>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// --- IDEAS ----------------------------------------------------
const IDEA_CATS         = ['Content', 'Training', 'Other'];
const IDEA_CAT_COLORS   = { Content: '#38bdf8', Training: '#a78bfa', Other: '#888' };
const IDEA_CAT_ICONS    = { Content: '🎬', Training: '📚', Other: '💡' };
const IDEA_STATUSES     = ['Captured', 'Shortlisted', 'In Pipeline', 'In Trainings', 'Archived'];
const IDEA_STATUS_COLORS = { Captured: '#888', Shortlisted: '#F5C518', 'In Pipeline': '#38bdf8', 'In Trainings': '#a78bfa', Archived: '#333' };
const IDEA_ARCHIVE_DAYS = 30;

function IdeasTab() {
  const [ideas, setIdeas]         = useState([]);
  const [text, setText]           = useState('');
  const [cat, setCat]             = useState('Content');
  const [saving, setSaving]       = useState(false);
  const [filterCat, setFilterCat] = useState('All');
  const [showArchived, setShowArchived] = useState(false);
  const [pushing, setPushing]     = useState({});

  useEffect(() => {
    return db.collection('ideas').orderBy('createdAt', 'desc').onSnapshot(snap =>
      setIdeas(snap.docs.map(d => ({ id: d.id, ...d.data() })))
    );
  }, []);

  // Auto-archive Captured ideas older than 30 days
  useEffect(() => {
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - IDEA_ARCHIVE_DAYS);
    const cutoffStr = cutoff.toISOString();
    db.collection('ideas')
      .where('status', '==', 'Captured')
      .get()
      .then(snap => {
        const old = snap.docs.filter(d => d.data().createdAt < cutoffStr);
        if (!old.length) return;
        const batch = db.batch();
        old.forEach(d => batch.update(d.ref, { status: 'Archived' }));
        return batch.commit();
      });
  }, []);

  const add = async () => {
    if (!text.trim()) return;
    setSaving(true);
    await db.collection('ideas').add({ text, category: cat, status: 'Captured', starred: false, createdAt: new Date().toISOString() });
    notify('ideas', `${IDEA_CAT_ICONS[cat] || '💡'}  **Idea Captured**\n> ${text}\n> Category: \`${cat}\``);
    setText('');
    setSaving(false);
  };

  const setStatus = (id, status) => db.collection('ideas').doc(id).update({ status });
  const toggleStar = (id, starred) => db.collection('ideas').doc(id).update({ starred: !starred });
  const del = id => db.collection('ideas').doc(id).delete();

  const pushToPipeline = async (idea) => {
    setPushing(p => ({ ...p, [idea.id]: 'pipeline' }));
    await db.collection('pipeline').add({
      title: idea.text, stage: 'Idea', channel: '', platform: '',
      recurring: false, frequency: 'Weekly', brandDeal: false,
      brandName: '', pocName: '', pocContact: '', agreedRate: '',
      publishDate: '', notes: `From Idea Bank`, createdAt: new Date().toISOString(),
    });
    await db.collection('ideas').doc(idea.id).update({ status: 'In Pipeline' });
    notify('pipeline', `🎬  **Idea → Pipeline**\n> **${idea.text}**\n> Moved from Idea Bank`);
    setPushing(p => ({ ...p, [idea.id]: null }));
  };

  const pushToTrainings = async (idea) => {
    setPushing(p => ({ ...p, [idea.id]: 'training' }));
    await db.collection('trainings').add({
      title: idea.text, category: 'Paid Program', type: 'Workshop',
      status: 'Upcoming', date: '', time: '', capacity: '', enrolled: '',
      revenue: '', batch: '', duration: '', notes: `From Idea Bank`,
      createdAt: new Date().toISOString(),
    });
    await db.collection('ideas').doc(idea.id).update({ status: 'In Trainings' });
    notify('training', `📚  **Idea → Trainings**\n> **${idea.text}**\n> Added as Upcoming · Paid Program`);
    setPushing(p => ({ ...p, [idea.id]: null }));
  };

  const active   = ideas.filter(i => i.status !== 'Archived');
  const archived = ideas.filter(i => i.status === 'Archived');

  const baseList = filterCat === 'All' ? active : active.filter(i => i.category === filterCat);
  const starred   = baseList.filter(i => i.starred);
  const unstarred = baseList.filter(i => !i.starred);

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 20 }}>
        <div>
          <h1 style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>Idea Bank</h1>
          <div style={{ color: '#888', fontSize: 13 }}>
            {active.length} active · {active.filter(i => i.status === 'Shortlisted').length} shortlisted · {active.filter(i => i.status === 'In Pipeline').length} in pipeline · {active.filter(i => i.status === 'In Trainings').length} in trainings
          </div>
        </div>
      </div>

      {/* Quick capture */}
      <div className="capture-box" style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 16, padding: '14px', background: '#111', borderRadius: 10, border: '1px solid #222' }}>
        <input className="input" placeholder="Type your idea here..." value={text}
          onChange={e => setText(e.target.value)} onKeyDown={e => e.key === 'Enter' && add()}
          style={{ fontSize: 15, padding: '12px 14px' }} autoFocus />
        <div style={{ display: 'flex', gap: 6, justifyContent: 'space-between' }}>
          <div style={{ display: 'flex', gap: 6, flex: 1 }}>
            {IDEA_CATS.map(c => (
              <button key={c} onClick={() => setCat(c)} style={{
                flex: 1, padding: '8px 4px', borderRadius: 8, fontSize: 12, cursor: 'pointer', fontWeight: cat === c ? 700 : 400,
                background: cat === c ? `${IDEA_CAT_COLORS[c]}22` : 'transparent',
                color: cat === c ? IDEA_CAT_COLORS[c] : '#555',
                border: `1px solid ${cat === c ? IDEA_CAT_COLORS[c] : '#222'}`,
                textAlign: 'center',
              }}>{IDEA_CAT_ICONS[c]}<br/><span style={{ fontSize: 10 }}>{c}</span></button>
            ))}
          </div>
          <button className="btn-gold" onClick={add} disabled={saving}
            style={{ fontSize: 14, fontWeight: 700, padding: '8px 20px', borderRadius: 8, flexShrink: 0 }}>
            {saving ? '...' : '+ Capture'}
          </button>
        </div>
      </div>

      {/* Category filter */}
      <div style={{ display: 'flex', gap: 6, marginBottom: 20, flexWrap: 'wrap' }}>
        {['All', ...IDEA_CATS].map(c => {
          const active_c = filterCat === c;
          const col = c === 'All' ? GOLD : IDEA_CAT_COLORS[c];
          const count = c === 'All' ? active.length : active.filter(i => i.category === c).length;
          return (
            <button key={c} onClick={() => setFilterCat(c)} style={{
              padding: '4px 12px', borderRadius: 20, fontSize: 12, cursor: 'pointer', fontWeight: active_c ? 700 : 400,
              background: active_c ? `${col}20` : 'transparent',
              color: active_c ? col : '#666',
              border: `1px solid ${active_c ? col : '#222'}`,
            }}>{c === 'All' ? 'All' : IDEA_CAT_ICONS[c] + ' ' + c} ({count})</button>
          );
        })}
      </div>

      {active.length === 0 && !showArchived && <Empty icon="💡" text="No ideas yet. Start capturing them here." />}

      {/* Shortlisted first */}
      {starred.length > 0 && (
        <div style={{ marginBottom: 18 }}>
          <div style={{ fontSize: 11, color: '#666', textTransform: 'uppercase', letterSpacing: 1, fontWeight: 700, marginBottom: 8 }}>⭐ Shortlisted</div>
          {starred.map(idea => (
            <IdeaCard key={idea.id} idea={idea} onStar={toggleStar} onStatus={setStatus}
              onPushPipeline={pushToPipeline} onPushTraining={pushToTrainings} onDel={del} pushing={pushing[idea.id]} />
          ))}
        </div>
      )}

      {unstarred.length > 0 && (
        <div style={{ marginBottom: 18 }}>
          {starred.length > 0 && <div style={{ fontSize: 11, color: '#666', textTransform: 'uppercase', letterSpacing: 1, fontWeight: 700, marginBottom: 8 }}>All Ideas</div>}
          {unstarred.map(idea => (
            <IdeaCard key={idea.id} idea={idea} onStar={toggleStar} onStatus={setStatus}
              onPushPipeline={pushToPipeline} onPushTraining={pushToTrainings} onDel={del} pushing={pushing[idea.id]} />
          ))}
        </div>
      )}

      {/* Archived section */}
      {archived.length > 0 && (
        <div>
          <button onClick={() => setShowArchived(v => !v)} style={{ background: 'none', border: 'none', color: '#555', cursor: 'pointer', fontSize: 12, padding: '4px 0', marginBottom: 8 }}>
            {showArchived ? '▾' : '▸'} Archived ({archived.length}) — auto-archived after {IDEA_ARCHIVE_DAYS} days
          </button>
          {showArchived && archived.map(idea => (
            <IdeaCard key={idea.id} idea={idea} onStar={toggleStar} onStatus={setStatus}
              onPushPipeline={pushToPipeline} onPushTraining={pushToTrainings} onDel={del} pushing={pushing[idea.id]} />
          ))}
        </div>
      )}
    </div>
  );
}

function IdeaCard({ idea, onStar, onStatus, onPushPipeline, onPushTraining, onDel, pushing }) {
  const sc      = IDEA_STATUS_COLORS[idea.status] || '#888';
  const catCol  = IDEA_CAT_COLORS[idea.category] || '#888';
  const promoted = idea.status === 'In Pipeline' || idea.status === 'In Trainings';
  const isContent  = idea.category === 'Content'  || idea.category === 'Other';
  const isTraining = idea.category === 'Training' || idea.category === 'Other';

  return (
    <div className="card" style={{ display: 'flex', alignItems: 'flex-start', gap: 12, padding: '12px 14px', marginBottom: 8, opacity: idea.status === 'Archived' ? 0.5 : 1 }}>
      <button onClick={() => onStar(idea.id, idea.starred)}
        style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 16, color: idea.starred ? '#F5C518' : '#333', padding: 0, marginTop: 2, flexShrink: 0 }}>★</button>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 14, color: '#ddd', marginBottom: 6, lineHeight: 1.4 }}>{idea.text}</div>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center' }}>
          <span className="tag" style={{ background: `${catCol}18`, color: catCol, fontSize: 11 }}>{IDEA_CAT_ICONS[idea.category]} {idea.category}</span>
          <span className="tag" style={{ background: `${sc}18`, color: sc, fontSize: 11 }}>{idea.status}</span>
          <span style={{ fontSize: 11, color: '#555' }}>{new Date(idea.createdAt).toLocaleDateString('en-IN', { day: '2-digit', month: 'short' })}</span>
        </div>
      </div>
      <div style={{ display: 'flex', gap: 6, alignItems: 'center', flexShrink: 0, flexWrap: 'wrap', justifyContent: 'flex-end', maxWidth: 260 }}>
        {!promoted && (
          <select value={idea.status} onChange={e => onStatus(idea.id, e.target.value)}
            style={{ fontSize: 11, background: '#141414', border: '1px solid #2a2a2a', color: '#888', borderRadius: 6, padding: '4px 8px', cursor: 'pointer' }}>
            {IDEA_STATUSES.filter(s => s !== 'In Pipeline' && s !== 'In Trainings').map(s => <option key={s}>{s}</option>)}
          </select>
        )}
        {!promoted && isContent && (
          <button onClick={() => onPushPipeline(idea)} disabled={pushing === 'pipeline'}
            style={{ fontSize: 11, background: '#38bdf818', border: '1px solid #38bdf840', color: '#38bdf8', borderRadius: 6, padding: '4px 10px', cursor: 'pointer', whiteSpace: 'nowrap' }}>
            {pushing === 'pipeline' ? '...' : '🎬 → Pipeline'}
          </button>
        )}
        {!promoted && isTraining && (
          <button onClick={() => onPushTraining(idea)} disabled={pushing === 'training'}
            style={{ fontSize: 11, background: '#a78bfa18', border: '1px solid #a78bfa40', color: '#a78bfa', borderRadius: 6, padding: '4px 10px', cursor: 'pointer', whiteSpace: 'nowrap' }}>
            {pushing === 'training' ? '...' : '📚 → Trainings'}
          </button>
        )}
        {idea.status === 'In Pipeline'  && <span style={{ fontSize: 11, color: '#38bdf8' }}>✓ In Pipeline</span>}
        {idea.status === 'In Trainings' && <span style={{ fontSize: 11, color: '#a78bfa' }}>✓ In Trainings</span>}
        <button onClick={() => onDel(idea.id)} style={{ background: 'none', border: 'none', color: '#555', cursor: 'pointer', fontSize: 18, lineHeight: 1, padding: '0 2px' }}>×</button>
      </div>
    </div>
  );
}

// --- SEARCH ---------------------------------------------------
function SearchTab({ onNavigate }) {
  const [query, setQuery]     = useState('');
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);

  const SOURCES = [
    { key: 'pipeline',  label: '🎬 Pipeline',  tab: 'pipeline',  fields: ['title', 'channel', 'brandName', 'notes'] },
    { key: 'deals',     label: '💼 Deal',      tab: 'deals',     fields: ['brand', 'contact', 'deliverables', 'notes'] },
    { key: 'ideas',     label: '💡 Idea',      tab: 'ideas',     fields: ['text', 'category'] },
    { key: 'trainings', label: '📚 Training',  tab: 'trainings', fields: ['title', 'batch', 'notes'] },
  ];

  useEffect(() => {
    const q = query.trim().toLowerCase();
    if (q.length < 2) { setResults([]); return; }
    setLoading(true);
    Promise.all(SOURCES.map(src =>
      db.collection(src.key).get().then(snap =>
        snap.docs
          .map(d => ({ id: d.id, _source: src, ...d.data() }))
          .filter(doc => src.fields.some(f => (doc[f] || '').toLowerCase().includes(q)))
      )
    )).then(groups => {
      setResults(groups.flat());
      setLoading(false);
    });
  }, [query]);

  const highlight = (text, q) => {
    if (!text || !q) return text;
    const idx = text.toLowerCase().indexOf(q.toLowerCase());
    if (idx === -1) return text;
    return <span>{text.slice(0, idx)}<mark style={{ background: `${GOLD}40`, color: '#fff', borderRadius: 2, padding: '0 1px' }}>{text.slice(idx, idx + q.length)}</mark>{text.slice(idx + q.length)}</span>;
  };

  const getTitle = (doc) => {
    const k = doc._source.key;
    if (k === 'pipeline' || k === 'trainings') return doc.title;
    if (k === 'deals')  return doc.brand;
    if (k === 'ideas')  return doc.text;
    return '—';
  };
  const getSub = (doc) => {
    const k = doc._source.key;
    if (k === 'pipeline')  return [doc.stage, doc.channel].filter(Boolean).join(' · ');
    if (k === 'deals')     return [doc.stage, doc.deliverables].filter(Boolean).join(' · ');
    if (k === 'ideas')     return [doc.category, doc.status].filter(Boolean).join(' · ');
    if (k === 'trainings') return [doc.category, doc.status, doc.date ? fmtDate(doc.date) : ''].filter(Boolean).join(' · ');
    return '';
  };

  return (
    <div>
      <div style={{ marginBottom: 20 }}>
        <h1 style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>Search</h1>
        <div style={{ color: '#888', fontSize: 13 }}>Search across pipeline, deals, ideas and trainings</div>
      </div>

      <div style={{ position: 'relative', marginBottom: 20 }}>
        <span style={{ position: 'absolute', left: 14, top: '50%', transform: 'translateY(-50%)', fontSize: 16, color: '#555', pointerEvents: 'none' }}>🔍</span>
        <input className="input" placeholder="Type at least 2 characters..." value={query}
          onChange={e => setQuery(e.target.value)} autoFocus
          style={{ paddingLeft: 40, fontSize: 15 }} />
        {query && <button onClick={() => setQuery('')} style={{ position: 'absolute', right: 12, top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', color: '#555', cursor: 'pointer', fontSize: 18, lineHeight: 1 }}>×</button>}
      </div>

      {loading && <div style={{ color: '#666', fontSize: 13 }}>Searching...</div>}

      {!loading && query.length >= 2 && results.length === 0 && (
        <div style={{ color: '#666', fontSize: 13, textAlign: 'center', padding: '40px 0' }}>No results for "<span style={{ color: '#aaa' }}>{query}</span>"</div>
      )}

      {results.length > 0 && (
        <div>
          <div style={{ fontSize: 11, color: '#666', marginBottom: 12 }}>{results.length} result{results.length > 1 ? 's' : ''}</div>
          {results.map(doc => (
            <div key={`${doc._source.key}-${doc.id}`} className="card" onClick={() => onNavigate(doc._source.tab)}
              style={{ padding: '12px 14px', marginBottom: 8, cursor: 'pointer', display: 'flex', gap: 12, alignItems: 'flex-start' }}
              onMouseEnter={e => e.currentTarget.style.borderColor = '#383838'}
              onMouseLeave={e => e.currentTarget.style.borderColor = ''}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 14, color: '#ddd', marginBottom: 4, fontWeight: 500 }}>
                  {highlight(getTitle(doc), query)}
                </div>
                <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
                  <span className="tag" style={{ background: `${GOLD}18`, color: GOLD, fontSize: 10, fontWeight: 700 }}>{doc._source.label}</span>
                  <span style={{ fontSize: 11, color: '#666' }}>{getSub(doc)}</span>
                </div>
              </div>
              <span style={{ fontSize: 11, color: '#444', flexShrink: 0, marginTop: 2 }}>VIEW →</span>
            </div>
          ))}
        </div>
      )}

      {query.length < 2 && (
        <div style={{ textAlign: 'center', padding: '50px 0', color: '#444' }}>
          <div style={{ fontSize: 32, marginBottom: 12 }}>🔍</div>
          <div style={{ fontSize: 13 }}>Search pipeline, deals, ideas and trainings in one place</div>
        </div>
      )}
    </div>
  );
}

// --- INVOICES -------------------------------------------------
const INV_STATUSES   = ['Pending', 'Paid', 'Overdue'];
const INV_ST_COLORS  = { Pending: '#f97316', Paid: '#4ade80', Overdue: '#ff6b6b' };
const INV_DELIVERABLES = ['Integration', 'Dedicated Video', 'Live', 'Short', 'Reel', 'Webinar', 'Sponsorship', 'Other'];
const INV_EMPTY      = { brand: '', invoiceNo: '', description: '', amount: '', channel: '', poc: '', deliverable: 'Integration', invoiceDate: '', dueDate: '', status: 'Pending', paidDate: '', notes: '', linkedDealId: '' };
const BRAND_PALETTE  = ['#38bdf8','#a78bfa','#f97316','#4ade80','#f43f5e','#F5C518','#06b6d4','#84cc16','#e879f9','#fb923c'];

const autoInvoiceNo = async () => {
  const year = new Date().getFullYear();
  const snap = await db.collection('collabs').where('invoiceNo', '>=', `NSM-${year}-`).where('invoiceNo', '<', `NSM-${year+1}-`).get();
  const num  = snap.size + 1;
  return `NSM-${year}-${String(num).padStart(3, '0')}`;
};

function InvoicesTab() {
  const [collabs, setCollabs]   = useState([]);
  const [form, setForm]         = useState({ ...INV_EMPTY });
  const [adding, setAdding]     = useState(false);
  const [saving, setSaving]     = useState(false);
  const [editId, setEditId]     = useState(null);
  const [editForm, setEditForm] = useState({ ...INV_EMPTY });
  const [updating, setUpdating] = useState(false);
  const [filterYear, setFilterYear]     = useState('All');
  const [filterBrand, setFilterBrand]   = useState('All');
  const [filterStatus, setFilterStatus] = useState('All');

  useEffect(() => {
    return db.collection('collabs').orderBy('createdAt', 'desc').onSnapshot(snap =>
      setCollabs(snap.docs.map(d => ({ id: d.id, ...d.data() })))
    );
  }, []);

  const years = [...new Set(collabs.map(c => c.invoiceDate?.slice(0, 4)).filter(Boolean))].sort((a, b) => b - a);
  const brands = [...new Set(collabs.map(c => c.brand).filter(Boolean))].sort();

  const filtered = collabs.filter(c => {
    if (filterYear   !== 'All' && c.invoiceDate?.slice(0, 4) !== filterYear)     return false;
    if (filterBrand  !== 'All' && c.brand !== filterBrand)                        return false;
    if (filterStatus !== 'All' && c.status !== filterStatus)                      return false;
    return true;
  }).sort((a, b) => (b.invoiceDate || b.createdAt || '').localeCompare(a.invoiceDate || a.createdAt || ''));

  // ── Analytics computed values ──
  const allForYear = filterYear === 'All' ? collabs : collabs.filter(c => c.invoiceDate?.slice(0, 4) === filterYear);
  const totalInvoiced = allForYear.reduce((s, c) => s + (parseFloat(c.amount) || 0), 0);
  const totalPaid     = allForYear.filter(c => c.status === 'Paid').reduce((s, c) => s + (parseFloat(c.amount) || 0), 0);
  const totalPending  = allForYear.filter(c => c.status !== 'Paid').reduce((s, c) => s + (parseFloat(c.amount) || 0), 0);
  const thisMonth     = (() => {
    const ym = new Date().toISOString().slice(0, 7);
    return collabs.filter(c => c.invoiceDate?.startsWith(ym)).reduce((s, c) => s + (parseFloat(c.amount) || 0), 0);
  })();

  // Monthly bar chart — last 12 months
  const monthlyData = (() => {
    const months = [];
    const now = new Date();
    for (let i = 11; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const ym = d.toISOString().slice(0, 7);
      const label = d.toLocaleString('default', { month: 'short' });
      const invoiced = collabs.filter(c => c.invoiceDate?.startsWith(ym)).reduce((s, c) => s + (parseFloat(c.amount) || 0), 0);
      const received = collabs.filter(c => c.paidDate?.startsWith(ym)).reduce((s, c) => s + (parseFloat(c.amount) || 0), 0);
      months.push({ ym, label, invoiced, received });
    }
    return months;
  })();
  const maxBar = Math.max(...monthlyData.map(m => Math.max(m.invoiced, m.received)), 1);

  // Brand breakdown
  const brandTotals = (() => {
    const map = {};
    allForYear.forEach(c => {
      if (!c.brand) return;
      map[c.brand] = (map[c.brand] || 0) + (parseFloat(c.amount) || 0);
    });
    return Object.entries(map).sort((a, b) => b[1] - a[1]).map(([brand, total], i) => ({ brand, total, color: BRAND_PALETTE[i % BRAND_PALETTE.length] }));
  })();
  const maxBrand = brandTotals[0]?.total || 1;

  const fmt = n => n >= 100000 ? `₹${(n/100000).toFixed(1)}L` : n >= 1000 ? `₹${(n/1000).toFixed(1)}K` : `₹${n}`;

  // ── CRUD ──
  const add = async () => {
    if (!form.brand.trim() || !form.amount) return;
    setSaving(true);
    const invNo = form.invoiceNo.trim() || await autoInvoiceNo();
    await db.collection('collabs').add({ ...form, invoiceNo: invNo, createdAt: new Date().toISOString() });
    notify('brand', `🧾  **Invoice Created**\n> **${form.brand}**  ·  Invoice ${invNo}\n> ₹${form.amount}  ·  Status: \`${form.status}\``);
    setForm({ ...INV_EMPTY });
    setAdding(false);
    setSaving(false);
  };

  const startEdit = (c) => {
    setEditId(c.id);
    setEditForm({ brand: c.brand || '', invoiceNo: c.invoiceNo || '', description: c.description || '', amount: c.amount || '', channel: c.channel || '', poc: c.poc || '', deliverable: c.deliverable || 'Integration', invoiceDate: c.invoiceDate || '', dueDate: c.dueDate || '', status: c.status || 'Pending', paidDate: c.paidDate || '', notes: c.notes || '', linkedDealId: c.linkedDealId || '' });
    setAdding(false);
  };

  const saveEdit = async () => {
    if (!editForm.brand.trim()) return;
    setUpdating(true);
    const prev = collabs.find(c => c.id === editId);
    await db.collection('collabs').doc(editId).update({ ...editForm });
    // ── Sync → deal: push status / amount / dueDate changes to linked deal ──
    if (editForm.linkedDealId) {
      const dealSync = {};
      if (editForm.amount !== prev?.amount)   dealSync.agreedRate  = editForm.amount;
      if (editForm.dueDate !== prev?.dueDate) dealSync.paymentDue  = editForm.dueDate;
      if (editForm.status === 'Paid' && prev?.status !== 'Paid') {
        dealSync.paymentStatus = 'Paid';
        dealSync.stage         = 'Paid';
      }
      if (editForm.status === 'Overdue' && prev?.status !== 'Overdue') {
        dealSync.paymentStatus = 'Overdue';
      }
      if (Object.keys(dealSync).length) {
        await db.collection('deals').doc(editForm.linkedDealId).update(dealSync);
      }
    }
    setEditId(null);
    setUpdating(false);
  };

  const markPaid = async (c) => {
    const today = todayStr();
    await db.collection('collabs').doc(c.id).update({ status: 'Paid', paidDate: today });
    // If linked to a deal, update paymentStatus too
    if (c.linkedDealId) {
      await db.collection('deals').doc(c.linkedDealId).update({ paymentStatus: 'Paid', stage: 'Paid' });
    }
    notify('brand', `✅  **Payment Received**\n> **${c.brand}**  ·  ${c.invoiceNo}\n> ₹${c.amount} marked as Paid`);
  };

  const markOverdue = async (c) => {
    await db.collection('collabs').doc(c.id).update({ status: 'Overdue' });
    // ── Sync → deal ──
    if (c.linkedDealId) {
      await db.collection('deals').doc(c.linkedDealId).update({ paymentStatus: 'Overdue' });
    }
  };

  const del = id => db.collection('collabs').doc(id).delete();

  // Shared form
  const CollabForm = ({ f, onChange, onSave, onCancel, btnLabel, loading, accentColor }) => (
    <div className="card fade" style={{ padding: 18, marginBottom: 20, borderColor: `${accentColor}44` }}>
      <div style={{ display: 'flex', gap: 10, marginBottom: 10, flexWrap: 'wrap' }}>
        <input className="input" placeholder="Brand name *" value={f.brand} onChange={e => onChange({ ...f, brand: e.target.value })} style={{ flex: 2, minWidth: 140 }} autoFocus />
        <input className="input" placeholder="POC / Contact" value={f.poc} onChange={e => onChange({ ...f, poc: e.target.value })} style={{ flex: 2, minWidth: 140 }} />
      </div>
      <div style={{ display: 'flex', gap: 10, marginBottom: 10, flexWrap: 'wrap' }}>
        <input className="input" placeholder="Invoice No (auto if blank)" value={f.invoiceNo} onChange={e => onChange({ ...f, invoiceNo: e.target.value })} style={{ flex: 2, minWidth: 140 }} />
        <input className="input" placeholder="Amount (₹) *" type="number" value={f.amount} onChange={e => onChange({ ...f, amount: e.target.value })} style={{ flex: 1, minWidth: 100 }} />
        <select className="select" value={f.status} onChange={e => onChange({ ...f, status: e.target.value })} style={{ flex: 1, minWidth: 100 }}>
          {INV_STATUSES.map(s => <option key={s}>{s}</option>)}
        </select>
      </div>
      <div style={{ display: 'flex', gap: 10, marginBottom: 10, flexWrap: 'wrap' }}>
        <input className="input" placeholder="Channel (e.g. YouTube Kannada)" value={f.channel} onChange={e => onChange({ ...f, channel: e.target.value })} style={{ flex: 2, minWidth: 140 }} />
        <select className="select" value={f.deliverable} onChange={e => onChange({ ...f, deliverable: e.target.value })} style={{ flex: 1, minWidth: 120 }}>
          {INV_DELIVERABLES.map(d => <option key={d}>{d}</option>)}
        </select>
      </div>
      <input className="input" placeholder="Description / deliverable details" value={f.description} onChange={e => onChange({ ...f, description: e.target.value })} style={{ marginBottom: 10 }} />
      <div style={{ display: 'flex', gap: 10, marginBottom: 10, flexWrap: 'wrap' }}>
        <div style={{ flex: 1, minWidth: 130 }}>
          <div style={{ fontSize: 11, color: '#888', marginBottom: 4 }}>📄 Invoice Date</div>
          <input className="input" type="date" value={f.invoiceDate} onChange={e => onChange({ ...f, invoiceDate: e.target.value })} />
        </div>
        <div style={{ flex: 1, minWidth: 130 }}>
          <div style={{ fontSize: 11, color: '#888', marginBottom: 4 }}>💳 Payment Due</div>
          <input className="input" type="date" value={f.dueDate} onChange={e => onChange({ ...f, dueDate: e.target.value })} />
        </div>
        {f.status === 'Paid' && (
          <div style={{ flex: 1, minWidth: 130 }}>
            <div style={{ fontSize: 11, color: '#888', marginBottom: 4 }}>✅ Paid On</div>
            <input className="input" type="date" value={f.paidDate} onChange={e => onChange({ ...f, paidDate: e.target.value })} />
          </div>
        )}
      </div>
      <input className="input" placeholder="Notes" value={f.notes} onChange={e => onChange({ ...f, notes: e.target.value })} style={{ marginBottom: 12 }} />
      <div style={{ display: 'flex', gap: 8 }}>
        <button className="btn-gold" onClick={onSave} disabled={loading} style={{ fontSize: 13 }}>{loading ? 'Saving...' : btnLabel}</button>
        <button className="btn-ghost" onClick={onCancel} style={{ fontSize: 13 }}>Cancel</button>
      </div>
    </div>
  );

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 20 }}>
        <div>
          <h1 style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>🧾 Invoices & Collabs</h1>
          <div style={{ color: '#888', fontSize: 13 }}>{collabs.length} total records · ₹{totalPaid.toLocaleString('en-IN')} received</div>
        </div>
        <button className="btn-gold" onClick={() => { setAdding(v => !v); setEditId(null); }} style={{ fontSize: 13 }}>+ New Invoice</button>
      </div>

      {adding && <CollabForm f={form} onChange={setForm} onSave={add} onCancel={() => setAdding(false)} btnLabel="Save Invoice" loading={saving} accentColor={GOLD} />}

      {/* ── Year filter ── */}
      <div style={{ display: 'flex', gap: 6, marginBottom: 20, flexWrap: 'wrap', alignItems: 'center' }}>
        <span style={{ fontSize: 11, color: '#666', marginRight: 4, textTransform: 'uppercase', letterSpacing: 0.8 }}>Year:</span>
        {['All', ...years].map(y => (
          <button key={y} onClick={() => setFilterYear(y)} style={{
            padding: '4px 13px', borderRadius: 20, fontSize: 12, cursor: 'pointer', fontWeight: filterYear === y ? 700 : 400,
            background: filterYear === y ? `${GOLD}20` : 'transparent', color: filterYear === y ? GOLD : '#666',
            border: `1px solid ${filterYear === y ? GOLD : '#222'}`, transition: 'all 0.15s',
          }}>{y}</button>
        ))}
      </div>

      {/* ── Stat strip ── */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(130px, 1fr))', gap: 12, marginBottom: 24 }}>
        {[
          { label: 'Total Invoiced', value: fmt(totalInvoiced), color: GOLD },
          { label: 'Received', value: fmt(totalPaid), color: '#4ade80' },
          { label: 'Pending / Overdue', value: fmt(totalPending), color: '#f97316' },
          { label: 'This Month', value: fmt(thisMonth), color: '#38bdf8' },
        ].map(s => (
          <div key={s.label} className="card" style={{ padding: '14px 16px' }}>
            <div style={{ fontSize: 10, color: '#666', fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 6 }}>{s.label}</div>
            <div style={{ fontSize: 20, fontWeight: 700, color: s.color }}>{s.value}</div>
          </div>
        ))}
      </div>

      {/* ── Charts row ── */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: 16, marginBottom: 24 }}>

        {/* Monthly bar chart */}
        <div className="card" style={{ padding: 18 }}>
          <div style={{ fontSize: 11, color: '#666', fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 16 }}>Monthly Revenue (last 12 months)</div>
          <div style={{ display: 'flex', alignItems: 'flex-end', gap: 3, height: 100, paddingBottom: 20, position: 'relative' }}>
            {monthlyData.map((m, i) => {
              const invH = m.invoiced ? Math.max(4, (m.invoiced / maxBar) * 92) : 0;
              const recH = m.received ? Math.max(4, (m.received / maxBar) * 92) : 0;
              return (
                <div key={m.ym} style={{ flex: 1, display: 'flex', alignItems: 'flex-end', gap: 1, position: 'relative' }}
                  title={`${m.label}: Invoiced ₹${m.invoiced.toLocaleString('en-IN')} / Received ₹${m.received.toLocaleString('en-IN')}`}>
                  {invH > 0 && <div style={{ flex: 1, height: invH, background: `${GOLD}80`, borderRadius: '2px 2px 0 0' }} />}
                  {recH > 0 && <div style={{ flex: 1, height: recH, background: '#4ade8099', borderRadius: '2px 2px 0 0' }} />}
                  {invH === 0 && recH === 0 && <div style={{ flex: 1, height: 2, background: '#222', borderRadius: 1 }} />}
                  <div style={{ position: 'absolute', bottom: -18, left: '50%', transform: 'translateX(-50%)', fontSize: 8, color: '#444', whiteSpace: 'nowrap' }}>{m.label}</div>
                </div>
              );
            })}
          </div>
          <div style={{ display: 'flex', gap: 14, marginTop: 4 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 10, color: '#666' }}>
              <div style={{ width: 8, height: 8, borderRadius: 2, background: `${GOLD}80` }} />Invoiced
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 10, color: '#666' }}>
              <div style={{ width: 8, height: 8, borderRadius: 2, background: '#4ade8099' }} />Received
            </div>
          </div>
        </div>

        {/* Brand breakdown */}
        <div className="card" style={{ padding: 18 }}>
          <div style={{ fontSize: 11, color: '#666', fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 16 }}>Revenue by Brand</div>
          {brandTotals.length === 0 && <div style={{ color: '#444', fontSize: 12 }}>No data yet</div>}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 9, maxHeight: 180, overflowY: 'auto' }}>
            {brandTotals.map(b => (
              <div key={b.brand}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 3, fontSize: 11 }}>
                  <span style={{ color: b.color, fontWeight: 600, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', flex: 1 }}>{b.brand}</span>
                  <span style={{ color: '#ccc', fontWeight: 600, marginLeft: 8, whiteSpace: 'nowrap' }}>{fmt(b.total)}</span>
                </div>
                <div style={{ height: 4, background: '#1a1a1a', borderRadius: 2, overflow: 'hidden' }}>
                  <div style={{ height: '100%', width: `${(b.total / maxBrand) * 100}%`, background: b.color, borderRadius: 2, transition: 'width 0.4s ease' }} />
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* ── Filters ── */}
      <div style={{ display: 'flex', gap: 8, marginBottom: 14, flexWrap: 'wrap', alignItems: 'center' }}>
        <span style={{ fontSize: 11, color: '#666', textTransform: 'uppercase', letterSpacing: 0.8 }}>Filter:</span>
        <select className="select" value={filterBrand} onChange={e => setFilterBrand(e.target.value)} style={{ fontSize: 12, padding: '5px 10px' }}>
          <option value="All">All Brands</option>
          {brands.map(b => <option key={b}>{b}</option>)}
        </select>
        <select className="select" value={filterStatus} onChange={e => setFilterStatus(e.target.value)} style={{ fontSize: 12, padding: '5px 10px' }}>
          <option value="All">All Status</option>
          {INV_STATUSES.map(s => <option key={s}>{s}</option>)}
        </select>
        <span style={{ marginLeft: 'auto', fontSize: 12, color: '#555' }}>{filtered.length} record{filtered.length !== 1 ? 's' : ''}</span>
      </div>

      {/* ── Collab records ── */}
      {collabs.length === 0 && !adding && <Empty icon="🧾" text="No invoices yet. Generate one from a Deal or add manually." />}
      {collabs.length > 0 && filtered.length === 0 && <div style={{ color: '#666', fontSize: 13, padding: '20px 0' }}>No records match the current filters.</div>}

      <div style={{ display: 'grid', gap: 10 }}>
        {filtered.map(c => {
          const sc = INV_ST_COLORS[c.status] || '#888';
          const isEditing = editId === c.id;
          if (isEditing) return (
            <CollabForm key={c.id} f={editForm} onChange={setEditForm} onSave={saveEdit} onCancel={() => setEditId(null)} btnLabel="Save Changes" loading={updating} accentColor="#38bdf8" />
          );
          const today = todayStr();
          const dueDays = c.dueDate && c.status !== 'Paid' ? Math.ceil((new Date(c.dueDate + 'T00:00:00') - new Date(today + 'T00:00:00')) / 86400000) : null;
          const dueCol = dueDays === null ? '#666' : dueDays < 0 ? '#ff6b6b' : dueDays <= 7 ? '#f97316' : '#666';
          return (
            <div key={c.id} className="card" style={{ padding: '14px 16px', borderLeft: dueDays !== null && dueDays <= 7 && c.status !== 'Paid' ? `3px solid ${dueCol}` : undefined }}>
              <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12 }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6, flexWrap: 'wrap' }}>
                    <span style={{ fontSize: 15, fontWeight: 700, color: '#eee' }}>{c.brand}</span>
                    <span style={{ fontSize: 11, color: '#555', fontFamily: 'monospace' }}>{c.invoiceNo}</span>
                    {c.amount && <span style={{ fontSize: 13, color: '#4ade80', fontWeight: 700 }}>₹{parseFloat(c.amount).toLocaleString('en-IN')}</span>}
                    <span className="tag" style={{ background: `${sc}18`, color: sc, fontSize: 10, fontWeight: 700 }}>{c.status}</span>
                    {c.linkedDealId && <span className="tag" style={{ background: '#38bdf818', color: '#38bdf8', fontSize: 10 }}>🔗 Deal</span>}
                  </div>
                  <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap', fontSize: 12, color: '#888' }}>
                    {c.channel     && <span>📺 {c.channel}</span>}
                    {c.deliverable && <span>📋 {c.deliverable}</span>}
                    {c.poc         && <span>👤 {c.poc}</span>}
                    {c.invoiceDate && <span>📄 {fmtDate(c.invoiceDate)}</span>}
                    {c.dueDate && c.status !== 'Paid' && <span style={{ color: dueCol, fontWeight: dueDays !== null && dueDays <= 7 ? 700 : 400 }}>💳 due {fmtDate(c.dueDate)}{dueDays !== null && dueDays <= 7 ? ` (${dueDays < 0 ? `${Math.abs(dueDays)}d overdue` : dueDays === 0 ? 'today!' : `${dueDays}d`})` : ''}</span>}
                    {c.paidDate    && <span style={{ color: '#4ade80' }}>✅ paid {fmtDate(c.paidDate)}</span>}
                  </div>
                  {c.description && <div style={{ fontSize: 12, color: '#666', marginTop: 5 }}>{c.description}</div>}
                  {c.notes       && <div style={{ fontSize: 12, color: '#555', marginTop: 3 }}>{c.notes}</div>}
                </div>
                <div style={{ display: 'flex', gap: 5, alignItems: 'center', flexShrink: 0, flexWrap: 'wrap', justifyContent: 'flex-end' }}>
                  {c.status !== 'Paid' && (
                    <button onClick={() => markPaid(c)} style={{ background: '#4ade8012', border: '1px solid #4ade8044', borderRadius: 6, color: '#4ade80', cursor: 'pointer', fontSize: 11, padding: '4px 10px', fontWeight: 700 }}>✓ Mark Paid</button>
                  )}
                  {c.status === 'Pending' && c.dueDate && c.dueDate < today && (
                    <button onClick={() => markOverdue(c)} style={{ background: '#ff6b6b12', border: '1px solid #ff6b6b44', borderRadius: 6, color: '#ff6b6b', cursor: 'pointer', fontSize: 11, padding: '4px 10px' }}>! Overdue</button>
                  )}
                  <button onClick={() => startEdit(c)} title="Edit" style={{ background: 'none', border: '1px solid #2a2a2a', borderRadius: 6, color: '#888', cursor: 'pointer', fontSize: 13, padding: '3px 8px' }}>✎</button>
                  <button onClick={() => del(c.id)} style={{ background: 'none', border: 'none', color: '#555', cursor: 'pointer', fontSize: 18, lineHeight: 1 }}>×</button>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// --- VENDORS --------------------------------------------------
const V_EMPTY = { name: '', type: 'Agency', contactPerson: '', email: '', phone: '', commission: '', gstin: '', paymentTerms: '', notes: '' };

function VendorsTab() {
  const [vendors, setVendors]   = useState([]);
  const [allDeals, setAllDeals] = useState([]);
  const [form, setForm]         = useState({ ...V_EMPTY });
  const [addType, setAddType]   = useState('Agency');
  const [adding, setAdding]     = useState(false);
  const [saving, setSaving]     = useState(false);
  const [editId, setEditId]     = useState(null);
  const [editForm, setEditForm] = useState({ ...V_EMPTY });
  const [updating, setUpdating] = useState(false);

  useEffect(() => {
    const u1 = db.collection('vendors').orderBy('name').onSnapshot(snap => setVendors(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
    const u2 = db.collection('deals').onSnapshot(snap => setAllDeals(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
    return () => { u1(); u2(); };
  }, []);

  const stats = v => {
    const matched = allDeals.filter(d =>
      d.brandId === v.id || d.agencyId === v.id ||
      (v.type === 'Brand' ? d.brand === v.name : d.platform === v.name)
    );
    const total  = matched.reduce((s, d) => s + (parseFloat(d.agreedRate) || 0), 0);
    const paid   = matched.filter(d => d.stage === 'Paid').reduce((s, d) => s + (parseFloat(d.agreedRate) || 0), 0);
    const active = matched.filter(d => d.stage !== 'Paid').length;
    return { count: matched.length, total, paid, active };
  };

  const add = async () => {
    if (!form.name.trim()) return;
    setSaving(true);
    await db.collection('vendors').add({ ...form, type: addType, createdAt: new Date().toISOString() });
    setForm({ ...V_EMPTY });
    setAdding(false);
    setSaving(false);
  };

  const startEdit = v => {
    setEditId(v.id);
    setEditForm({ name: v.name || '', type: v.type || 'Agency', contactPerson: v.contactPerson || '', email: v.email || '', phone: v.phone || '', commission: v.commission || '', gstin: v.gstin || '', paymentTerms: v.paymentTerms || '', notes: v.notes || '' });
    setAdding(false);
  };

  const saveEdit = async () => {
    setUpdating(true);
    await db.collection('vendors').doc(editId).update({ ...editForm });
    setEditId(null);
    setUpdating(false);
  };

  const del = id => db.collection('vendors').doc(id).delete();

  const VendorForm = ({ f, onChange, onSave, onCancel, btnLabel, loading, accentColor }) => (
    <div className="card fade" style={{ padding: 18, marginBottom: 16, borderColor: `${accentColor}44` }}>
      <div style={{ display: 'flex', gap: 8, marginBottom: 10, flexWrap: 'wrap' }}>
        <input className="input" placeholder="Name *" value={f.name} onChange={e => onChange({ ...f, name: e.target.value })} style={{ flex: 2, minWidth: 140 }} autoFocus />
        <input className="input" placeholder="Contact person" value={f.contactPerson} onChange={e => onChange({ ...f, contactPerson: e.target.value })} style={{ flex: 2, minWidth: 140 }} />
      </div>
      <div style={{ display: 'flex', gap: 8, marginBottom: 10, flexWrap: 'wrap' }}>
        <input className="input" placeholder="Email" value={f.email} onChange={e => onChange({ ...f, email: e.target.value })} style={{ flex: 2, minWidth: 140 }} />
        <input className="input" placeholder="Phone" value={f.phone} onChange={e => onChange({ ...f, phone: e.target.value })} style={{ flex: 1, minWidth: 110 }} />
        {f.type === 'Agency' && <input className="input" placeholder="Commission %" type="number" value={f.commission} onChange={e => onChange({ ...f, commission: e.target.value })} style={{ width: 110 }} />}
      </div>
      {f.type === 'Agency' && (
        <div style={{ display: 'flex', gap: 8, marginBottom: 10, flexWrap: 'wrap' }}>
          <input className="input" placeholder="GSTIN" value={f.gstin} onChange={e => onChange({ ...f, gstin: e.target.value })} style={{ flex: 1, minWidth: 140 }} />
          <input className="input" placeholder="Payment terms (e.g. 30 days from invoice)" value={f.paymentTerms} onChange={e => onChange({ ...f, paymentTerms: e.target.value })} style={{ flex: 1, minWidth: 160 }} />
        </div>
      )}
      <input className="input" placeholder="Notes" value={f.notes} onChange={e => onChange({ ...f, notes: e.target.value })} style={{ marginBottom: 12 }} />
      <div style={{ display: 'flex', gap: 8 }}>
        <button className="btn-gold" onClick={onSave} disabled={loading} style={{ fontSize: 13 }}>{loading ? 'Saving...' : btnLabel}</button>
        <button className="btn-ghost" onClick={onCancel} style={{ fontSize: 13 }}>Cancel</button>
      </div>
    </div>
  );

  const VendorCard = ({ v }) => {
    const s   = stats(v);
    const col = v.type === 'Agency' ? GOLD : '#38bdf8';
    if (editId === v.id) return (
      <VendorForm key={v.id} f={editForm} onChange={setEditForm} onSave={saveEdit} onCancel={() => setEditId(null)} btnLabel="Save" loading={updating} accentColor={col} />
    );
    return (
      <div className="card" style={{ padding: '14px 16px', borderLeft: `3px solid ${col}40` }}>
        <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6, flexWrap: 'wrap' }}>
              <span style={{ fontSize: 15, fontWeight: 700, color: '#eee' }}>{v.name}</span>
              <span className="tag" style={{ background: `${col}18`, color: col, fontSize: 10, fontWeight: 700 }}>{v.type}</span>
              {v.type === 'Agency' && v.commission && <span style={{ fontSize: 11, color: '#f97316', fontWeight: 600 }}>{v.commission}% commission</span>}
              {s.active > 0 && <span className="tag" style={{ background: '#38bdf818', color: '#38bdf8', fontSize: 10 }}>{s.active} active deal{s.active > 1 ? 's' : ''}</span>}
            </div>
            <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap', fontSize: 12, color: '#888', marginBottom: s.count > 0 ? 8 : 0 }}>
              {v.contactPerson && <span>👤 {v.contactPerson}</span>}
              {v.email         && <span>✉️ {v.email}</span>}
              {v.phone         && <span>📱 {v.phone}</span>}
              {v.gstin         && <span>🏛️ {v.gstin}</span>}
              {v.paymentTerms  && <span>📋 {v.paymentTerms}</span>}
            </div>
            {s.count > 0 && (
              <div style={{ display: 'flex', gap: 16, fontSize: 12 }}>
                <span style={{ color: '#555' }}>{s.count} deal{s.count > 1 ? 's' : ''} total</span>
                <span style={{ color: '#4ade80', fontWeight: 600 }}>₹{s.total.toLocaleString('en-IN')} invoiced</span>
                {s.paid > 0 && <span style={{ color: '#888' }}>₹{s.paid.toLocaleString('en-IN')} paid</span>}
                {s.total - s.paid > 0 && <span style={{ color: '#f97316' }}>₹{(s.total - s.paid).toLocaleString('en-IN')} pending</span>}
              </div>
            )}
            {v.notes && <div style={{ fontSize: 12, color: '#555', marginTop: 5 }}>{v.notes}</div>}
          </div>
          <div style={{ display: 'flex', gap: 5, flexShrink: 0 }}>
            <button onClick={() => startEdit(v)} style={{ background: 'none', border: '1px solid #2a2a2a', borderRadius: 6, color: '#888', cursor: 'pointer', fontSize: 13, padding: '3px 8px' }}>✎</button>
            <button onClick={() => del(v.id)} style={{ background: 'none', border: 'none', color: '#555', cursor: 'pointer', fontSize: 18, lineHeight: 1 }}>×</button>
          </div>
        </div>
      </div>
    );
  };

  const agencies = vendors.filter(v => v.type === 'Agency');
  const brands   = vendors.filter(v => v.type === 'Brand');

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 20 }}>
        <div>
          <h1 style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>🏢 Vendors</h1>
          <div style={{ color: '#888', fontSize: 13 }}>{agencies.length} agencies · {brands.length} direct brands</div>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button className="btn-ghost" onClick={() => { setAddType('Brand'); setAdding(v => !v); setEditId(null); }} style={{ fontSize: 13 }}>+ Brand</button>
          <button className="btn-gold"  onClick={() => { setAddType('Agency'); setAdding(v => !v); setEditId(null); }} style={{ fontSize: 13 }}>+ Agency</button>
        </div>
      </div>

      {adding && (
        <div style={{ marginBottom: 4 }}>
          <div style={{ fontSize: 12, color: addType === 'Agency' ? GOLD : '#38bdf8', fontWeight: 600, marginBottom: 8 }}>
            {addType === 'Agency' ? '🏢 New Agency' : '🏷️ New Direct Brand'}
          </div>
          <VendorForm f={{ ...form, type: addType }} onChange={f => setForm({ ...f, type: addType })} onSave={add} onCancel={() => setAdding(false)} btnLabel={`Add ${addType}`} loading={saving} accentColor={addType === 'Agency' ? GOLD : '#38bdf8'} />
        </div>
      )}

      {agencies.length > 0 && (
        <div style={{ marginBottom: 28 }}>
          <div style={{ fontSize: 11, color: GOLD, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 12 }}>🏢 Agencies ({agencies.length})</div>
          <div style={{ display: 'grid', gap: 10 }}>{agencies.map(v => <VendorCard key={v.id} v={v} />)}</div>
        </div>
      )}

      {brands.length > 0 && (
        <div>
          <div style={{ fontSize: 11, color: '#38bdf8', fontWeight: 700, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 12 }}>🏷️ Direct Brands ({brands.length})</div>
          <div style={{ display: 'grid', gap: 10 }}>{brands.map(v => <VendorCard key={v.id} v={v} />)}</div>
        </div>
      )}

      {vendors.length === 0 && !adding && (
        <Empty icon="🏢" text="No vendors yet. Add agencies who broker deals or direct brands you work with." />
      )}
    </div>
  );
}

// --- TRAININGS ------------------------------------------------
const T_CATEGORIES  = ['Paid Program', 'Live Session', 'Recording'];
const T_PROG_TYPES  = ['Workshop', 'Webinar', 'Mentoring Batch', 'ETF Program', 'Options Program', 'Other'];
const T_STATUS      = ['Upcoming', 'Live', 'Completed', 'Cancelled'];
const T_COLORS      = { Upcoming: '#38bdf8', Live: '#4ade80', Completed: '#666', Cancelled: '#ff6b6b' };
const T_CAT_COLORS  = { 'Paid Program': '#F5C518', 'Live Session': '#4ade80', 'Recording': '#a78bfa' };
const T_CAT_ICONS   = { 'Paid Program': '💰', 'Live Session': '🔴', 'Recording': '🎙️' };
const T_EMPTY       = { title: '', category: 'Paid Program', type: 'Workshop', date: '', time: '', capacity: '', enrolled: '', revenue: '', batch: '', duration: '', notes: '' };

function TrainingsTab() {
  const [items, setItems]   = useState([]);
  const [adding, setAdding] = useState(false);
  const [form, setForm]     = useState({ ...T_EMPTY });
  const [saving, setSaving] = useState(false);
  const [editId, setEditId] = useState(null);
  const [editForm, setEditForm] = useState({ ...T_EMPTY });
  const [updating, setUpdating] = useState(false);

  useEffect(() => {
    return db.collection('trainings').orderBy('date', 'desc').onSnapshot(snap =>
      setItems(snap.docs.map(d => ({ id: d.id, ...d.data() })))
    );
  }, []);

  const add = async () => {
    if (!form.title.trim()) return;
    setSaving(true);
    const doc = { ...form, status: 'Upcoming', createdAt: new Date().toISOString() };
    await db.collection('trainings').add(doc);
    notify('training', `${T_CAT_ICONS[form.category] || '📚'}  **Training Planned**\n> **${form.title}**\n> Category: \`${form.category}\`${form.category === 'Paid Program' ? `  ·  Type: \`${form.type}\`` : ''}${form.batch ? `  ·  Batch: ${form.batch}` : ''}${form.date ? `  ·  Date: ${fmtDate(form.date)}` : ''}${form.capacity ? `\n> Capacity: ${form.capacity}${form.enrolled ? ` enrolled: ${form.enrolled}` : ''}` : ''}${form.revenue ? `  ·  Expected Revenue: ₹${form.revenue}` : ''}${form.duration ? `  ·  Duration: ${form.duration}` : ''}`);
    setForm({ ...T_EMPTY });
    setAdding(false);
    setSaving(false);
  };

  const updateStatus = (id, status) => {
    db.collection('trainings').doc(id).update({ status });
    const item = items.find(i => i.id === id);
    if (item) notify('training', `🔄  **Training Status Updated**\n> **${item.title}**\n> Status → \`${status}\``);
  };

  const saveEdit = async () => {
    if (!editForm.title.trim()) return;
    setUpdating(true);
    await db.collection('trainings').doc(editId).update({ ...editForm });
    notify('training', `✏️  **Training Updated**\n> **${editForm.title}**\n> Category: \`${editForm.category}\`${editForm.batch ? `  ·  Batch: ${editForm.batch}` : ''}${editForm.date ? `  ·  ${fmtDate(editForm.date)}` : ''}${editForm.duration ? `  ·  Duration: ${editForm.duration}` : ''}`);
    setEditId(null);
    setUpdating(false);
  };

  const del = id => db.collection('trainings').doc(id).delete();

  const upcoming  = items.filter(i => i.status === 'Upcoming' || i.status === 'Live');
  const completed = items.filter(i => i.status === 'Completed' || i.status === 'Cancelled');
  const totalRev  = items.filter(i => i.status === 'Completed').reduce((s, i) => s + (parseFloat(i.revenue) || 0), 0);

  const FormBlock = ({ f, onChange, onSave, onCancel, btnLabel, loading }) => {
    const catCol = T_CAT_COLORS[f.category] || GOLD;
    return (
      <div className="card fade" style={{ padding: 18, marginBottom: 20, borderColor: `${catCol}30` }}>
        {/* Category selector */}
        <div style={{ marginBottom: 12 }}>
          <div style={{ fontSize: 11, color: '#888', marginBottom: 6 }}>Session Type</div>
          <div style={{ display: 'flex', gap: 6 }}>
            {T_CATEGORIES.map(cat => (
              <button key={cat} onClick={() => onChange({ ...f, category: cat })} style={{
                padding: '5px 14px', borderRadius: 6, fontSize: 12, cursor: 'pointer', fontWeight: f.category === cat ? 700 : 400,
                background: f.category === cat ? `${T_CAT_COLORS[cat]}22` : 'transparent',
                color: f.category === cat ? T_CAT_COLORS[cat] : '#666',
                border: `1px solid ${f.category === cat ? T_CAT_COLORS[cat] : '#222'}`,
              }}>{T_CAT_ICONS[cat]} {cat}</button>
            ))}
          </div>
        </div>

        <div style={{ display: 'flex', gap: 10, marginBottom: 10 }}>
          <input className="input" placeholder="Title *" value={f.title} onChange={e => onChange({ ...f, title: e.target.value })} style={{ flex: 2 }} autoFocus />
          {f.category === 'Paid Program' && (
            <select className="select" value={f.type} onChange={e => onChange({ ...f, type: e.target.value })} style={{ flex: 1 }}>
              {T_PROG_TYPES.map(t => <option key={t}>{t}</option>)}
            </select>
          )}
          {(f.category === 'Live Session' || f.category === 'Recording') && (
            <input className="input" placeholder="Batch / Program name" value={f.batch} onChange={e => onChange({ ...f, batch: e.target.value })} style={{ flex: 1 }} />
          )}
        </div>

        <div style={{ display: 'flex', gap: 10, marginBottom: 10 }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 11, color: '#888', marginBottom: 4 }}>Date</div>
            <input className="input" type="date" value={f.date} onChange={e => onChange({ ...f, date: e.target.value })} />
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 11, color: '#888', marginBottom: 4 }}>Time</div>
            <input className="input" type="time" value={f.time} onChange={e => onChange({ ...f, time: e.target.value })} />
          </div>
          {f.category === 'Paid Program' && (<>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 11, color: '#888', marginBottom: 4 }}>Capacity</div>
              <input className="input" type="number" placeholder="e.g. 50" value={f.capacity} onChange={e => onChange({ ...f, capacity: e.target.value })} />
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 11, color: '#888', marginBottom: 4 }}>Enrolled</div>
              <input className="input" type="number" placeholder="0" value={f.enrolled} onChange={e => onChange({ ...f, enrolled: e.target.value })} />
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 11, color: '#888', marginBottom: 4 }}>Revenue (₹)</div>
              <input className="input" placeholder="0" value={f.revenue} onChange={e => onChange({ ...f, revenue: e.target.value })} />
            </div>
          </>)}
          {f.category === 'Recording' && (
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 11, color: '#888', marginBottom: 4 }}>Duration</div>
              <input className="input" placeholder="e.g. 1h 30m" value={f.duration} onChange={e => onChange({ ...f, duration: e.target.value })} />
            </div>
          )}
        </div>

        <textarea className="input" placeholder="Notes / agenda / description..." rows={2} value={f.notes} onChange={e => onChange({ ...f, notes: e.target.value })} style={{ marginBottom: 12, resize: 'vertical' }} />
        <div style={{ display: 'flex', gap: 8 }}>
          <button className="btn-gold" onClick={onSave} disabled={loading} style={{ fontSize: 13 }}>{loading ? 'Saving...' : btnLabel}</button>
          <button className="btn-ghost" onClick={onCancel} style={{ fontSize: 13 }}>Cancel</button>
