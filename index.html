<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GrowGuru Hub</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: #0d0d0d; color: #e8e8e8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.5; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
    input, select, textarea, button { font-family: inherit; font-size: inherit; }
    input::placeholder { color: #444; }
    select option { background: #1a1a1a; }
    .fade { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .card { background: #161616; border: 1px solid #222; border-radius: 10px; }
    .card:hover { border-color: #2e2e2e; }
    .input { width: 100%; padding: 9px 13px; background: #0f0f0f; border: 1px solid #2a2a2a; border-radius: 8px; color: #e8e8e8; outline: none; transition: border-color 0.15s; }
    .input:focus { border-color: #F5C518; }
    .select { padding: 9px 13px; background: #0f0f0f; border: 1px solid #2a2a2a; border-radius: 8px; color: #e8e8e8; outline: none; cursor: pointer; }
    .select:focus { border-color: #F5C518; }
    .btn-gold { background: #F5C518; color: #000; border: none; padding: 9px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
    .btn-gold:hover { opacity: 0.88; }
    .btn-gold:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost { background: transparent; border: 1px solid #2a2a2a; color: #888; padding: 9px 16px; border-radius: 8px; cursor: pointer; transition: all 0.15s; }
    .btn-ghost:hover { border-color: #444; color: #ccc; }
    .tag { display: inline-flex; align-items: center; font-size: 11px; padding: 2px 9px; border-radius: 20px; font-weight: 500; }
    .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 5px; }

    /* ── Mobile layout ── */
    .app-shell   { display: flex; height: 100vh; overflow: hidden; background: #0d0d0d; }
    .app-sidebar { width: 220px; background: #0a0a0a; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; flex-shrink: 0; }
    .app-main    { flex: 1; overflow-y: auto; padding: 28px 32px; -webkit-overflow-scrolling: touch; }
    .mobile-nav  { display: none; }

    @media (max-width: 767px) {
      .app-sidebar { display: none; }
      .app-main    { padding: 18px 14px 72px; }
      .mobile-nav  {
        display: flex;
        position: fixed; bottom: 0; left: 0; right: 0;
        height: 56px;
        background: #0a0a0a;
        border-top: 1px solid #1e1e1e;
        z-index: 200;
        align-items: stretch;
      }
      .mob-btn {
        flex: 1; background: none; border: none; cursor: pointer;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 2px; color: #444; font-size: 9px; letter-spacing: 0.2px;
        transition: color 0.15s; padding: 4px 2px;
      }
      .mob-btn.mob-active { color: #F5C518; }
      .mob-btn .mob-icon  { font-size: 18px; line-height: 1; }
      /* Tighten up form rows on mobile */
      .mob-stack { flex-direction: column !important; }
      .mob-full  { width: 100% !important; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// --- FIREBASE INIT --------------------------------------------
const firebaseConfig = {
  apiKey: "AIzaSyA9Oq5jOw4TCxmWQn3hcSf-Zd8QvWQ4Mj8",
  authDomain: "growguru-hub.firebaseapp.com",
  projectId: "growguru-hub",
  storageBucket: "growguru-hub.firebasestorage.app",
  messagingSenderId: "928801251635",
  appId: "1:928801251635:web:5b22c70985ba11c653de46"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// --- CONSTANTS ------------------------------------------------
const GOLD = '#F5C518';
const PILLARS = ['Content', 'Business Ops', 'Training', 'Daily Publishing'];
const PLATFORMS = ['YouTube', 'Instagram', 'Blog', 'Other'];
const PLATFORM_COLORS = { YouTube: '#ff4444', Instagram: '#e1306c', Blog: '#4ade80', Other: '#888888' };
const DEFAULT_CHANNELS = [
  { name: 'GrowGuru Kannada', platform: 'YouTube' },
  { name: 'GrowGuru English', platform: 'YouTube' },
  { name: 'GrowGuru Reels', platform: 'Instagram' },
  { name: 'Hashnode', platform: 'Blog' },
];
const P_STAGES = ['Idea', 'Script', 'Record', 'Edit', 'Review', 'Published'];
const D_STAGES = ['Lead', 'Negotiation', 'Confirmed', 'Script Approval', 'Live', 'Invoiced', 'Paid'];
const P_COLORS = { P1: '#ff6b6b', P2: '#F5C518', P3: '#4ade80' };
const D_COLORS = { Lead: '#8888ff', Negotiation: '#f97316', Confirmed: '#38bdf8', 'Script Approval': '#a78bfa', Live: '#4ade80', Invoiced: '#F5C518', Paid: '#4ade80' };

const todayStr = () => new Date().toISOString().split('T')[0];
const fmtDate = d => d ? new Date(d + 'T00:00:00').toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) : '';
const fmtDateFull = () => new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

// --- DISCORD --------------------------------------------------
const CHANNEL_COLORS = {
  pipeline: 0xF5C518,  // gold
  ideas:    0xa78bfa,  // purple
  brand:    0x4ade80,  // green
  training: 0x38bdf8,  // blue
  alerts:   0xff9944,  // orange
};

async function notify(channel, msg) {
  try {
    const doc = await db.collection('settings').doc('webhooks').get();
    if (!doc.exists) return;
    const url = doc.data()[channel];
    if (!url) return;

    // First line → embed title (strip ** markers)
    const lines = msg.split('\n');
    const title = lines[0].replace(/\*\*/g, '').trim();
    // Remaining lines → description (strip leading "> " quote prefix)
    const body = lines.slice(1)
      .map(l => l.replace(/^>\s?/, '').trim())
      .filter(Boolean)
      .join('\n');

    const embed = {
      title,
      color: CHANNEL_COLORS[channel] || 0x888888,
      timestamp: new Date().toISOString(),
    };
    if (body) embed.description = body;

    await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ embeds: [embed] }),
    });
  } catch (_) {}
}

// --- ROOT APP -------------------------------------------------
function App() {
  const [user, setUser] = useState(undefined);
  const [profile, setProfile] = useState(null);

  useEffect(() => {
    return auth.onAuthStateChanged(async u => {
      if (u) {
        const snap = await db.collection('users').doc(u.uid).get();
        if (snap.exists) {
          setProfile(snap.data());
        } else {
          const all = await db.collection('users').get();
          const isAdmin = all.empty;
          const p = { name: u.email.split('@')[0], email: u.email, role: isAdmin ? 'admin' : 'member', createdAt: todayStr() };
          await db.collection('users').doc(u.uid).set(p);
          setProfile(p);
        }
        setUser(u);
      } else {
        setUser(null);
        setProfile(null);
      }
    });
  }, []);

  if (user === undefined) return <Splash />;
  if (!user) return <Login />;
  return <Dashboard user={user} profile={profile} />;
}

function Splash() {
  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 12 }}>
      <div style={{ fontSize: 26, fontWeight: 800, color: GOLD, letterSpacing: '-0.5px' }}>GrowGuru Hub</div>
      <div style={{ width: 32, height: 2, background: '#222', borderRadius: 2, overflow: 'hidden' }}>
        <div style={{ height: '100%', background: GOLD, animation: 'slideIn 1s ease infinite', width: '60%' }} />
      </div>
    </div>
  );
}

// --- LOGIN ----------------------------------------------------
function Login() {
  const [email, setEmail] = useState('');
  const [pwd, setPwd] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  const submit = async e => {
    e.preventDefault();
    setLoading(true); setErr('');
    try { await auth.signInWithEmailAndPassword(email, pwd); }
    catch (_) { setErr('Incorrect email or password.'); setLoading(false); }
  };

  return (
    <div style={{ height: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}>
      <div className="fade" style={{ width: '100%', maxWidth: 360, padding: '40px 32px', background: '#141414', border: '1px solid #222', borderRadius: 16 }}>
        <div style={{ textAlign: 'center', marginBottom: 36 }}>
          <div style={{ fontSize: 28, fontWeight: 800, color: GOLD, letterSpacing: '-0.5px' }}>GrowGuru Hub</div>
          <div style={{ color: '#888', fontSize: 12, marginTop: 6, letterSpacing: 0.5 }}>ACTIVITY MANAGEMENT SYSTEM</div>
          <div style={{ color: '#666', fontSize: 11, marginTop: 8, fontStyle: 'italic', letterSpacing: 0.3 }}>Guided by Krishna, Instrumented by GrowGuru</div>
        </div>
        <form onSubmit={submit}>
          <div style={{ marginBottom: 12 }}>
            <input className="input" type="email" placeholder="Email address" value={email} onChange={e => setEmail(e.target.value)} required />
          </div>
          <div style={{ marginBottom: 16 }}>
            <input className="input" type="password" placeholder="Password" value={pwd} onChange={e => setPwd(e.target.value)} required />
          </div>
          {err && <div style={{ color: '#ff6b6b', fontSize: 12, marginBottom: 12 }}>{err}</div>}
          <button className="btn-gold" type="submit" disabled={loading} style={{ width: '100%', padding: '11px' }}>
            {loading ? 'Signing in...' : 'Sign In'}
          </button>
        </form>
      </div>
    </div>
  );
}

// --- DASHBOARD ------------------------------------------------
function Dashboard({ user, profile }) {
  const [tab, setTab] = useState('overview');
  const isAdmin = profile?.role === 'admin';
  const isPartner = profile?.role === 'partner';
  const canSeeSettings = isAdmin || isPartner;
  const tabs = [
    { id: 'overview',   label: '📊', full: 'Overview' },
    { id: 'today',      label: '✅', full: 'Today' },
    { id: 'weekly',     label: '📅', full: 'Weekly Planner' },
    { id: 'pipeline',   label: '🎬', full: 'Content Pipeline' },
    { id: 'deals',      label: '💼', full: 'Deals' },
    { id: 'vendors',    label: '🏢', full: 'Vendors' },
    { id: 'trainings',  label: '📚', full: 'Trainings' },
    { id: 'ideas',      label: '💡', full: 'Ideas' },
    { id: 'invoices',   label: '🧾', full: 'Invoices' },
    { id: 'search',     label: '🔍', full: 'Search' },
    ...(canSeeSettings ? [{ id: 'settings', label: '⚙️', full: 'Settings' }] : []),
  ];

  return (
    <div className="app-shell">

      {/* ── Sidebar (desktop only) ── */}
      <aside className="app-sidebar">
        {/* Brand */}
        <div style={{ padding: '22px 18px 18px', borderBottom: '1px solid #161616' }}>
          <div style={{ fontWeight: 800, fontSize: 16, color: GOLD, letterSpacing: '-0.3px', lineHeight: 1.2 }}>GrowGuru</div>
          <div style={{ fontSize: 10, color: '#555', fontWeight: 600, letterSpacing: 1.5, textTransform: 'uppercase', marginTop: 3 }}>Hub</div>
        </div>

        {/* Nav items */}
        <nav style={{ flex: 1, padding: '12px 10px', overflowY: 'auto' }}>
          {tabs.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{
              display: 'flex', alignItems: 'center', gap: 10, width: '100%',
              padding: '9px 12px', marginBottom: 2,
              background: tab === t.id ? `${GOLD}12` : 'transparent',
              border: tab === t.id ? `1px solid ${GOLD}28` : '1px solid transparent',
              borderRadius: 8, cursor: 'pointer', fontSize: 13,
              color: tab === t.id ? GOLD : '#555',
              fontWeight: tab === t.id ? 600 : 400,
              textAlign: 'left', transition: 'all 0.15s',
            }}>
              <span style={{ fontSize: 15, lineHeight: 1, flexShrink: 0 }}>{t.label}</span>
              <span style={{ fontSize: 13 }}>{t.full}</span>
            </button>
          ))}
        </nav>

        {/* User info + sign out */}
        <div style={{ padding: '14px 14px', borderTop: '1px solid #161616' }}>
          <div style={{ fontSize: 12, color: '#666', marginBottom: 6, fontWeight: 500, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
            {profile?.name || user.email}
          </div>
          <div style={{ display: 'flex', gap: 6, marginBottom: 10 }}>
            {isAdmin && <span className="tag" style={{ background: `${GOLD}22`, color: GOLD, fontSize: 10, letterSpacing: 0.5 }}>ADMIN</span>}
            {isPartner && <span className="tag" style={{ background: '#38bdf822', color: '#38bdf8', fontSize: 10, letterSpacing: 0.5 }}>PARTNER</span>}
          </div>
          <button className="btn-ghost" onClick={() => auth.signOut()} style={{ padding: '6px 12px', fontSize: 12, width: '100%' }}>Sign out</button>
        </div>
      </aside>

      {/* ── Content Canvas ── */}
      <main className="app-main">
        <div className="fade" key={tab} style={{ maxWidth: 920, margin: '0 auto' }}>
          {tab === 'overview'  && <OverviewTab onNavigate={setTab} />}
          {tab === 'today'     && <TodayTab />}
          {tab === 'weekly'    && <WeeklyTab />}
          {tab === 'pipeline'  && <PipelineTab />}
          {tab === 'deals'     && <DealsTab />}
          {tab === 'vendors'   && <VendorsTab />}
          {tab === 'trainings' && <TrainingsTab />}
          {tab === 'ideas'     && <IdeasTab />}
          {tab === 'invoices'  && <InvoicesTab />}
          {tab === 'search'    && <SearchTab onNavigate={setTab} />}
          {tab === 'settings'  && canSeeSettings && <SettingsTab isAdmin={isAdmin} currentUid={user.uid} />}
        </div>
      </main>

      {/* ── Bottom nav (mobile only) ── */}
      <nav className="mobile-nav">
        {tabs.map(t => (
          <button key={t.id} className={`mob-btn${tab === t.id ? ' mob-active' : ''}`} onClick={() => setTab(t.id)}>
            <span className="mob-icon">{t.label}</span>
            <span>{t.full}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

// --- OVERVIEW -------------------------------------------------
function StatCard({ label, value, sub, color, onClick }) {
  return (
    <div className="card" onClick={onClick} style={{
      padding: '18px 20px', cursor: onClick ? 'pointer' : 'default', transition: 'border-color 0.15s',
    }}
      onMouseEnter={e => { if (onClick) e.currentTarget.style.borderColor = '#383838'; }}
      onMouseLeave={e => { if (onClick) e.currentTarget.style.borderColor = ''; }}
    >
      <div style={{ fontSize: 11, color: '#888', marginBottom: 8, textTransform: 'uppercase', letterSpacing: 0.8 }}>{label}</div>
      <div style={{ fontSize: 30, fontWeight: 800, color, letterSpacing: '-1px', lineHeight: 1 }}>{value}</div>
      <div style={{ fontSize: 11, color: '#888', marginTop: 6 }}>{sub}</div>
      {onClick && <div style={{ fontSize: 10, color: '#444', marginTop: 8, letterSpacing: 0.5 }}>VIEW →</div>}
    </div>
  );
}

function OverviewTab({ onNavigate }) {
  const [data, setData] = useState({ tasks: [], pipeline: [], deals: [], trainings: [] });
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    Promise.all([
      db.collection('tasks').get(),
      db.collection('pipeline').get(),
      db.collection('deals').get(),
      db.collection('trainings').get(),
    ]).then(([t, p, d, tr]) => {
      setData({
        tasks:     t.docs.map(x => ({ id: x.id, ...x.data() })),
        pipeline:  p.docs.map(x => ({ id: x.id, ...x.data() })),
        deals:     d.docs.map(x => ({ id: x.id, ...x.data() })),
        trainings: tr.docs.map(x => ({ id: x.id, ...x.data() })),
      });
      setLoading(false);
    });
  }, []);

  const today = todayStr();
  const todayTasks        = data.tasks.filter(t => t.date === today);
  const doneTasks         = todayTasks.filter(t => t.done);
  const overdueTasks      = data.tasks.filter(t => t.date < today && !t.done);
  const activePipeline    = data.pipeline.filter(p => p.stage !== 'Published');
  const overduePipeline   = data.pipeline.filter(p => p.publishDate && p.publishDate < today && p.stage !== 'Published');
  const activeDeals       = data.deals.filter(d => !['Paid'].includes(d.stage));
  const overdueDeals      = data.deals.filter(d => d.deadline && d.deadline < today && !['Paid'].includes(d.stage));
  const paymentDueDeals   = data.deals.filter(d => d.paymentDue && d.paymentDue <= today && d.paymentStatus !== 'Paid');
  const invoicedPending   = data.deals.filter(d => d.stage === 'Invoiced');
  const liveNeedInvoice   = data.deals.filter(d => d.stage === 'Live' && !d.invoiceNo);
  const totalDealValue    = activeDeals.reduce((s, d) => s + (parseFloat(d.agreedRate) || 0), 0);
  const paidDealsValue    = data.deals.filter(d => d.stage === 'Paid').reduce((s, d) => s + (parseFloat(d.agreedRate) || 0), 0);
  const upcomingTrainings = data.trainings.filter(t => t.status === 'Upcoming' || t.status === 'Live');
  const trainingRevenue   = data.trainings.filter(t => t.status === 'Completed' && t.category === 'Paid Program').reduce((s, t) => s + (parseFloat(t.revenue) || 0), 0);
  const totalOverdue      = overdueTasks.length + overduePipeline.length + overdueDeals.length + paymentDueDeals.length;

  if (loading) return <div style={{ color: '#666', textAlign: 'center', padding: 60 }}>Loading...</div>;

  return (
    <div>
      <div style={{ marginBottom: 20 }}>
        <h1 style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>Overview</h1>
        <div style={{ color: '#888', fontSize: 13 }}>{fmtDateFull()}</div>
      </div>

      {/* Stat cards — row 1 */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(130px, 1fr))', gap: 12, marginBottom: 12 }}>
        <StatCard label="Today's Tasks" value={`${doneTasks.length}/${todayTasks.length}`} sub="completed today" color={doneTasks.length === todayTasks.length && todayTasks.length > 0 ? '#4ade80' : GOLD} onClick={() => onNavigate('today')} />
        <StatCard label="Active Pipeline" value={activePipeline.length} sub={`of ${data.pipeline.length} total items`} color="#38bdf8" onClick={() => onNavigate('pipeline')} />
        <StatCard label="Overdue" value={totalOverdue} sub={totalOverdue === 0 ? 'all clear ✓' : 'need attention'} color={totalOverdue > 0 ? '#ff6b6b' : '#4ade80'} onClick={totalOverdue > 0 ? () => onNavigate('today') : undefined} />
      </div>
      {/* Stat cards — row 2 */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(130px, 1fr))', gap: 12, marginBottom: 24 }}>
        <StatCard label="Active Deals" value={activeDeals.length} sub={totalDealValue ? `₹${totalDealValue.toLocaleString('en-IN')} in pipeline` : 'no active deals'} color={GOLD} onClick={() => onNavigate('deals')} />
        <StatCard label="Upcoming Trainings" value={upcomingTrainings.length} sub={trainingRevenue ? `₹${trainingRevenue.toLocaleString('en-IN')} earned` : 'sessions planned'} color="#a78bfa" onClick={() => onNavigate('trainings')} />
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: 16, marginBottom: 16 }}>
        {/* Pipeline breakdown */}
        <div className="card" onClick={() => onNavigate('pipeline')} style={{ padding: 18, cursor: 'pointer' }}
          onMouseEnter={e => e.currentTarget.style.borderColor = '#383838'}
          onMouseLeave={e => e.currentTarget.style.borderColor = ''}>
          <div style={{ fontSize: 13, fontWeight: 600, color: '#aaa', marginBottom: 16 }}>🎬 Pipeline by Stage <span style={{ fontSize: 10, color: '#444', marginLeft: 4 }}>VIEW →</span></div>
          {P_STAGES.map(s => {
            const cnt = data.pipeline.filter(p => p.stage === s).length;
            const pct = data.pipeline.length ? (cnt / data.pipeline.length) * 100 : 0;
            return (
              <div key={s} style={{ marginBottom: 10 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, marginBottom: 4 }}>
                  <span style={{ color: '#888' }}>{s}</span>
                  <span style={{ color: cnt > 0 ? '#ddd' : '#444', fontWeight: 600 }}>{cnt}</span>
                </div>
                <div style={{ height: 4, background: '#1e1e1e', borderRadius: 4 }}>
                  <div style={{ height: '100%', width: `${pct}%`, background: s === 'Published' ? '#4ade80' : GOLD, borderRadius: 4, transition: 'width 0.5s ease' }} />
                </div>
              </div>
            );
          })}
        </div>

        {/* Deals breakdown */}
        <div className="card" onClick={() => onNavigate('deals')} style={{ padding: 18, cursor: 'pointer' }}
          onMouseEnter={e => e.currentTarget.style.borderColor = '#383838'}
          onMouseLeave={e => e.currentTarget.style.borderColor = ''}>
          <div style={{ fontSize: 13, fontWeight: 600, color: '#aaa', marginBottom: 16 }}>💼 Deals by Stage <span style={{ fontSize: 10, color: '#444', marginLeft: 4 }}>VIEW →</span></div>
          {activeDeals.length === 0 && <div style={{ color: '#666', fontSize: 12 }}>No active deals</div>}
          {D_STAGES.map(s => {
            const grp = data.deals.filter(d => d.stage === s);
            if (!grp.length) return null;
            const sc = D_COLORS[s] || '#888';
            const val = grp.reduce((sum, d) => sum + (parseFloat(d.agreedRate) || 0), 0);
            return (
              <div key={s} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '7px 0', borderBottom: '1px solid #1a1a1a', fontSize: 12, gap: 8 }}>
                <span className="tag" style={{ background: `${sc}18`, color: sc, flexShrink: 0 }}>{s}</span>
                <span style={{ color: '#888', flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{grp.map(d => d.brand).join(', ')}</span>
                {val > 0 && <span style={{ color: '#4ade80', fontWeight: 600, fontSize: 11, flexShrink: 0 }}>₹{val.toLocaleString('en-IN')}</span>}

      {totalOverdue > 0 && (

          <div style={{ fontSize: 13, fontWeight: 600, color: '#ff6b6b', marginBottom: 12 }}>⚠️ Needs Attention ({totalOverdue})</div>
          {overdueTasks.map(t => (

              onMouseEnter={e => e.currentTarget.style.background = '#ffffff08'}
              onMouseLeave={e => e.currentTarget.style.background = ''}>
              <span>⬜</span><span style={{ color: '#ccc', flex: 1 }}>{t.title}</span><span style={{ color: '#666' }}>{fmtDate(t.date)}</span>
            </div>
          ))}
          {overduePipeline.map(p => (
            <div key={p.id} onClick={() => onNavigate('pipeline')} style={{ fontSize: 12, color: '#888', padding: '7px 0', borderBottom: '1px solid #1a1a1a', display: 'flex', gap: 8, cursor: 'pointer' }}
              onMouseEnter={e => e.currentTarget.style.background = '#ffffff08'}
              onMouseLeave={e => e.currentTarget.style.background = ''}>
              <span>🎬</span><span style={{ color: '#ccc', flex: 1 }}>{p.title}</span><span style={{ color: '#666' }}>due {fmtDate(p.publishDate)}</span>
            </div>

          {overdueDeals.map(d => (

              onMouseEnter={e => e.currentTarget.style.background = '#ffffff08'}
              onMouseLeave={e => e.currentTarget.style.background = ''}>
              <span>💼</span><span style={{ color: '#ccc', flex: 1 }}>{d.brand}</span><span style={{ color: '#666' }}>deadline {fmtDate(d.deadline)}</span>
            </div>

              onMouseEnter={e => e.currentTarget.style.background = '#ffffff08'}

              <span>💳</span><span style={{ color: '#f97316', flex: 1, fontWeight: 600 }}>{d.brand}</span><span style={{ color: '#f97316' }}>payment due {fmtDate(d.paymentDue)}</span>

          <div style={{ fontSize: 13, fontWeight: 600, color: '#F5C518', marginBottom: 12 }}>🧾 Payment Followup ({invoicedPending.length + liveNeedInvoice.length})</div>

// --- WEEKLY PLANNER -------------------------------------------
function WeeklyTab() {
  const [weekOffset, setWeekOffset] = useState(0);
  const [tasks, setTasks] = useState([]);
  const [pipeline, setPipeline] = useState([]);
  const [trainings, setTrainings] = useState([]);
  const [addingDay, setAddingDay] = useState(null);
  const [newTask, setNewTask] = useState({ title: '', pillar: 'Content', priority: 'P2' });
  const [saving, setSaving] = useState(false);

  const getWeekDays = (offset) => {
    const now = new Date();
    const day = now.getDay();
    const monday = new Date(now);
    monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
    return Array.from({ length: 7 }, (_, i) => {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      return d.toISOString().split('T')[0];
    });
  };

  const weekDays = getWeekDays(weekOffset);
  const startDate = weekDays[0];
  const endDate   = weekDays[6];

  useEffect(() => {
    const unsub = db.collection('tasks')
      .where('date', '>=', startDate)
      .where('date', '<=', endDate)
      .onSnapshot(snap => setTasks(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
    db.collection('pipeline')
      .where('publishDate', '>=', startDate)
      .where('publishDate', '<=', endDate)
      .get()
      .then(snap => setPipeline(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
    db.collection('trainings')
      .where('date', '>=', startDate)
      .where('date', '<=', endDate)
      .get()
      .then(snap => setTrainings(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
    return unsub;
  }, [startDate, endDate]);

  // Spawn recurring tasks — only for today and future days in this week
  useEffect(() => {
    const today = todayStr();
    db.collection('taskTemplates').where('active', '==', true).get().then(async snap => {
      const tmpls = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      for (const day of weekDays) {
        if (day < today) continue; // never create tasks for past days
        for (const tmpl of tmpls) {
          if (!appliesToday(tmpl, day)) continue;
          const existing = await db.collection('tasks')
            .where('templateId', '==', tmpl.id).where('date', '==', day).get();
          if (existing.empty) {
            await db.collection('tasks').add({
              title: tmpl.title, pillar: tmpl.pillar, priority: tmpl.priority,
              notes: tmpl.notes || '', date: day, done: false,
              templateId: tmpl.id, recurring: true, frequency: tmpl.frequency,
              createdAt: new Date().toISOString(),
            });
          }
        }
      }
    });
  }, [startDate]);

  const addTask = async (day) => {
    if (!newTask.title.trim()) return;
    setSaving(true);
    await db.collection('tasks').add({ ...newTask, date: day, done: false, createdAt: new Date().toISOString() });
    setNewTask({ title: '', pillar: 'Content', priority: 'P2' });
    setAddingDay(null);
    setSaving(false);
  };

  const toggle  = (id, done) => db.collection('tasks').doc(id).update({ done: !done });
  const delTask = (id) => db.collection('tasks').doc(id).delete();
  const DAY_NAMES = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
  const today = todayStr();
  const weekLabel = () => {
    const fmt = d => new Date(d + 'T00:00:00').toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
    if (weekOffset === 0) return `This Week · ${fmt(weekDays[0])} — ${fmt(weekDays[6])}`;
    if (weekOffset === -1) return `Last Week · ${fmt(weekDays[0])} — ${fmt(weekDays[6])}`;
    if (weekOffset === 1) return `Next Week · ${fmt(weekDays[0])} — ${fmt(weekDays[6])}`;
    return `${fmt(weekDays[0])} — ${fmt(weekDays[6])}`;
  };

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
        <div>
          <h1 style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>Weekly Planner</h1>
          <div style={{ color: '#888', fontSize: 13 }}>{weekLabel()}</div>
        </div>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          <button className="btn-ghost" onClick={() => setWeekOffset(v => v - 1)} style={{ fontSize: 13, padding: '6px 14px' }}>← Prev</button>
          {weekOffset !== 0 && <button className="btn-ghost" onClick={() => setWeekOffset(0)} style={{ fontSize: 12, padding: '6px 12px', color: GOLD, borderColor: GOLD + '44' }}>Today</button>}
          <button className="btn-ghost" onClick={() => setWeekOffset(v => v + 1)} style={{ fontSize: 13, padding: '6px 14px' }}>Next →</button>
        </div>
      </div>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {weekDays.map((day, idx) => {
          const dayTasks     = tasks.filter(t => t.date === day);
          const dayPipe      = pipeline.filter(p => p.publishDate === day);
          const dayTrainings = trainings.filter(tr => tr.date === day);
          const isToday      = day === today;
          const isPast       = day < today;
          const done         = dayTasks.filter(t => t.done).length;
          const hasContent   = dayTasks.length > 0 || dayPipe.length > 0 || dayTrainings.length > 0;
          const dateObj      = new Date(day + 'T00:00:00');
          const dateLabel    = dateObj.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });

          return (
            <div key={day} className="card" style={{
              padding: 0,
              borderColor: isToday ? GOLD + '99' : isPast && !hasContent ? '#1c1c1c' : '#252525',
              background: isToday ? '#1a1800' : isPast ? '#141414' : '#161616',
              overflow: 'hidden',
            }}>
              {/* ── Day header row ── */}
              <div style={{
                display: 'flex', alignItems: 'center', gap: 12,
                padding: '10px 16px',
                borderBottom: hasContent || addingDay === day ? `1px solid ${isToday ? GOLD + '33' : '#1e1e1e'}` : 'none',
                background: isToday ? '#1f1c00' : 'transparent',
              }}>
                {/* Day name + date */}
                <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, minWidth: 110 }}>
                  <span style={{ fontSize: 13, fontWeight: 800, color: isToday ? GOLD : isPast ? '#555' : '#bbb', textTransform: 'uppercase', letterSpacing: 0.5 }}>
                    {DAY_NAMES[idx]}
                  </span>
                  <span style={{ fontSize: 12, color: isToday ? GOLD + 'cc' : '#555' }}>{dateLabel}</span>
                  {isToday && <span style={{ fontSize: 10, background: GOLD, color: '#000', fontWeight: 700, borderRadius: 4, padding: '1px 6px', letterSpacing: 0.5 }}>TODAY</span>}
                </div>

                {/* Summary badges */}
                <div style={{ display: 'flex', gap: 6, flex: 1, flexWrap: 'wrap' }}>
                  {dayTasks.length > 0 && (
                    <span style={{
                      fontSize: 11, borderRadius: 4, padding: '2px 8px', fontWeight: 600,
                      background: done === dayTasks.length ? '#4ade8022' : '#ffffff0a',
                      color: done === dayTasks.length ? '#4ade80' : '#888',
                    }}>
                      {done === dayTasks.length ? '✓' : `${done}/`}{done !== dayTasks.length ? `${dayTasks.length}` : ''} tasks{done === dayTasks.length ? ' done' : ''}
                    </span>
                  )}
                  {dayPipe.length > 0 && (
                    <span style={{ fontSize: 11, borderRadius: 4, padding: '2px 8px', background: '#38bdf812', color: '#38bdf8', fontWeight: 600 }}>
                      🎬 {dayPipe.length} video{dayPipe.length > 1 ? 's' : ''}
                    </span>
                  )}
                  {dayTrainings.length > 0 && (
                    <span style={{ fontSize: 11, borderRadius: 4, padding: '2px 8px', background: '#a78bfa12', color: '#a78bfa', fontWeight: 600 }}>
                      📚 {dayTrainings.length} session{dayTrainings.length > 1 ? 's' : ''}
                    </span>
                  )}
                </div>

                {/* Add task button (top-right) */}
                {addingDay !== day && (
                  <button onClick={() => setAddingDay(day)} style={{
                    background: 'none', border: `1px dashed ${isToday ? GOLD + '66' : '#333'}`,
                    borderRadius: 5, color: isToday ? GOLD + 'aa' : '#666',
                    cursor: 'pointer', fontSize: 12, padding: '3px 12px', flexShrink: 0,
                    transition: 'all 0.15s',
                  }}
                    onMouseEnter={e => { e.currentTarget.style.borderColor = GOLD + '99'; e.currentTarget.style.color = GOLD; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor = isToday ? GOLD + '66' : '#333'; e.currentTarget.style.color = isToday ? GOLD + 'aa' : '#666'; }}
                  >+ Task</button>
                )}
              </div>

              {/* ── Content area ── */}
              {(hasContent || addingDay === day) && (
                <div style={{ padding: '10px 16px', display: 'flex', flexDirection: 'column', gap: 4 }}>

                  {/* Pipeline items */}
                  {dayPipe.map(p => (
                    <div key={p.id} style={{
                      display: 'flex', alignItems: 'center', gap: 8,
                      fontSize: 12, color: '#38bdf8', background: '#38bdf80d',
                      borderRadius: 6, padding: '6px 12px',
                      borderLeft: '3px solid #38bdf844',
                    }}>
                      <span>🎬</span>
                      <span style={{ flex: 1 }}>{p.title}</span>
                      {p.stage && <span style={{ fontSize: 10, color: '#38bdf888', background: '#38bdf810', borderRadius: 3, padding: '1px 6px' }}>{p.stage}</span>}
                    </div>
                  ))}

                  {/* Training sessions */}
                  {dayTrainings.map(tr => (
                    <div key={tr.id} style={{
                      display: 'flex', alignItems: 'center', gap: 8,
                      fontSize: 12, color: '#a78bfa', background: '#a78bfa0d',
                      borderRadius: 6, padding: '6px 12px',
                      borderLeft: '3px solid #a78bfa44',
                    }}>
                      <span>📚</span>
                      <span style={{ flex: 1 }}>{tr.title}</span>
                      {tr.time && <span style={{ fontSize: 11, color: '#a78bfa88' }}>{tr.time}</span>}
                    </div>
                  ))}

                  {/* Tasks */}
                  {dayTasks.map(t => (
                    <div key={t.id} style={{
                      display: 'flex', alignItems: 'center', gap: 8,
                      fontSize: 12, padding: '6px 10px', borderRadius: 6,
                      background: t.done ? '#4ade8008' : `${P_COLORS[t.priority]}0d`,
                      borderLeft: `3px solid ${t.done ? '#4ade8033' : P_COLORS[t.priority] + '55'}`,
                    }}>
                      <span onClick={() => toggle(t.id, t.done)} style={{ cursor: 'pointer', fontSize: 14, lineHeight: 1, color: t.done ? '#4ade80' : P_COLORS[t.priority], flexShrink: 0 }}>
                        {t.done ? '✓' : '○'}
                      </span>
                      <span onClick={() => toggle(t.id, t.done)} style={{
                        flex: 1, cursor: 'pointer',
                        color: t.done ? '#555' : '#ccc',
                        textDecoration: t.done ? 'line-through' : 'none',
                        lineHeight: 1.4,
                      }}>
                        {t.title}
                      </span>
                      {t.priority && !t.done && (
                        <span style={{ fontSize: 10, color: P_COLORS[t.priority], background: P_COLORS[t.priority] + '18', borderRadius: 3, padding: '1px 5px', flexShrink: 0 }}>{t.priority}</span>
                      )}
                      <button onClick={() => delTask(t.id)} style={{
                        background: 'none', border: 'none', color: '#444', cursor: 'pointer',
                        fontSize: 15, lineHeight: 1, padding: '0 2px', flexShrink: 0,
                      }}
                        onMouseEnter={e => e.target.style.color = '#ff6b6b'}
                        onMouseLeave={e => e.target.style.color = '#444'}
                      >×</button>
                    </div>
                  ))}

                  {/* Add task inline form */}
                  {addingDay === day && (
                    <div style={{ marginTop: 4, background: '#1e1e1e', borderRadius: 8, padding: '10px 12px', display: 'flex', flexDirection: 'column', gap: 8 }}>
                      <input className="input" placeholder="Task name..." autoFocus value={newTask.title}
                        onChange={e => setNewTask(v => ({ ...v, title: e.target.value }))}
                        onKeyDown={e => { if (e.key === 'Enter') addTask(day); if (e.key === 'Escape') setAddingDay(null); }}
                        style={{ fontSize: 13, padding: '7px 10px' }} />
                      <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                        <select className="select" value={newTask.priority} onChange={e => setNewTask(v => ({ ...v, priority: e.target.value }))} style={{ fontSize: 12, padding: '5px 8px' }}>
                          <option>P1</option><option>P2</option><option>P3</option>
                        </select>
                        <select className="select" value={newTask.pillar} onChange={e => setNewTask(v => ({ ...v, pillar: e.target.value }))} style={{ fontSize: 12, padding: '5px 8px', flex: 1 }}>
                          {['Content', 'Brand', 'Learning', 'Admin', 'Personal'].map(p => <option key={p}>{p}</option>)}
                        </select>
                        <button onClick={() => addTask(day)} disabled={saving} style={{ background: GOLD, border: 'none', borderRadius: 6, padding: '6px 16px', fontSize: 13, fontWeight: 700, cursor: 'pointer', color: '#000', flexShrink: 0 }}>Add</button>
                        <button onClick={() => setAddingDay(null)} style={{ background: 'transparent', border: '1px solid #333', borderRadius: 6, padding: '6px 10px', fontSize: 12, color: '#888', cursor: 'pointer', flexShrink: 0 }}>✕</button>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// --- TODAY ----------------------------------------------------
const TASK_FREQS  = ['Daily', 'Weekdays', 'Weekly', 'Monthly'];
const WEEK_DAYS   = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
const EMPTY_TASK  = { title: '', pillar: 'Content', priority: 'P1', notes: '', recurring: false, frequency: 'Daily', weekDay: 0, monthDay: 1 };

function appliesToday(tmpl, dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const dow = d.getDay(); // 0=Sun...6=Sat
  const isoDow = dow === 0 ? 6 : dow - 1; // 0=Mon...6=Sun
  switch (tmpl.frequency) {
    case 'Daily':    return true;
    case 'Weekdays': return dow >= 1 && dow <= 5;
    case 'Weekly':   return isoDow === (tmpl.weekDay ?? 0);
    case 'Monthly':  return d.getDate() === (tmpl.monthDay ?? 1);
    default:         return false;
  }
}

function TodayTab() {
  const [tasks,     setTasks]     = useState([]);
  const [templates, setTemplates] = useState([]);
  const [form,      setForm]      = useState({ ...EMPTY_TASK });
  const [adding,    setAdding]    = useState(false);
  const [saving,    setSaving]    = useState(false);
  const [showRec,   setShowRec]   = useState(false);

  // Load today's tasks
  useEffect(() => {
    return db.collection('tasks').where('date', '==', todayStr()).onSnapshot(snap => {
      const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      data.sort((a, b) => a.priority.localeCompare(b.priority));
      setTasks(data);
    });
  }, []);

  // Load recurring templates
  useEffect(() => {
    db.collection('taskTemplates').where('active', '==', true).orderBy('createdAt', 'asc')
      .onSnapshot(snap => setTemplates(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
  }, []);

  // One-time cleanup: delete past undone recurring task instances (spawned before today)
  useEffect(() => {
    const today = todayStr();
    db.collection('tasks')
      .where('recurring', '==', true)
      .where('done', '==', false)
      .get()
      .then(snap => {
        const pastOnes = snap.docs.filter(d => d.data().date < today);
        if (!pastOnes.length) return;
        const batch = db.batch();
        pastOnes.forEach(d => batch.delete(d.ref));
        return batch.commit();
      });
  }, []);

  // Auto-spawn recurring tasks for today
  useEffect(() => {
    const today = todayStr();
    db.collection('taskTemplates').where('active', '==', true).get().then(async snap => {
      const tmpls = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      for (const tmpl of tmpls) {
        if (!appliesToday(tmpl, today)) continue;
        const existing = await db.collection('tasks')
          .where('templateId', '==', tmpl.id).where('date', '==', today).get();
        if (existing.empty) {
          await db.collection('tasks').add({
            title: tmpl.title, pillar: tmpl.pillar, priority: tmpl.priority,
            notes: tmpl.notes || '', date: today, done: false,
            templateId: tmpl.id, recurring: true, frequency: tmpl.frequency,
            createdAt: new Date().toISOString(),
          });
        }
      }
    });
  }, []);

  const add = async () => {
    if (!form.title.trim()) return;
    setSaving(true);
    const today = todayStr();
    if (form.recurring) {
      // Save as a recurring template
      const tmpl = await db.collection('taskTemplates').add({
        title: form.title, pillar: form.pillar, priority: form.priority,
        notes: form.notes, frequency: form.frequency,
        weekDay: form.weekDay, monthDay: form.monthDay,
        active: true, createdAt: new Date().toISOString(),
      });
      // Spawn today's instance immediately if it applies
      if (appliesToday({ ...form }, today)) {
        await db.collection('tasks').add({
          title: form.title, pillar: form.pillar, priority: form.priority,
          notes: form.notes, date: today, done: false,
          templateId: tmpl.id, recurring: true, frequency: form.frequency,
          createdAt: new Date().toISOString(),
        });
      }
      notify('pipeline', `🔁  **Recurring Task Created**\n> **${form.title}**\n> \`${form.priority}\`  ·  ${form.pillar}  ·  Repeats: ${form.frequency}`);
    } else {
      await db.collection('tasks').add({ title: form.title, pillar: form.pillar, priority: form.priority, notes: form.notes, date: today, done: false, createdAt: new Date().toISOString() });
      notify('pipeline', `✅  **New Task Added**\n> **${form.title}**\n> \`${form.priority}\`  ·  ${form.pillar}`);
    }
    setForm({ ...EMPTY_TASK });
    setAdding(false);
    setSaving(false);
  };

  const toggle   = id => db.collection('tasks').doc(id).update({ done: !tasks.find(t => t.id === id)?.done });
  const del      = id => db.collection('tasks').doc(id).delete();
  const delTmpl  = id => db.collection('taskTemplates').doc(id).update({ active: false });

  const markAllDone = async () => {
    const undone = tasks.filter(t => !t.done);
    if (!undone.length) return;
    const batch = db.batch();
    undone.forEach(t => batch.update(db.collection('tasks').doc(t.id), { done: true }));
    await batch.commit();
  };

  const groups = { P1: [], P2: [], P3: [] };
  tasks.forEach(t => groups[t.priority]?.push(t));
  const done = tasks.filter(t => t.done).length;

  const freqLabel = tmpl => {
    if (tmpl.frequency === 'Weekly')  return `Every ${WEEK_DAYS[tmpl.weekDay ?? 0]}`;
    if (tmpl.frequency === 'Monthly') return `Every ${tmpl.monthDay}${['st','nd','rd'][((tmpl.monthDay??1)-1)%10<3 ? (tmpl.monthDay??1)-1 : 3] || 'th'}`;
    return tmpl.frequency;
  };

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 20 }}>
        <div>
          <h1 style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>Today's Focus</h1>
          <div style={{ color: '#888', fontSize: 13 }}>
            {fmtDateFull()}
            {tasks.length > 0 && <span style={{ marginLeft: 10, color: done === tasks.length && tasks.length > 0 ? '#4ade80' : GOLD }}>{done}/{tasks.length} done</span>}
          </div>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          {tasks.length > 0 && tasks.some(t => !t.done) && (
            <button onClick={markAllDone} className="btn-ghost" style={{ fontSize: 13 }} title="Mark all tasks done for today">✓ All Done</button>
          )}
          <button className="btn-gold" onClick={() => setAdding(v => !v)} style={{ fontSize: 13 }}>+ Add Task</button>
        </div>
      </div>

      {/* Priority legend */}
      <div style={{ display: 'flex', gap: 20, padding: '8px 14px', background: '#111', borderRadius: 8, marginBottom: 20, fontSize: 12, color: '#666' }}>
        <span><span className="dot" style={{ background: '#ff6b6b' }} />P1 - Must Do</span>
        <span><span className="dot" style={{ background: GOLD }} />P2 - Should Do</span>
        <span><span className="dot" style={{ background: '#4ade80' }} />P3 - If Time</span>
      </div>

      {adding && (
        <div className="card fade" style={{ padding: 18, marginBottom: 20, borderColor: '#F5C51844' }}>
          <input className="input" placeholder="Task title..." value={form.title} onChange={e => setForm({ ...form, title: e.target.value })}
            style={{ marginBottom: 10 }} autoFocus onKeyDown={e => !form.recurring && e.key === 'Enter' && add()} />
          <div style={{ display: 'flex', gap: 10, marginBottom: 10 }}>
            <select className="select" value={form.priority} onChange={e => setForm({ ...form, priority: e.target.value })} style={{ flex: 1 }}>
              <option>P1</option><option>P2</option><option>P3</option>
            </select>
            <select className="select" value={form.pillar} onChange={e => setForm({ ...form, pillar: e.target.value })} style={{ flex: 2 }}>
              {PILLARS.map(p => <option key={p}>{p}</option>)}
            </select>
          </div>
          <input className="input" placeholder="Notes (optional)" value={form.notes} onChange={e => setForm({ ...form, notes: e.target.value })} style={{ marginBottom: 12 }} />

          {/* Recurring toggle */}
          <div style={{ marginBottom: 12 }}>
            <div style={{ fontSize: 11, color: '#888', marginBottom: 6 }}>Schedule</div>
            <div style={{ display: 'flex', gap: 6 }}>
              {[false, true].map(v => (
                <button key={String(v)} onClick={() => setForm({ ...form, recurring: v })} style={{
                  padding: '5px 14px', borderRadius: 6, fontSize: 12, cursor: 'pointer', fontWeight: form.recurring === v ? 700 : 400,
                  background: form.recurring === v ? GOLD : 'transparent',
                  color: form.recurring === v ? '#000' : '#888',
                  border: `1px solid ${form.recurring === v ? GOLD : '#2a2a2a'}`,
                }}>{v ? '🔁 Recurring' : '1️⃣ One-time'}</button>
              ))}
            </div>
          </div>

          {form.recurring && (
            <div style={{ marginBottom: 12, padding: '12px 14px', background: '#111', borderRadius: 8 }}>
              <div style={{ fontSize: 11, color: '#888', marginBottom: 8 }}>Repeat frequency</div>
              <div style={{ display: 'flex', gap: 6, marginBottom: form.frequency === 'Weekly' || form.frequency === 'Monthly' ? 10 : 0, flexWrap: 'wrap' }}>
                {TASK_FREQS.map(f => (
                  <button key={f} onClick={() => setForm({ ...form, frequency: f })} style={{
                    padding: '4px 12px', borderRadius: 6, fontSize: 12, cursor: 'pointer', fontWeight: form.frequency === f ? 700 : 400,
                    background: form.frequency === f ? '#38bdf822' : 'transparent',
                    color: form.frequency === f ? '#38bdf8' : '#666',
                    border: `1px solid ${form.frequency === f ? '#38bdf8' : '#222'}`,
                  }}>{f}</button>
                ))}
              </div>
              {form.frequency === 'Weekly' && (
                <div>
                  <div style={{ fontSize: 11, color: '#888', marginBottom: 6 }}>Repeats on</div>
                  <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap' }}>
                    {WEEK_DAYS.map((d, i) => (
                      <button key={d} onClick={() => setForm({ ...form, weekDay: i })} style={{
                        padding: '4px 10px', borderRadius: 6, fontSize: 11, cursor: 'pointer',
                        background: form.weekDay === i ? GOLD : 'transparent',
                        color: form.weekDay === i ? '#000' : '#666',
                        border: `1px solid ${form.weekDay === i ? GOLD : '#222'}`,
                      }}>{d}</button>
                    ))}
                  </div>
                </div>
              )}
              {form.frequency === 'Monthly' && (
                <div>
                  <div style={{ fontSize: 11, color: '#888', marginBottom: 6 }}>Repeats on day</div>
                  <input className="input" type="number" min="1" max="28" value={form.monthDay}
                    onChange={e => setForm({ ...form, monthDay: parseInt(e.target.value) || 1 })}
                    style={{ width: 80 }} />
                  <span style={{ fontSize: 11, color: '#666', marginLeft: 8 }}>of each month</span>
                </div>
              )}
            </div>
          )}

          <div style={{ display: 'flex', gap: 8 }}>
            <button className="btn-gold" onClick={add} disabled={saving} style={{ fontSize: 13 }}>{saving ? 'Saving...' : form.recurring ? 'Save Recurring' : 'Add Task'}</button>
            <button className="btn-ghost" onClick={() => setAdding(false)} style={{ fontSize: 13 }}>Cancel</button>
          </div>
        </div>
      )}

      {tasks.length === 0 && !adding && <Empty icon="" text="No tasks yet. Add something to focus on." />}

      {['P1', 'P2', 'P3'].map(p => groups[p].length > 0 && (
        <div key={p} style={{ marginBottom: 22 }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: P_COLORS[p], marginBottom: 8, textTransform: 'uppercase', letterSpacing: 1.2, display: 'flex', alignItems: 'center', gap: 6 }}>
            <span className="dot" style={{ background: P_COLORS[p] }} />{p} — {groups[p].filter(t => t.done).length}/{groups[p].length}
          </div>
          {groups[p].map(t => (
            <div key={t.id} className="card" style={{ display: 'flex', alignItems: 'flex-start', gap: 12, padding: '11px 14px', marginBottom: 7, opacity: t.done ? 0.45 : 1, transition: 'opacity 0.2s' }}>
              <button onClick={() => toggle(t.id)} style={{
                width: 18, height: 18, borderRadius: '50%', border: `2px solid ${t.done ? '#4ade80' : P_COLORS[t.priority]}`,
                background: t.done ? '#4ade80' : 'transparent', cursor: 'pointer', flexShrink: 0, marginTop: 2,
                display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'all 0.15s'
              }}>
                {t.done && <svg width="9" height="7" viewBox="0 0 9 7"><polyline points="1,3.5 3.5,6 8,1" fill="none" stroke="#000" strokeWidth="1.8" strokeLinecap="round" /></svg>}
              </button>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 14, color: t.done ? '#555' : '#ddd', textDecoration: t.done ? 'line-through' : 'none', marginBottom: 3 }}>{t.title}</div>
                <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', alignItems: 'center' }}>
                  <span className="tag" style={{ background: '#1e1e1e', color: '#666' }}>{t.pillar}</span>
                  {t.recurring && <span className="tag" style={{ background: '#38bdf810', color: '#38bdf8', fontSize: 10 }}>↻ {t.frequency}</span>}
                  {t.notes && <span style={{ fontSize: 12, color: '#888' }}>{t.notes}</span>}
                </div>
              </div>
              <button onClick={() => del(t.id)} style={{ background: 'none', border: 'none', color: '#555', cursor: 'pointer', fontSize: 18, lineHeight: 1, padding: '0 2px' }}
                onMouseEnter={e => e.target.style.color = '#ff6b6b'} onMouseLeave={e => e.target.style.color = '#555'}>×</button>
            </div>
          ))}
        </div>
      ))}

      {/* Recurring Templates Manager */}
      {templates.length > 0 && (
        <div style={{ marginTop: 32, borderTop: '1px solid #1e1e1e', paddingTop: 20 }}>
          <button onClick={() => setShowRec(v => !v)} style={{
            background: 'none', border: 'none', cursor: 'pointer', color: '#666', fontSize: 13,
            display: 'flex', alignItems: 'center', gap: 6, marginBottom: showRec ? 14 : 0,
          }}>
            <span style={{ fontSize: 14 }}>🔁</span>
            <span>{templates.length} Recurring Task{templates.length > 1 ? 's' : ''}</span>
            <span style={{ fontSize: 11, color: '#444' }}>{showRec ? '▲' : '▼'}</span>
          </button>
          {showRec && templates.map(tmpl => (
            <div key={tmpl.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 12px', background: '#111', borderRadius: 7, marginBottom: 5 }}>
              <span className="dot" style={{ background: P_COLORS[tmpl.priority], flexShrink: 0 }} />
              <span style={{ flex: 1, fontSize: 13, color: '#ccc' }}>{tmpl.title}</span>
              <span className="tag" style={{ background: '#38bdf810', color: '#38bdf8', fontSize: 10 }}>{freqLabel(tmpl)}</span>
              <span className="tag" style={{ background: '#1e1e1e', color: '#666', fontSize: 10 }}>{tmpl.pillar}</span>
              <button onClick={() => delTmpl(tmpl.id)} title="Stop recurring" style={{
                background: 'none', border: 'none', color: '#444', cursor: 'pointer', fontSize: 13,
              }} onMouseEnter={e => e.target.style.color = '#ff6b6b'} onMouseLeave={e => e.target.style.color = '#444'}>×</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// --- PIPELINE -------------------------------------------------
function PipelineTab() {
  const [items, setItems] = useState([]);
  const [channels, setChannels] = useState([]);
  const EMPTY_FORM = { title: '', stage: 'Idea', channel: '', platform: '', recurring: false, frequency: 'Weekly', brandDeal: false, brandName: '', pocName: '', pocContact: '', agreedRate: '', recordDate: '', editDate: '', publishDate: '', notes: '' };
  const [form, setForm] = useState(EMPTY_FORM);
  const [adding, setAdding] = useState(false);
  const [saving, setSaving] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [editForm, setEditForm] = useState(EMPTY_FORM);
  const [updating, setUpdating] = useState(false);
  const [filterCh, setFilterCh] = useState('All');
  const [filterBrand, setFilterBrand] = useState(false);

  useEffect(() => {
    return db.collection('pipeline').orderBy('createdAt', 'desc').onSnapshot(snap => setItems(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
  }, []);

  useEffect(() => {
    db.collection('channels').orderBy('createdAt', 'asc').get().then(async snap => {
      if (snap.empty) {
        // Seed default channels on first load
        const batch = db.batch();
        DEFAULT_CHANNELS.forEach(ch => {
          const ref = db.collection('channels').doc();
          batch.set(ref, { ...ch, createdAt: new Date().toISOString() });
        });
        await batch.commit();
        db.collection('channels').orderBy('createdAt', 'asc').get().then(s => {
          const chs = s.docs.map(d => ({ id: d.id, ...d.data() }));
          setChannels(chs);
          if (chs.length) setForm(f => ({ ...f, channel: chs[0].name, platform: chs[0].platform }));
        });
      } else {
        const chs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        setChannels(chs);
        if (chs.length) setForm(f => ({ ...f, channel: chs[0].name, platform: chs[0].platform }));
      }
    });
  }, []);

  const add = async () => {
    if (!form.title.trim()) return;
    setSaving(true);
    await db.collection('pipeline').add({ ...form, createdAt: new Date().toISOString() });
    notify('pipeline', `🎬  **Pipeline — Content Added**\n> **${form.title}**\n> Stage: \`${form.stage}\`  ·  ${form.channel}${form.brandDeal ? `\n> 💼 Brand Deal: **${form.brandName}**${form.agreedRate ? `  ·  ₹${form.agreedRate}` : ''}` : ''}${form.publishDate ? `\n> 📅 Publish: ${form.publishDate}` : ''}`);

    // Auto-create deal entry if marked as brand collaboration (check by brand + deliverable to avoid duplicates)
    if (form.brandDeal && form.brandName.trim()) {
      const existingDeals = await db.collection('deals')
        .where('brand', '==', form.brandName.trim())
        .where('deliverables', '==', form.title.trim())
        .get();
      if (existingDeals.empty) {
        await db.collection('deals').add({
          brand: form.brandName.trim(),
          stage: 'Confirmed',
          contact: form.pocName.trim() || '',
          pocContact: form.pocContact.trim() || '',
          platform: form.channel || '',
          agreedRate: form.agreedRate.trim() || '',
          deliverables: form.title.trim(),
          paymentStatus: 'Pending',
          deadline: form.publishDate || '',
          notes: `Linked from pipeline: ${form.title}`,
          createdAt: new Date().toISOString(),
        });
        notify('brand', `💼  **Deal Auto-Created**\n> Brand: **${form.brandName}**\n> POC: ${form.pocName || '—'}${form.pocContact ? `  ·  ${form.pocContact}` : ''}\n> Rate: ${form.agreedRate ? `₹${form.agreedRate}` : 'TBD'}  ·  Deadline: ${form.publishDate || 'TBD'}\n> Linked video: "${form.title}"`);
      }
    }

    setForm({ ...EMPTY_FORM, channel: channels[0]?.name || '', platform: channels[0]?.platform || '' });
    setAdding(false);
    setSaving(false);
  };

  const updateStage = (id, stage) => {
    db.collection('pipeline').doc(id).update({ stage });
    const item = items.find(i => i.id === id);
    if (!item) return;
    if (stage === 'Published') {
      notify('pipeline', `🚀  **Published!**\n> **${item.title}**\n> Channel: ${item.channel}${item.brandDeal ? `\n> 💼 Brand Deal: ${item.brandName}` : ''}`);
    } else {
      notify('pipeline', `🔄  **Stage Updated**\n> **${item.title}**\n> ${item.stage} → \`${stage}\``);
    }
  };
  const del = id => db.collection('pipeline').doc(id).delete();

  const startEdit = (item) => {
    setEditItem(item.id);
    setEditForm({ title: item.title || '', stage: item.stage || 'Idea', channel: item.channel || '', platform: item.platform || '', recurring: item.recurring || false, frequency: item.frequency || 'Weekly', brandDeal: item.brandDeal || false, brandName: item.brandName || '', pocName: item.pocName || '', pocContact: item.pocContact || '', agreedRate: item.agreedRate || '', recordDate: item.recordDate || '', editDate: item.editDate || '', publishDate: item.publishDate || '', notes: item.notes || '' });
  };

  const saveEdit = async () => {
    if (!editForm.title.trim()) return;
    setUpdating(true);
    await db.collection('pipeline').doc(editItem).update({ ...editForm });
    notify('pipeline', `✏️  **Pipeline Updated**\n> **${editForm.title}**\n> Stage: \`${editForm.stage}\`  ·  ${editForm.channel}${editForm.brandDeal ? `\n> 💼 Brand Deal: **${editForm.brandName}**` : ''}`);

    // Auto-create deal if brand deal is marked (check by brand + deliverable to avoid duplicates)
    if (editForm.brandDeal && editForm.brandName.trim()) {
      const existingDeals = await db.collection('deals')
        .where('brand', '==', editForm.brandName.trim())
        .where('deliverables', '==', editForm.title.trim())
        .get();
      if (existingDeals.empty) {
        await db.collection('deals').add({
          brand: editForm.brandName.trim(),
          stage: 'Confirmed',
          contact: editForm.pocName?.trim() || '',
          pocContact: editForm.pocContact?.trim() || '',
          platform: editForm.channel || '',
          agreedRate: editForm.agreedRate?.trim() || '',
          deliverables: editForm.title.trim(),
          paymentStatus: 'Pending',
          deadline: editForm.publishDate || '',
          notes: `Linked from pipeline: ${editForm.title}`,
          createdAt: new Date().toISOString(),
        });
        notify('brand', `💼  **Deal Created from Pipeline**\n> Brand: **${editForm.brandName}**\n> Content: "${editForm.title}"\n> POC: ${editForm.pocName || '—'}${editForm.pocContact ? `  ·  ${editForm.pocContact}` : ''}\n> Rate: ${editForm.agreedRate ? `₹${editForm.agreedRate}` : 'TBD'}  ·  Deadline: ${editForm.publishDate || 'TBD'}`);
      }
    }

    setEditItem(null);
    setUpdating(false);
  };

  const chFiltered = filterCh === 'All' ? items : items.filter(i => i.channel === filterCh);
  const visibleItems = filterBrand ? chFiltered.filter(i => i.brandDeal) : chFiltered;
  const stageCount = s => visibleItems.filter(i => i.stage === s).length;

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 20 }}>
        <div>
          <h1 style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>Content Pipeline</h1>
          <div style={{ color: '#888', fontSize: 13 }}>{visibleItems.length} of {items.length} items</div>
        </div>
        <button className="btn-gold" onClick={() => { setAdding(v => !v); setEditItem(null); }} style={{ fontSize: 13 }}>+ Add Content</button>
      </div>

      {/* Channel filter */}
      <div style={{ display: 'flex', gap: 6, marginBottom: 14, flexWrap: 'wrap', alignItems: 'center' }}>
        <span style={{ fontSize: 11, color: '#666', marginRight: 4, textTransform: 'uppercase', letterSpacing: 0.8 }}>Channel:</span>
        {['All', ...channels.map(c => c.name)].map(ch => {
          const active = filterCh === ch;
          const chObj = channels.find(c => c.name === ch);
          const col = chObj ? (PLATFORM_COLORS[chObj.platform] || GOLD) : GOLD;
          return (
            <button key={ch} onClick={() => setFilterCh(ch)} style={{
              padding: '4px 12px', borderRadius: 20, fontSize: 12, cursor: 'pointer', fontWeight: active ? 700 : 400,
              background: active ? `${col}20` : 'transparent',
              color: active ? col : '#666',
              border: `1px solid ${active ? col : '#222'}`,
              transition: 'all 0.15s',
            }}>{ch}</button>
          );
        })}
        <div style={{ width: 1, background: '#222', height: 20, alignSelf: 'center', margin: '0 4px' }} />
        <button onClick={() => setFilterBrand(v => !v)} style={{
          padding: '4px 12px', borderRadius: 20, fontSize: 12, cursor: 'pointer', fontWeight: filterBrand ? 700 : 400,
          background: filterBrand ? `${GOLD}20` : 'transparent',
          color: filterBrand ? GOLD : '#666',
          border: `1px solid ${filterBrand ? GOLD : '#222'}`,
          transition: 'all 0.15s',
        }}>💼 Brand Deals</button>
      </div>

      {/* Stage counts */}
      <div style={{ display: 'flex', gap: 8, marginBottom: 20, flexWrap: 'wrap' }}>
        {P_STAGES.map(s => (
          <div key={s} className="tag" style={{ background: '#141414', border: '1px solid #222', color: stageCount(s) > 0 ? '#ccc' : '#444', padding: '4px 12px', borderRadius: 20, fontSize: 12 }}>
            {s} {stageCount(s) > 0 && <span style={{ color: GOLD, marginLeft: 4, fontWeight: 700 }}>{stageCount(s)}</span>}
          </div>
        ))}
      </div>

      {adding && (
        <div className="card fade" style={{ padding: 18, marginBottom: 20, borderColor: '#F5C51844' }}>
          <input className="input" placeholder="Video title..." value={form.title} onChange={e => setForm({ ...form, title: e.target.value })} style={{ marginBottom: 10 }} autoFocus />
          <div style={{ display: 'flex', gap: 10, marginBottom: 10 }}>
            <select className="select" value={form.stage} onChange={e => setForm({ ...form, stage: e.target.value })} style={{ flex: 1 }}>
              {P_STAGES.map(s => <option key={s}>{s}</option>)}
            </select>
            <select className="select" value={form.channel} onChange={e => {
              const ch = channels.find(c => c.name === e.target.value);
              setForm({ ...form, channel: e.target.value, platform: ch?.platform || '' });
            }} style={{ flex: 2 }}>
              {PLATFORMS.map(plat => {
                const grp = channels.filter(c => c.platform === plat);
                if (!grp.length) return null;
                return <optgroup key={plat} label={plat}>{grp.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}</optgroup>;
              })}
            </select>
          </div>
          {/* Recurring toggle */}
          <div style={{ display: 'flex', gap: 8, marginBottom: 10, alignItems: 'center' }}>
            <span style={{ fontSize: 12, color: '#666', marginRight: 4 }}>Type:</span>
            {['One-time', 'Recurring'].map(opt => (
              <button key={opt} type="button" onClick={() => setForm({ ...form, recurring: opt === 'Recurring' })}
                style={{ padding: '5px 14px', borderRadius: 6, border: `1px solid ${form.recurring === (opt === 'Recurring') ? GOLD : '#2a2a2a'}`, background: form.recurring === (opt === 'Recurring') ? `${GOLD}18` : 'transparent', color: form.recurring === (opt === 'Recurring') ? GOLD : '#666', fontSize: 12, cursor: 'pointer', fontWeight: form.recurring === (opt === 'Recurring') ? 600 : 400 }}>
                {opt === 'Recurring' ? '🔁 Recurring' : '1️⃣ One-time'}
              </button>

            {form.recurring && (
              <div style={{ display: 'flex', gap: 6, marginLeft: 8 }}>

          </div>
          {/* Stage dates */}
          <div style={{ display: 'flex', gap: 8, marginBottom: 10, flexWrap: 'wrap' }}>
            <div style={{ flex: 1, minWidth: 120 }}>

            </div>
            <div style={{ flex: 1, minWidth: 120 }}>
              <div style={{ fontSize: 11, color: '#888', marginBottom: 4 }}>✂️ Edit by</div>
              <input className="input" type="date" value={form.editDate} onChange={e => setForm({ ...form, editDate: e.target.value })} />
            </div>
            <div style={{ flex: 1, minWidth: 120 }}>
              <div style={{ fontSize: 11, color: '#888', marginBottom: 4 }}>📅 {form.recurring ? 'Next Publish' : 'Publish'}</div>
              <input className="input" type="date" value={form.publishDate} onChange={e => setForm({ ...form, publishDate: e.target.value })} />
            </div>
          </div>
          <div style={{ display: 'flex', gap: 10, marginBottom: 10, alignItems: 'center' }}>
            <label style={{ display: 'flex', alignItems: 'center', gap: 7, color: '#888', cursor: 'pointer', fontSize: 13, whiteSpace: 'nowrap' }}>
              <input type="checkbox" checked={form.brandDeal} onChange={e => setForm({ ...form, brandDeal: e.target.checked })} style={{ accentColor: GOLD }} />
              Brand Deal
            </label>
            {form.brandDeal && <input className="input" placeholder="Brand name *" value={form.brandName} onChange={e => setForm({ ...form, brandName: e.target.value })} style={{ flex: 1 }} />}
          </div>
          {form.brandDeal && (
            <div style={{ display: 'flex', gap: 10, marginBottom: 10, padding: '12px 14px', background: `${GOLD}08`, border: `1px solid ${GOLD}22`, borderRadius: 8 }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, color: '#666', marginBottom: 5 }}>POC Name</div>
                <input className="input" placeholder="e.g. Rahul Sharma" value={form.pocName} onChange={e => setForm({ ...form, pocName: e.target.value })} />
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, color: '#666', marginBottom: 5 }}>POC Phone / Email</div>
                <input className="input" placeholder="e.g. 9876543210" value={form.pocContact} onChange={e => setForm({ ...form, pocContact: e.target.value })} />
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, color: '#666', marginBottom: 5 }}>Agreed Rate (₹)</div>

              </div>
            </div>
          )}
          <input className="input" placeholder="Notes" value={form.notes} onChange={e => setForm({ ...form, notes: e.target.value })} style={{ marginBottom: 12 }} />
          <div style={{ display: 'flex', gap: 8 }}>
            <button className="btn-gold" onClick={add} disabled={saving} style={{ fontSize: 13 }}>{saving ? 'Saving...' : 'Add'}</button>
            <button className="btn-ghost" onClick={() => setAdding(false)} style={{ fontSize: 13 }}>Cancel</button>
          </div>
        </div>
      )}

      {/* Edit modal */}
      {editItem && (
        <div className="card fade" style={{ padding: 18, marginBottom: 20, borderColor: '#38bdf844' }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: '#38bdf8', marginBottom: 12 }}>✏️ Edit Content</div>
          <input className="input" placeholder="Title..." value={editForm.title} onChange={e => setEditForm({ ...editForm, title: e.target.value })} style={{ marginBottom: 10 }} autoFocus />
          <div style={{ display: 'flex', gap: 10, marginBottom: 10 }}>
            <select className="select" value={editForm.stage} onChange={e => setEditForm({ ...editForm, stage: e.target.value })} style={{ flex: 1 }}>
              {P_STAGES.map(s => <option key={s}>{s}</option>)}
            </select>
            <select className="select" value={editForm.channel} onChange={e => {
              const ch = channels.find(c => c.name === e.target.value);
              setEditForm({ ...editForm, channel: e.target.value, platform: ch?.platform || '' });
            }} style={{ flex: 2 }}>
              {PLATFORMS.map(plat => {
                const grp = channels.filter(c => c.platform === plat);
                if (!grp.length) return null;
                return <optgroup key={plat} label={plat}>{grp.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}</optgroup>;
              })}
            </select>
          </div>
          {/* Recurring toggle (edit) */}
          <div style={{ display: 'flex', gap: 8, marginBottom: 10, alignItems: 'center' }}>
            <span style={{ fontSize: 12, color: '#666', marginRight: 4 }}>Type:</span>
            {['One-time', 'Recurring'].map(opt => (
              <button key={opt} type="button" onClick={() => setEditForm({ ...editForm, recurring: opt === 'Recurring' })}
                style={{ padding: '5px 14px', borderRadius: 6, border: `1px solid ${editForm.recurring === (opt === 'Recurring') ? GOLD : '#2a2a2a'}`, background: editForm.recurring === (opt === 'Recurring') ? `${GOLD}18` : 'transparent', color: editForm.recurring === (opt === 'Recurring') ? GOLD : '#666', fontSize: 12, cursor: 'pointer', fontWeight: editForm.recurring === (opt === 'Recurring') ? 600 : 400 }}>
                {opt === 'Recurring' ? '🔁 Recurring' : '1️⃣ One-time'}
              </button>
            ))}
            {editForm.recurring && (
              <div style={{ display: 'flex', gap: 6, marginLeft: 8 }}>
                {['Daily', 'Weekly', 'Monthly'].map(f => (
                  <button key={f} type="button" onClick={() => setEditForm({ ...editForm, frequency: f })}
                    style={{ padding: '5px 12px', borderRadius: 6, border: `1px solid ${editForm.frequency === f ? '#38bdf8' : '#2a2a2a'}`, background: editForm.frequency === f ? '#38bdf818' : 'transparent', color: editForm.frequency === f ? '#38bdf8' : '#555', fontSize: 12, cursor: 'pointer', fontWeight: editForm.frequency === f ? 600 : 400 }}>
                    {f}
                  </button>
                ))}
              </div>
            )}
          </div>
          {/* Stage dates */}
          <div style={{ display: 'flex', gap: 8, marginBottom: 10, flexWrap: 'wrap' }}>
            <div style={{ flex: 1, minWidth: 120 }}>
              <div style={{ fontSize: 11, color: '#888', marginBottom: 4 }}>🎙️ Record by</div>
              <input className="input" type="date" value={editForm.recordDate} onChange={e => setEditForm({ ...editForm, recordDate: e.target.value })} />
            </div>
            <div style={{ flex: 1, minWidth: 120 }}>
              <div style={{ fontSize: 11, color: '#888', marginBottom: 4 }}>✂️ Edit by</div>
              <input className="input" type="date" value={editForm.editDate} onChange={e => setEditForm({ ...editForm, editDate: e.target.value })} />
            </div>
            <div style={{ flex: 1, minWidth: 120 }}>
              <div style={{ fontSize: 11, color: '#888', marginBottom: 4 }}>📅 {editForm.recurring ? 'Next Publish' : 'Publish'}</div>
              <input className="input" type="date" value={editForm.publishDate} onChange={e => setEditForm({ ...editForm, publishDate: e.target.value })} />
            </div>
          </div>
          <div style={{ display: 'flex', gap: 10, marginBottom: 10, alignItems: 'center' }}>
            <label style={{ display: 'flex', alignItems: 'center', gap: 7, color: '#888', cursor: 'pointer', fontSize: 13, whiteSpace: 'nowrap' }}>
              <input type="checkbox" checked={editForm.brandDeal} onChange={e => setEditForm({ ...editForm, brandDeal: e.target.checked })} style={{ accentColor: GOLD }} />
              Brand Deal
            </label>
            {editForm.brandDeal && <input className="input" placeholder="Brand name" value={editForm.brandName} onChange={e => setEditForm({ ...editForm, brandName: e.target.value })} style={{ flex: 1 }} />}
          </div>
          {editForm.brandDeal && (
            <div style={{ display: 'flex', gap: 10, marginBottom: 10, padding: '12px 14px', background: `${GOLD}08`, border: `1px solid ${GOLD}22`, borderRadius: 8 }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, color: '#666', marginBottom: 5 }}>POC Name</div>
                <input className="input" placeholder="e.g. Rahul Sharma" value={editForm.pocName} onChange={e => setEditForm({ ...editForm, pocName: e.target.value })} />
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, color: '#666', marginBottom: 5 }}>POC Phone / Email</div>
                <input className="input" placeholder="e.g. 9876543210" value={editForm.pocContact} onChange={e => setEditForm({ ...editForm, pocContact: e.target.value })} />
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, color: '#666', marginBottom: 5 }}>Agreed Rate (₹)</div>
                <input className="input" placeholder="e.g. 25000" value={editForm.agreedRate} onChange={e => setEditForm({ ...editForm, agreedRate: e.target.value })} />
              </div>
            </div>
          )}
          <input className="input" placeholder="Notes" value={editForm.notes} onChange={e => setEditForm({ ...editForm, notes: e.target.value })} style={{ marginBottom: 12 }} />
          <div style={{ display: 'flex', gap: 8 }}>
            <button className="btn-gold" onClick={saveEdit} disabled={updating} style={{ fontSize: 13 }}>{updating ? 'Saving...' : 'Save Changes'}</button>
            <button className="btn-ghost" onClick={() => setEditItem(null)} style={{ fontSize: 13 }}>Cancel</button>
          </div>
        </div>
      )}

      {items.length === 0 && !adding && <Empty icon="" text="Pipeline is empty. Add your first content." />}
      {items.length > 0 && visibleItems.length === 0 && <div style={{ color: '#666', fontSize: 13, marginBottom: 20 }}>No content for <strong style={{ color: '#aaa' }}>{filterBrand ? 'Brand Deals' : filterCh}</strong> yet.</div>}

      {P_STAGES.map(stage => {
        const grp = visibleItems.filter(i => i.stage === stage);
        if (!grp.length) return null;
        return (
          <div key={stage} style={{ marginBottom: 24 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: '#666', marginBottom: 9, textTransform: 'uppercase', letterSpacing: 1.2 }}>{stage} - {grp.length}</div>
            {grp.map(item => {
              const today = todayStr();
              const msDay = 86400000;
              const daysDiff = d => d ? Math.ceil((new Date(d + 'T00:00:00') - new Date(today + 'T00:00:00')) / msDay) : null;
              const rd = daysDiff(item.recordDate);
              const ed = daysDiff(item.editDate);
              const pd = daysDiff(item.publishDate);
              const notPublished = item.stage !== 'Published';

              // Pick the nearest active deadline for card-level urgency
              const activeDiffs = [rd, ed, pd].filter(d => d !== null && notPublished);
              const nearest = activeDiffs.length ? Math.min(...activeDiffs) : null;
              const isOverdue  = nearest !== null && nearest < 0;
              const isDueSoon  = nearest !== null && nearest >= 0 && nearest <= 3;
              const urgentColor = isOverdue ? '#ff6b6b' : GOLD;

              // Per-date colour helper
              const dateCol = d => d === null ? '#666' : d < 0 ? '#ff6b6b' : d <= 3 ? GOLD : '#666';
              const dateLabel = d => d === null ? '' : d < 0 ? ` (${Math.abs(d)}d overdue)` : d === 0 ? ' (today!)' : d <= 3 ? ` (${d}d)` : '';

              return (
                <div key={item.id} className="card" style={{
                  padding: '13px 15px', marginBottom: 8, display: 'flex', alignItems: 'flex-start', gap: 12,
                  borderLeft: (isDueSoon || isOverdue) ? `3px solid ${urgentColor}` : undefined,
                  background: (isDueSoon || isOverdue) ? `${urgentColor}06` : undefined,
                }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6, flexWrap: 'wrap' }}>
                      <span style={{ fontSize: 14, fontWeight: 500, color: '#ddd' }}>{item.title}</span>
                      {isOverdue && notPublished  && <span className="tag" style={{ background: '#ff6b6b18', color: '#ff6b6b', fontSize: 10, fontWeight: 700 }}>⚠ OVERDUE</span>}
